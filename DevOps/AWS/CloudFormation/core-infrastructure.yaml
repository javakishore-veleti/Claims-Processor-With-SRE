  # ==========================================================================
  # ElastiCache Redis
  # ==========================================================================
  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName}-${Environment} ElastiCache Redis security group'
      GroupName: !Sub '${ProjectName}-${Environment}-sg-redis'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref AppSecurityGroupId
          Description: Allow Redis access from application layer
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-sg-redis'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: !Sub '${ProjectName}-${Environment}-redis-subnet-group'
      Description: !Sub '${ProjectName}-${Environment} Redis subnet group'
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-redis-subnet-group'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: core-infrastructure

  RedisReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupId: !Sub '${ProjectName}-${Environment}-redis'
      ReplicationGroupDescription: !Sub '${ProjectName}-${Environment} Redis replication group'
      Engine: redis
      EngineVersion: '7.1'
      CacheNodeType: !Ref RedisNodeType
      NumCacheClusters: !Ref RedisNumNodes
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds:
        - !Ref RedisSecurityGroup
      AuthToken: !Ref RedisAuthToken
      TransitEncryptionEnabled: true
      AtRestEncryptionEnabled: true
      AutomaticFailoverEnabled: false
      Port: 6379
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-redis'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: core-infrastructure

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  RDSEndpoint:
    Description: RDS PostgreSQL endpoint address
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub '${ProjectName}-${Environment}-rds-endpoint'

  RDSPort:
    Description: RDS PostgreSQL port
    Value: !GetAtt RDSInstance.Endpoint.Port
    Export:
      Name: !Sub '${ProjectName}-${Environment}-rds-port'

  S3DocumentsBucket:
    Description: S3 bucket for claim documents
    Value: !Ref S3DocumentsBucket
    Export:
      Name: !Sub '${ProjectName}-${Environment}-s3-documents'

  S3StaticBucket:
    Description: S3 bucket for static assets
    Value: !Ref S3StaticBucket
    Export:
      Name: !Sub '${ProjectName}-${Environment}-s3-static'

  ECRApiClaimsUri:
    Description: ECR repository URI for api-claims
    Value: !GetAtt ECRApiClaims.RepositoryUri
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ecr-api-claims'

  ECRApiMembersUri:
    Description: ECR repository URI for api-members
    Value: !GetAtt ECRApiMembers.RepositoryUri
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ecr-api-members'

  ECRApiTenantsUri:
    Description: ECR repository URI for api-tenants
    Value: !GetAtt ECRApiTenants.RepositoryUri
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ecr-api-tenants'

  ECRApiEntitlementsUri:
    Description: ECR repository URI for api-entitlements
    Value: !GetAtt ECRApiEntitlements.RepositoryUri
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ecr-api-entitlements'

  ECRPortalClaimsAdvisorUri:
    Description: ECR repository URI for portal-claims-advisor
    Value: !GetAtt ECRPortalClaimsAdvisor.RepositoryUri
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ecr-portal-claims-advisor'

  ECRPortalClaimsMemberUri:
    Description: ECR repository URI for portal-claims-member
    Value: !GetAtt ECRPortalClaimsMember.RepositoryUri
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ecr-portal-claims-member'

  ECRPortalBatchAssignmentUri:
    Description: ECR repository URI for portal-batch-assignment
    Value: !GetAtt ECRPortalBatchAssignment.RepositoryUri
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ecr-portal-batch-assignment'

  ECRPortalTenantsUri:
    Description: ECR repository URI for portal-tenants
    Value: !GetAtt ECRPortalTenants.RepositoryUri
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ecr-portal-tenants'

  ECRPortalEntitlementsUri:
    Description: ECR repository URI for portal-entitlements
    Value: !GetAtt ECRPortalEntitlements.RepositoryUri
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ecr-portal-entitlements'

  ECRPortalSREUri:
    Description: ECR repository URI for portal-sre
    Value: !GetAtt ECRPortalSRE.RepositoryUri
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ecr-portal-sre'

  RedisEndpoint:
    Description: ElastiCache Redis primary endpoint
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
    Export:
      Name: !Sub '${ProjectName}-${Environment}-redis-endpoint'
