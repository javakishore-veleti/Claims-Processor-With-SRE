          Image: !Sub '${AWSAccountId}.dkr.ecr.${AWSRegion}.amazonaws.com/${ECRRepoPrefix}/portal-entitlements:${ImageTag}'
          Essential: true
          PortMappings:
            - ContainerPort: 8089
              Protocol: tcp
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: !If
                - IsAppSignalsEnabled
                - !Sub '${Environment},aws,aws-signals'
                - !Sub '${Environment},aws'
            - Name: SERVER_PORT
              Value: '8089'
            - Name: SPRING_FLYWAY_ENABLED
              Value: 'true'
            - !If
              - IsAppSignalsEnabled
              - Name: JAVA_TOOL_OPTIONS
                Value: '-javaagent:/opt/aws-opentelemetry-agent.jar'
              - !Ref 'AWS::NoValue'
            - !If
              - IsAppSignalsEnabled
              - Name: OTEL_RESOURCE_ATTRIBUTES
                Value: !Sub 'service.name=portal-entitlements,service.namespace=${ProjectName},deployment.environment=${Environment}'
              - !Ref 'AWS::NoValue'
            - !If
              - IsAppSignalsEnabled
              - Name: ENVIRONMENT
                Value: !Ref Environment
              - !Ref 'AWS::NoValue'
            - !If
              - IsAppSignalsEnabled
              - Name: PROJECT_NAME
                Value: !Ref ProjectName
              - !Ref 'AWS::NoValue'
          Secrets:
            - Name: SPRING_DATASOURCE_URL
              ValueFrom: !Sub '${RDSSecretArn}:jdbc_url::'
            - Name: SPRING_DATASOURCE_USERNAME
              ValueFrom: !Sub '${RDSSecretArn}:username::'
            - Name: SPRING_DATASOURCE_PASSWORD
              ValueFrom: !Sub '${RDSSecretArn}:password::'
            - Name: SPRING_DATA_REDIS_URL
              ValueFrom: !Sub '${RedisSecretArn}:url::'
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8089/actuator/health || exit 1
            Interval: 30
            Timeout: 10
            Retries: 3
            StartPeriod: 120
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ECSLogGroup
              awslogs-region: !Ref AWSRegion
              awslogs-stream-prefix: portal-entitlements
        - !If
          - IsAppSignalsEnabled
          - Name: adot-collector
            Image: public.ecr.aws/aws-observability/aws-otel-collector:latest
            Essential: false
            Command: ['--config=/etc/ecs/ecs-default-config.yaml']
            PortMappings:
              - ContainerPort: 4317
                Protocol: tcp
              - ContainerPort: 4318
                Protocol: tcp
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Ref ECSLogGroup
                awslogs-region: !Ref AWSRegion
                awslogs-stream-prefix: adot-collector
          - !Ref 'AWS::NoValue'
      Tags:
        - Key: Module
          Value: portal-entitlements
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

