              Options:
                awslogs-group: !Ref ECSLogGroup
                awslogs-region: !Ref AWSRegion
                awslogs-stream-prefix: adot-collector
          - !Ref 'AWS::NoValue'
      Tags:
        - Key: Module
          Value: portal-sre
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

