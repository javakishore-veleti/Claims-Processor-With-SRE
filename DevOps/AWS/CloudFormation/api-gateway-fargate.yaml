# ===========================================================================
# Outputs
# ===========================================================================
Outputs:
  ALBDnsName:
    Description: Application Load Balancer DNS name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ALBDnsName'

  ALBArn:
    Description: Application Load Balancer ARN
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ALBArn'

  ALBHostedZoneId:
    Description: ALB Canonical Hosted Zone ID (for Route53 alias records)
    Value: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ALBHostedZoneId'

  ECSClusterArn:
    Description: ECS Cluster ARN
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ECSClusterArn'

  ECSClusterName:
    Description: ECS Cluster name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ECSClusterName'

  ServiceArnPortalClaimsAdvisor:
    Description: ECS Service ARN — Portal-Claims-Advisor
    Value: !Ref ServicePortalClaimsAdvisor
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ServiceArn-portal-claims-advisor'

  ServiceArnPortalClaimsMember:
    Description: ECS Service ARN — Portal-Claims-Member
    Value: !Ref ServicePortalClaimsMember
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ServiceArn-portal-claims-member'

  ServiceArnApiClaims:
