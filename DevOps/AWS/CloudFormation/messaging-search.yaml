AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Claims Processor - Messaging & Search Infrastructure
  Provisions Kinesis Data Streams (or MSK) for event-driven messaging
  and Amazon OpenSearch Service for claims search and analytics.

# ============================================================
# Parameters
# ============================================================
Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  ProjectName:
    Type: String
    Default: claims-proc
    Description: Project name prefix for resource naming

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for OpenSearch and MSK placement

  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for OpenSearch/MSK

  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for OpenSearch/MSK

  AppSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group of the application layer (allowed to connect)

  OpenSearchInstanceType:
    Type: String
    Default: t3.small.search
    Description: OpenSearch instance type

  OpenSearchInstanceCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10
    Description: Number of OpenSearch data nodes

  OpenSearchMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 128
    Description: >
      Master password for OpenSearch internal user database.
      Must contain at least one uppercase, one lowercase, one digit, and one special character.

  # ---- MSK/KINESIS COMMENTED OUT — using embedded Kafka ----
  # UseMSK:
  # Type: String
  # Default: 'false'
  # AllowedValues: ['true', 'false']
  # Description: >
  # Use Amazon MSK (Managed Kafka) instead of Kinesis Data Streams.
  # Set to true for Kafka-native workloads; false for serverless Kinesis.

# ============================================================
# Conditions — MSK/Kinesis commented out (using embedded Kafka)
# ============================================================
# Conditions:
#   CreateMSK: !Equals [!Ref UseMSK, 'true']
#   CreateKinesis: !Not [!Condition CreateMSK]

# ============================================================
# Resources
# ============================================================
Resources:

  # ----------------------------------------------------------
  # ---- KINESIS COMMENTED OUT — using embedded Kafka instead ----
  # Kinesis Data Streams (conditional — when UseMSK = false)
  # ----------------------------------------------------------
  # KinesisClaimsTopic:
  # Type: AWS::Kinesis::Stream
  # Condition: CreateKinesis
  # Properties:
  # Name: !Sub '${ProjectName}-${Environment}-claims-topic'
  # ShardCount: 1
  # RetentionPeriodHours: 168
  # StreamEncryption:
  # EncryptionType: KMS
  # KeyId: alias/aws/kinesis
  # Tags:
  # - Key: Project
  # Value: !Ref ProjectName
  # - Key: Environment
  # Value: !Ref Environment
  # - Key: ManagedBy
  # Value: github-actions
  # - Key: Component
  # Value: messaging-search
  # - Key: Service
  # Value: messaging
  # - Key: Stream
  # Value: claims-topic
  #   # KinesisDocumentsTopic:
  # Type: AWS::Kinesis::Stream
  # Condition: CreateKinesis
  # Properties:
  # Name: !Sub '${ProjectName}-${Environment}-documents-topic'
  # ShardCount: 1
  # RetentionPeriodHours: 168
  # StreamEncryption:
  # EncryptionType: KMS
  # KeyId: alias/aws/kinesis
  # Tags:
  # - Key: Project
  # Value: !Ref ProjectName
  # - Key: Environment
  # Value: !Ref Environment
  # - Key: ManagedBy
  # Value: github-actions
  # - Key: Component
  # Value: messaging-search
  # - Key: Service
  # Value: messaging
  # - Key: Stream
  # Value: documents-topic
  #   # KinesisNotificationsTopic:
  # Type: AWS::Kinesis::Stream
  # Condition: CreateKinesis
  # Properties:
  # Name: !Sub '${ProjectName}-${Environment}-notifications-topic'
  # ShardCount: 1
  # RetentionPeriodHours: 168
  # StreamEncryption:
  # EncryptionType: KMS
  # KeyId: alias/aws/kinesis
  # Tags:
  # - Key: Project
  # Value: !Ref ProjectName
  # - Key: Environment
  # Value: !Ref Environment
  # - Key: ManagedBy
  # Value: github-actions
  # - Key: Component
  # Value: messaging-search
  # - Key: Service
  # Value: messaging
  # - Key: Stream
  # Value: notifications-topic
  #   # KinesisAuditTopic:
  # Type: AWS::Kinesis::Stream
  # Condition: CreateKinesis
  # Properties:
  # Name: !Sub '${ProjectName}-${Environment}-audit-topic'
  # ShardCount: 1
  # RetentionPeriodHours: 168
  # StreamEncryption:
  # EncryptionType: KMS
  # KeyId: alias/aws/kinesis
  # Tags:
  # - Key: Project
  # Value: !Ref ProjectName
  # - Key: Environment
  # Value: !Ref Environment
  # - Key: ManagedBy
  # Value: github-actions
  # - Key: Component
  # Value: messaging-search
  # - Key: Service
  # Value: messaging
  # - Key: Stream
  # Value: audit-topic
  #   # ----------------------------------------------------------
  # ---- MSK COMMENTED OUT — using embedded Kafka instead ----
  # # MSK Cluster (conditional — when UseMSK = true)
  # ----------------------------------------------------------
  # MSKSecurityGroup:
  # Type: AWS::EC2::SecurityGroup
  # Condition: CreateMSK
  # Properties:
  # GroupDescription: !Sub '${ProjectName}-${Environment} MSK cluster security group'
  # VpcId: !Ref VpcId
  # SecurityGroupIngress:
  # - IpProtocol: tcp
  # FromPort: 9092
  # ToPort: 9098
  # SourceSecurityGroupId: !Ref AppSecurityGroupId
  # Description: Allow Kafka plaintext and TLS from app layer
  # - IpProtocol: tcp
  # FromPort: 2181
  # ToPort: 2181
  # SourceSecurityGroupId: !Ref AppSecurityGroupId
  # Description: Allow ZooKeeper from app layer
  # Tags:
  # - Key: Project
  # Value: !Ref ProjectName
  # - Key: Environment
  # Value: !Ref Environment
  # - Key: ManagedBy
  # Value: github-actions
  # - Key: Component
  # Value: messaging-search
  # - Key: Service
  # Value: msk
  #   # MSKConfiguration:
  # Type: AWS::MSK::Configuration
  # Condition: CreateMSK
  # Properties:
  # Name: !Sub '${ProjectName}-${Environment}-msk-config'
  # Description: !Sub 'MSK configuration for ${ProjectName} ${Environment}'
  # KafkaVersionsList:
  # - '3.6.0'
  # ServerProperties: |
  # auto.create.topics.enable=true
  # default.replication.factor=2
  # min.insync.replicas=1
  # num.partitions=3
  # log.retention.hours=168
  # log.retention.bytes=1073741824
  #   # MSKCluster:
  # Type: AWS::MSK::Cluster
  # Condition: CreateMSK
  # Properties:
  # ClusterName: !Sub '${ProjectName}-${Environment}-msk'
  # KafkaVersion: '3.6.0'
  # NumberOfBrokerNodes: 2
  # BrokerNodeGroupInfo:
  # InstanceType: kafka.t3.small
  # ClientSubnets:
  # - !Ref PrivateSubnet1
  # - !Ref PrivateSubnet2
  # SecurityGroups:
  # - !Ref MSKSecurityGroup
  # StorageInfo:
  # EBSStorageInfo:
  # VolumeSize: 50
  # ConfigurationInfo:
  # Arn: !GetAtt MSKConfiguration.Arn
  # Revision: 1
  # EncryptionInfo:
  # EncryptionInTransit:
  # ClientBroker: TLS_PLAINTEXT
  # InCluster: true
  # EnhancedMonitoring: DEFAULT
  # Tags:
  # Project: !Ref ProjectName
  # Environment: !Ref Environment
  # Service: msk
  #   # ----------------------------------------------------------
  # OpenSearch Domain
  # ----------------------------------------------------------
  OpenSearchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName}-${Environment} OpenSearch security group'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref AppSecurityGroupId
          Description: Allow HTTPS from application layer
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: messaging-search
        - Key: Service
          Value: opensearch

  # NOTE: The OpenSearch service-linked role (AWSServiceRoleForAmazonElasticsearchService)
  # is a global singleton per AWS account. It only needs to be created once and persists
  # across all stacks. Removed from this template to avoid CREATE_FAILED when it already exists.
  # If deploying OpenSearch for the first time in a new account, create it manually:
  #   aws iam create-service-linked-role --aws-service-name es.amazonaws.com

  OpenSearchDomain:
    Type: AWS::OpenSearchService::Domain
    Properties:
      DomainName: !Sub '${ProjectName}-${Environment}-search'
      EngineVersion: OpenSearch_2.11
      ClusterConfig:
        InstanceType: !Ref OpenSearchInstanceType
        InstanceCount: !Ref OpenSearchInstanceCount
        DedicatedMasterEnabled: false
        ZoneAwarenessEnabled: false
      EBSOptions:
        EBSEnabled: true
        VolumeType: gp3
        VolumeSize: 20
        Iops: 3000
        Throughput: 125
      VPCOptions:
        SubnetIds:
          - !Ref PrivateSubnet1
        SecurityGroupIds:
          - !Ref OpenSearchSecurityGroup
      EncryptionAtRestOptions:
        Enabled: true
      NodeToNodeEncryptionOptions:
        Enabled: true
      DomainEndpointOptions:
        EnforceHTTPS: true
        TLSSecurityPolicy: Policy-Min-TLS-1-2-PFS-2023-10
      AdvancedSecurityOptions:
        Enabled: true
        InternalUserDatabaseEnabled: true
        MasterUserOptions:
          MasterUserName: claimsadmin
          MasterUserPassword: !Ref OpenSearchMasterPassword
      AccessPolicies:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: 'es:*'
            Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${ProjectName}-${Environment}-search/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: messaging-search
        - Key: Service
          Value: opensearch

# ============================================================
# Outputs
# ============================================================
Outputs:
  # Kinesis outputs (conditional)
  # ---- KINESIS/MSK OUTPUT COMMENTED OUT ----
  # KinesisClaimsTopicArn:
  # Condition: CreateKinesis
  # Description: ARN of the claims-topic Kinesis stream
  # Value: !GetAtt KinesisClaimsTopic.Arn
  # Export:
  # Name: !Sub '${ProjectName}-${Environment}-kinesis-claims-topic-arn'
  #   # ---- KINESIS/MSK OUTPUT COMMENTED OUT ----
  # KinesisDocumentsTopicArn:
  # Condition: CreateKinesis
  # Description: ARN of the documents-topic Kinesis stream
  # Value: !GetAtt KinesisDocumentsTopic.Arn
  # Export:
  # Name: !Sub '${ProjectName}-${Environment}-kinesis-documents-topic-arn'
  #   # ---- KINESIS/MSK OUTPUT COMMENTED OUT ----
  # KinesisNotificationsTopicArn:
  # Condition: CreateKinesis
  # Description: ARN of the notifications-topic Kinesis stream
  # Value: !GetAtt KinesisNotificationsTopic.Arn
  # Export:
  # Name: !Sub '${ProjectName}-${Environment}-kinesis-notifications-topic-arn'
  #   # ---- KINESIS/MSK OUTPUT COMMENTED OUT ----
  # KinesisAuditTopicArn:
  # Condition: CreateKinesis
  # Description: ARN of the audit-topic Kinesis stream
  # Value: !GetAtt KinesisAuditTopic.Arn
  # Export:
  # Name: !Sub '${ProjectName}-${Environment}-kinesis-audit-topic-arn'
  #   # MSK outputs (conditional)
  # ---- KINESIS/MSK OUTPUT COMMENTED OUT ----
  # MSKClusterArn:
  # Condition: CreateMSK
  # Description: ARN of the MSK cluster
  # Value: !Ref MSKCluster
  # Export:
  # Name: !Sub '${ProjectName}-${Environment}-msk-cluster-arn'
  #   # ---- KINESIS/MSK OUTPUT COMMENTED OUT ----
  # MSKBootstrapBrokers:
  # Condition: CreateMSK
  # Description: MSK bootstrap broker connection string (plaintext)
  # Value: !GetAtt MSKCluster.BootstrapBrokerString
  # Export:
  # Name: !Sub '${ProjectName}-${Environment}-msk-bootstrap-brokers'
  #   # MSKBootstrapBrokersTls:
  # Condition: CreateMSK
  # Description: MSK bootstrap broker connection string (TLS)
  # Value: !GetAtt MSKCluster.BootstrapBrokerStringTls
  # Export:
  # Name: !Sub '${ProjectName}-${Environment}-msk-bootstrap-brokers-tls'
  #   # OpenSearch outputs
  OpenSearchDomainEndpoint:
    Description: OpenSearch domain endpoint URL
    Value: !Sub 'https://${OpenSearchDomain.DomainEndpoint}'
    Export:
      Name: !Sub '${ProjectName}-${Environment}-opensearch-endpoint'

  OpenSearchDomainArn:
    Description: OpenSearch domain ARN
    Value: !GetAtt OpenSearchDomain.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-opensearch-arn'

  OpenSearchSecurityGroupId:
    Description: OpenSearch security group ID
    Value: !Ref OpenSearchSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-${Environment}-opensearch-sg-id'
