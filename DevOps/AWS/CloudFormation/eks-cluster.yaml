AWSTemplateFormatVersion: '2010-09-09'
Description: >
  EKS Cluster and Managed Node Group for Claims Processor With SRE.
  Creates an EKS cluster with IAM roles, managed node group, and OIDC provider for IRSA.

# ===========================================================================
# Parameters
# ===========================================================================
Parameters:
  Environment:
    Type: String
    Description: Deployment environment
    AllowedValues:
      - dev
      - staging
      - prod

  ProjectName:
    Type: String
    Default: claims-proc
    Description: Project name used for resource naming and tagging

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where the EKS cluster will be deployed

  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for EKS worker nodes

  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for EKS worker nodes

  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet for EKS API endpoint access

  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet for EKS API endpoint access

  EKSNodeCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 20
    Description: Desired number of worker nodes in the managed node group

  EKSNodeInstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type for the EKS worker nodes
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge
      - m5.large
      - m5.xlarge
      - m5.2xlarge
      - c5.large
      - c5.xlarge
      - c5.2xlarge
      - r5.large
      - r5.xlarge

# ===========================================================================
# Resources
# ===========================================================================
Resources:

  # -------------------------------------------------------------------------
  # IAM Role for EKS Cluster (Control Plane)
  # -------------------------------------------------------------------------
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-eks-cluster-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-eks-cluster-role'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  # -------------------------------------------------------------------------
  # IAM Role for EKS Managed Node Group (Worker Nodes)
  # -------------------------------------------------------------------------
  EKSNodeGroupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-eks-nodegroup-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-eks-nodegroup-role'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  # -------------------------------------------------------------------------
  # EKS Cluster Security Group
  # -------------------------------------------------------------------------
  EKSClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName}-${Environment} - EKS cluster security group'
      GroupName: !Sub '${ProjectName}-${Environment}-sg-eks-cluster'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS to Kubernetes API server
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-sg-eks-cluster'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  # -------------------------------------------------------------------------
  # EKS Cluster
  # -------------------------------------------------------------------------
  EKSCluster:
    Type: AWS::EKS::Cluster
    DependsOn:
      - EKSClusterRole
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-cluster'
      Version: '1.29'
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
          - !Ref PublicSubnet1
          - !Ref PublicSubnet2
        SecurityGroupIds:
          - !Ref EKSClusterSecurityGroup
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
            - Type: controllerManager
            - Type: scheduler
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-cluster'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  # -------------------------------------------------------------------------
  # EKS Managed Node Group
  # -------------------------------------------------------------------------
  EKSNodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn:
      - EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      NodegroupName: !Sub '${ProjectName}-${Environment}-nodes'
      NodeRole: !GetAtt EKSNodeGroupRole.Arn
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      InstanceTypes:
        - !Ref EKSNodeInstanceType
      ScalingConfig:
        MinSize: !Ref EKSNodeCount
        MaxSize: !FindInMap [ NodeScaling, Factor, Max ]
        DesiredSize: !Ref EKSNodeCount
      DiskSize: 50
      AmiType: AL2_x86_64
      Labels:
        project: !Ref ProjectName
        environment: !Ref Environment
      Tags:
        Name: !Sub '${ProjectName}-${Environment}-nodes'
        Project: !Ref ProjectName
        Environment: !Ref Environment
        ManagedBy: cloudformation

  # -------------------------------------------------------------------------
  # OIDC Provider for IAM Roles for Service Accounts (IRSA)
  # -------------------------------------------------------------------------
  OIDCProvider:
    Type: AWS::IAM::OIDCProvider
    DependsOn:
      - EKSCluster
    Properties:
      Url: !GetAtt EKSCluster.OpenIdConnectIssuerUrl
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - '9e99a48a9960b14926bb7f3b02e22da2b0ab7280'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-eks-oidc-provider'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

# ===========================================================================
# Mappings — used to compute max node count as EKSNodeCount * 2
# CloudFormation does not support arithmetic, so we use a workaround:
# The node group MaxSize is set dynamically in the workflow before deploy.
# As a fallback, we set a generous static max here.
# ===========================================================================
Mappings:
  NodeScaling:
    Factor:
      Max: 40

# ===========================================================================
# Outputs
# ===========================================================================
Outputs:
  ClusterName:
    Description: EKS Cluster Name
    Value: !Ref EKSCluster
    Export:
      Name: !Sub '${ProjectName}-${Environment}-EKSClusterName'

  ClusterEndpoint:
    Description: EKS Cluster API Server Endpoint
    Value: !GetAtt EKSCluster.Endpoint
    Export:
      Name: !Sub '${ProjectName}-${Environment}-EKSClusterEndpoint'

  ClusterArn:
    Description: EKS Cluster ARN
    Value: !GetAtt EKSCluster.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-EKSClusterArn'

  NodeGroupName:
    Description: EKS Managed Node Group Name
    Value: !Ref EKSNodeGroup
    Export:
      Name: !Sub '${ProjectName}-${Environment}-EKSNodeGroupName'

  OIDCProviderArn:
    Description: OIDC Provider ARN for IRSA
    Value: !GetAtt OIDCProvider.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-OIDCProviderArn'

  ClusterSecurityGroupId:
    Description: EKS Cluster Security Group ID
    Value: !Ref EKSClusterSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-${Environment}-EKSClusterSecurityGroupId'
