AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Claims-Processor-With-SRE ECR Repositories.
  Provisions ECR container image repositories for all 10 microservices.

# ============================================================================
# Parameters
# ============================================================================
Parameters:
  Environment:
    Type: String
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment

  ProjectName:
    Type: String
    Default: claims-proc
    Description: Project name used as prefix for repository names

# ============================================================================
# Resources - 10 ECR Repositories
# ============================================================================
Resources:

  # --------------------------------------------------------------------------
  # API Services
  # --------------------------------------------------------------------------
  ECRApiClaims:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/api-claims'
      EmptyOnDelete: true
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: ecr-repositories

  ECRApiMembers:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub '${ProjectName}/api-members'
      EmptyOnDelete: true
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
