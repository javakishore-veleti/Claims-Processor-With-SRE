AWSTemplateFormatVersion: '2010-09-09'
Description: >
  RDS PostgreSQL stack for Claims Processor.
  Stack name pattern: ${ProjectName}-${Environment}-rds

# ============================================================================
# Parameters
# ============================================================================
Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  ProjectName:
    Type: String
    Default: claims-proc
    Description: Project name used in resource naming

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for RDS deployment

  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for RDS

  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for RDS

  AppSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group ID of the application layer (ECS/EC2) allowed to connect to RDS

  RDSInstanceClass:
    Type: String
    Default: db.t3.medium
    Description: RDS instance class

  RDSMultiAZ:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable Multi-AZ deployment

  RDSAllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 1000
    Description: Allocated storage in GB

  RDSMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 128
    Description: Master password for the RDS instance

  RDSUsername:
    Type: String
    Default: claims_user
    Description: Master username for the RDS instance

  RDSDBName:
    Type: String
    Default: claims_db
    Description: Name of the default database

# ============================================================================
# Resources
# ============================================================================
Resources:

  # --------------------------------------------------------------------------
  # Security Group - RDS
  # --------------------------------------------------------------------------
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName}-${Environment} RDS PostgreSQL security group'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref AppSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-sg-rds'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: rds-postgres

  # --------------------------------------------------------------------------
  # DB Subnet Group
  # --------------------------------------------------------------------------
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub '${ProjectName}-${Environment}-db-subnet-group'
      DBSubnetGroupDescription: !Sub '${ProjectName}-${Environment} RDS subnet group'
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-db-subnet-group'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: rds-postgres

  # --------------------------------------------------------------------------
  # RDS PostgreSQL Instance
  # --------------------------------------------------------------------------
  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-${Environment}-postgres'
      DBInstanceClass: !Ref RDSInstanceClass
      Engine: postgres
      EngineVersion: '16'
      DBName: !Ref RDSDBName
      MasterUsername: !Ref RDSUsername
      MasterUserPassword: !Ref RDSMasterPassword
      AllocatedStorage: !Ref RDSAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: !Ref RDSMultiAZ
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      BackupRetentionPeriod: 0
      PreferredMaintenanceWindow: 'sun:05:00-sun:06:00'
      AutoMinorVersionUpgrade: true
      CopyTagsToSnapshot: true
      DeletionProtection: false
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-postgres'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: rds-postgres

# ============================================================================
# Outputs
# ============================================================================
Outputs:
  RDSEndpoint:
    Description: RDS PostgreSQL endpoint address
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub '${ProjectName}-${Environment}-rds-endpoint'

  RDSPort:
    Description: RDS PostgreSQL endpoint port
    Value: !GetAtt RDSInstance.Endpoint.Port
    Export:
      Name: !Sub '${ProjectName}-${Environment}-rds-port'
