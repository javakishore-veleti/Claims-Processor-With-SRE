AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Data seeding Lambda function for Claims Processor With SRE.
  Deploys a VPC-connected Python Lambda that populates the RDS PostgreSQL
  database with seed data for tenants, members, claims, and entitlements.

# ===========================================================================
# Parameters
# ===========================================================================
Parameters:
  Environment:
    Type: String
    Description: Deployment environment
    AllowedValues:
      - dev
      - staging
      - prod

  ProjectName:
    Type: String
    Default: claims-proc
    Description: Project name used for resource naming and tagging

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where the Lambda function will run

  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for Lambda ENI placement

  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for Lambda ENI placement

  RDSSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group of the RDS instance (Lambda SG will be allowed ingress)

  RDSEndpoint:
    Type: String
    Description: RDS PostgreSQL endpoint hostname

  RDSPort:
    Type: String
    Default: '5432'
    Description: RDS PostgreSQL port

  RDSUsername:
    Type: String
    Default: claims_user
    Description: RDS master username

  RDSPassword:
    Type: String
    NoEcho: true
    Description: RDS master password

  RDSDBName:
    Type: String
    Default: claims_db
    Description: Name of the PostgreSQL database to seed

# ===========================================================================
# Resources
# ===========================================================================
Resources:

  # -------------------------------------------------------------------------
  # Lambda Security Group — outbound to RDS on port 5432
  # -------------------------------------------------------------------------
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName}-${Environment} - Data seed Lambda (outbound to RDS on 5432)'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: !Ref RDSPort
          ToPort: !Ref RDSPort
          DestinationSecurityGroupId: !Ref RDSSecurityGroupId
          Description: Allow outbound to RDS PostgreSQL
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS outbound for CloudWatch Logs and Secrets Manager
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-sg-data-seed-lambda'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  # -------------------------------------------------------------------------
  # RDS Security Group Ingress — allow Lambda SG on port 5432
  # -------------------------------------------------------------------------
  RDSIngressFromLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RDSSecurityGroupId
      IpProtocol: tcp
      FromPort: !Ref RDSPort
      ToPort: !Ref RDSPort
      SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Description: Allow PostgreSQL access from data-seed Lambda

  # -------------------------------------------------------------------------
  # IAM Role for Lambda — VPC access, CloudWatch Logs, Secrets Manager
  # -------------------------------------------------------------------------
  DataSeedLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-data-seed-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-${Environment}-data-seed:*'
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}-${Environment}-*'
                  - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  # -------------------------------------------------------------------------
  # CloudWatch Log Group for Lambda
  # -------------------------------------------------------------------------
  DataSeedLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ProjectName}-${Environment}-data-seed'
      RetentionInDays: 14
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  # -------------------------------------------------------------------------
  # Lambda Function — Data Seed
  # Uses psycopg2 from the AWS-provided Lambda layer for PostgreSQL access.
  # Invoke with {"action": "seed"} or {"action": "clear"}.
  # -------------------------------------------------------------------------
  DataSeedFunction:
    Type: AWS::Lambda::Function
    DependsOn: DataSeedLogGroup
    Properties:
      FunctionName: !Sub '${ProjectName}-${Environment}-data-seed'
      Description: !Sub 'Seeds ${Environment} RDS PostgreSQL with tenants, members, claims, and entitlements data'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 300
      MemorySize: 256
      Role: !GetAtt DataSeedLambdaRole.Arn
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
      Environment:
        Variables:
          DB_HOST: !Ref RDSEndpoint
          DB_PORT: !Ref RDSPort
          DB_NAME: !Ref RDSDBName
          DB_USER: !Ref RDSUsername
          DB_PASSWORD: !Ref RDSPassword
          ENVIRONMENT: !Ref Environment
      Layers:
        - !Sub 'arn:aws:lambda:${AWS::Region}:898466741470:layer:psycopg2-py312:3'
      Code:
        ZipFile: |
          """
          Claims Processor - Database Seed Script
          Seeds PostgreSQL with tenants (100), members (10), claims (10),
          and entitlements (6 users, 9 roles, 13 privileges).
          Invoke with {"action": "seed"} or {"action": "clear"}.
          Optionally: {"action": "seed", "modules": "tenants"} to seed only tenants.
          """
          import json
          import os
          import logging
          import uuid
          from datetime import datetime, timedelta
          import random

          import psycopg2
          from psycopg2.extras import execute_values

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)


          def get_connection():
              return psycopg2.connect(
                  host=os.environ['DB_HOST'],
                  port=int(os.environ['DB_PORT']),
                  dbname=os.environ['DB_NAME'],
                  user=os.environ['DB_USER'],
                  password=os.environ['DB_PASSWORD'],
                  connect_timeout=30,
              )


          # ---------------------------------------------------------------
          # Tenants — 100 seed records
          # ---------------------------------------------------------------
          def seed_tenants(cur):
              logger.info("Seeding tenants...")
              cur.execute("SELECT COUNT(*) FROM tenants")
              if cur.fetchone()[0] > 0:
                  logger.info("Tenants already exist, skipping.")
                  return 'skip'

              industries = [
                  'Health Insurance', 'Dental Insurance', 'Vision Insurance',
                  'Life Insurance', 'Pharmacy Benefits', 'Workers Compensation',
                  'Medicare Advantage', 'Medicaid Managed Care', 'Behavioral Health',
                  'Specialty Benefits',
              ]
              plans = ['Enterprise', 'Professional', 'Starter']
              statuses_pool = ['ACTIVE'] * 80 + ['TRIAL'] * 10 + ['SUSPENDED'] * 10

              rows = []
              for i in range(1, 101):
                  tid = f'TNT-{i:03d}'
                  industry = industries[(i - 1) % len(industries)]
                  rows.append((
                      tid,
                      f'Tenant {i:03d} - {industry}',
                      statuses_pool[i - 1],
                      plans[(i - 1) % len(plans)],
                      f'tenant{i:03d}.health.io',
                      f'admin@tenant{i:03d}.health.io',
                      f'+1-555-{i:03d}-0000',
                      industry,
                      datetime.utcnow(),
                  ))

              execute_values(cur, """
                  INSERT INTO tenants
                      (tenant_id, name, status, plan, domain, contact_email,
                       contact_phone, industry, created_date)
                  VALUES %s
                  ON CONFLICT (tenant_id) DO NOTHING
              """, rows)
              logger.info(f"Seeded {len(rows)} tenants.")
              return f'{len(rows)} seeded'


          # ---------------------------------------------------------------
          # Members — 10 seed records
          # ---------------------------------------------------------------
          def seed_members(cur):
              logger.info("Seeding members...")
              cur.execute("SELECT COUNT(*) FROM members")
              if cur.fetchone()[0] > 0:
                  logger.info("Members already exist, skipping.")
                  return 'skip'

              names = [
                  ('John', 'Smith'), ('Jane', 'Doe'), ('Robert', 'Johnson'),
                  ('Maria', 'Garcia'), ('David', 'Wilson'), ('Sarah', 'Brown'),
                  ('Michael', 'Chen'), ('Emily', 'Taylor'), ('James', 'Williams'),
                  ('Lisa', 'Anderson'),
              ]
              rows = []
              for i, (fn, ln) in enumerate(names, 1):
                  dob = datetime(1960 + i * 5, (i % 12) + 1, (i % 28) + 1)
                  rows.append((
                      f'MBR-{i:06d}',
                      'TNT-001',
                      fn,
                      ln,
                      dob.strftime('%Y-%m-%d'),
                      'M' if i % 2 == 1 else 'F',
                      f'{fn.lower()}.{ln.lower()}@example.com',
                      f'+1-555-{100 + i:03d}-{1000 + i:04d}',
                      f'{100 + i * 10} Main Street',
                      'Springfield',
                      'IL',
                      f'6{i:04d}',
                      'ACTIVE',
                      datetime.utcnow(),
                  ))

              execute_values(cur, """
                  INSERT INTO members
                      (member_id, tenant_id, first_name, last_name,
                       date_of_birth, gender, email, phone,
                       address_line1, city, state, zip_code,
                       status, created_date)
                  VALUES %s
                  ON CONFLICT (member_id) DO NOTHING
              """, rows)
              logger.info(f"Seeded {len(rows)} members.")
              return f'{len(rows)} seeded'


          # ---------------------------------------------------------------
          # Claims — 10 seed records
          # ---------------------------------------------------------------
          def seed_claims(cur):
              logger.info("Seeding claims...")
              cur.execute("SELECT COUNT(*) FROM claims")
              if cur.fetchone()[0] > 0:
                  logger.info("Claims already exist, skipping.")
                  return 'skip'

              stages = [
                  'INTAKE_RECEIVED', 'DOCUMENT_VERIFICATION', 'DATA_EXTRACTION',
                  'EXTRACTION_REVIEW', 'ELIGIBILITY_CHECK', 'ADJUDICATION',
                  'ADJUDICATION_REVIEW', 'APPROVED', 'DENIED', 'SETTLEMENT',
              ]
              diag_codes = [
                  'J06.9', 'M54.5', 'E11.65', 'I10', 'K21.0',
                  'J45.20', 'M79.3', 'R10.9', 'Z00.00', 'F41.1',
              ]
              cpt_codes = [
                  '99213', '99214', '99215', '99203', '99204',
                  '99283', '99284', '99285', '36415', '80053',
              ]
              rows = []
              for i in range(1, 11):
                  svc_date = (datetime.utcnow() - timedelta(days=random.randint(1, 90))).strftime('%Y-%m-%d')
                  billed = round(random.uniform(150.0, 5000.0), 2)
                  allowed = round(billed * random.uniform(0.5, 0.95), 2)
                  rows.append((
                      f'CLM-2026-{i:06d}',
                      f'MBR-{i:06d}',
                      'TNT-001',
                      stages[i - 1],
                      diag_codes[i - 1],
                      cpt_codes[i - 1],
                      svc_date,
                      f'Provider {i} Medical Group',
                      f'NPI{1000000000 + i}',
                      billed,
                      allowed,
                      datetime.utcnow(),
                  ))

              execute_values(cur, """
                  INSERT INTO claims
                      (claim_number, customer_id, tenant_id, stage,
                       diagnosis_code, cpt_code, service_date,
                       provider_name, provider_npi,
                       amount, allowed_amount, created_date)
                  VALUES %s
                  ON CONFLICT (claim_number) DO NOTHING
              """, rows)
              logger.info(f"Seeded {len(rows)} claims.")
              return f'{len(rows)} seeded'


          # ---------------------------------------------------------------
          # Entitlements — 13 privileges, 9 roles, 6 users
          # ---------------------------------------------------------------
          def seed_entitlements(cur):
              logger.info("Seeding entitlements...")
              results = {}

              # --- 13 Privileges ---
              privileges = [
                  ('CLAIM_CREATE',        'Create new claims'),
                  ('CLAIM_READ',          'View claim details'),
                  ('CLAIM_UPDATE',        'Update existing claims'),
                  ('CLAIM_DELETE',        'Delete claims'),
                  ('CLAIM_ADJUDICATE',   'Adjudicate claims'),
                  ('MEMBER_CREATE',       'Create new members'),
                  ('MEMBER_READ',         'View member details'),
                  ('MEMBER_UPDATE',       'Update member information'),
                  ('MEMBER_DELETE',       'Delete members'),
                  ('REPORT_VIEW',         'View reports and dashboards'),
                  ('REPORT_EXPORT',       'Export report data'),
                  ('ADMIN_MANAGE_USERS', 'Manage user accounts'),
                  ('ADMIN_MANAGE_ROLES', 'Manage roles and privileges'),
              ]

              priv_rows = []
              for code, desc in privileges:
                  priv_rows.append((str(uuid.uuid4()), 'TNT-001', code, desc, datetime.utcnow()))

              execute_values(cur, """
                  INSERT INTO privileges (privilege_id, tenant_id, code, description, created_date)
                  VALUES %s
                  ON CONFLICT (tenant_id, code) DO NOTHING
              """, priv_rows)
              results['privileges'] = f'{len(privileges)} seeded'

              # Build code -> id mapping from DB
              cur.execute("SELECT code, privilege_id FROM privileges WHERE tenant_id = 'TNT-001'")
              priv_map = dict(cur.fetchall())

              # --- 9 Roles ---
              role_defs = {
                  'SUPER_ADMIN':         list(priv_map.keys()),
                  'CLAIMS_MANAGER':      ['CLAIM_CREATE', 'CLAIM_READ', 'CLAIM_UPDATE', 'CLAIM_DELETE', 'CLAIM_ADJUDICATE', 'REPORT_VIEW', 'REPORT_EXPORT'],
                  'CLAIMS_ADJUDICATOR':  ['CLAIM_READ', 'CLAIM_UPDATE', 'CLAIM_ADJUDICATE', 'REPORT_VIEW'],
                  'CLAIMS_PROCESSOR':    ['CLAIM_CREATE', 'CLAIM_READ', 'CLAIM_UPDATE'],
                  'CLAIMS_VIEWER':       ['CLAIM_READ'],
                  'MEMBER_MANAGER':      ['MEMBER_CREATE', 'MEMBER_READ', 'MEMBER_UPDATE', 'MEMBER_DELETE'],
                  'MEMBER_VIEWER':       ['MEMBER_READ'],
                  'REPORT_ANALYST':      ['CLAIM_READ', 'MEMBER_READ', 'REPORT_VIEW', 'REPORT_EXPORT'],
                  'SRE_OPERATOR':        ['CLAIM_READ', 'MEMBER_READ', 'REPORT_VIEW'],
              }

              role_rows = []
              for name in role_defs:
                  role_rows.append((str(uuid.uuid4()), 'TNT-001', name,
                                    name.replace('_', ' ').title() + ' role',
                                    datetime.utcnow()))

              execute_values(cur, """
                  INSERT INTO roles (role_id, tenant_id, name, description, created_date)
                  VALUES %s
                  ON CONFLICT (tenant_id, name) DO NOTHING
              """, role_rows)
              results['roles'] = f'{len(role_defs)} seeded'

              # Build name -> id mapping from DB
              cur.execute("SELECT name, role_id FROM roles WHERE tenant_id = 'TNT-001'")
              role_map = dict(cur.fetchall())

              # Role-Privilege mappings
              rp_rows = []
              for role_name, priv_codes in role_defs.items():
                  rid = role_map.get(role_name)
                  if not rid:
                      continue
                  for code in priv_codes:
                      pid = priv_map.get(code)
                      if pid:
                          rp_rows.append((rid, pid))

              if rp_rows:
                  execute_values(cur, """
                      INSERT INTO role_privileges (role_id, privilege_id)
                      VALUES %s
                      ON CONFLICT DO NOTHING
                  """, rp_rows)
              results['role_privileges'] = f'{len(rp_rows)} mappings'

              # --- 6 Users ---
              users = [
                  ('admin@claims.example.com',           'System',  'Administrator', 'SUPER_ADMIN'),
                  ('claims.manager@claims.example.com',  'Claims',  'Manager',       'CLAIMS_MANAGER'),
                  ('adjudicator@claims.example.com',     'Jane',    'Adjudicator',   'CLAIMS_ADJUDICATOR'),
                  ('processor@claims.example.com',       'John',    'Processor',     'CLAIMS_PROCESSOR'),
                  ('analyst@claims.example.com',         'Data',    'Analyst',       'REPORT_ANALYST'),
                  ('sre@claims.example.com',             'SRE',     'Operator',      'SRE_OPERATOR'),
              ]

              user_rows = []
              user_role_rows = []
              for email, first, last, role_name in users:
                  uid = str(uuid.uuid4())
                  user_rows.append((uid, 'TNT-001', email, first, last, 'ACTIVE', datetime.utcnow()))
                  rid = role_map.get(role_name)
                  if rid:
                      user_role_rows.append((uid, rid))

              execute_values(cur, """
                  INSERT INTO users (user_id, tenant_id, email, first_name, last_name, status, created_date)
                  VALUES %s
                  ON CONFLICT (tenant_id, email) DO NOTHING
              """, user_rows)

              if user_role_rows:
                  execute_values(cur, """
                      INSERT INTO user_roles (user_id, role_id)
                      VALUES %s
                      ON CONFLICT DO NOTHING
                  """, user_role_rows)
              results['users'] = f'{len(users)} seeded'

              return results


          # ---------------------------------------------------------------
          # Clear — remove all seed data in dependency order
          # ---------------------------------------------------------------
          def clear_data(cur):
              logger.info("Clearing all seed data...")
              tables = [
                  'user_roles', 'role_privileges',
                  'users', 'roles', 'privileges',
                  'claims', 'members', 'tenants',
              ]
              results = {}
              for table in tables:
                  try:
                      cur.execute(f"DELETE FROM {table}")
                      results[table] = f'{cur.rowcount} deleted'
                      logger.info(f"  Cleared: {table} ({cur.rowcount} rows)")
                  except Exception as e:
                      results[table] = f'skip: {str(e)}'
                      logger.warning(f"  Skip {table}: {e}")
              return results


          # ---------------------------------------------------------------
          # Handler
          # ---------------------------------------------------------------
          def handler(event, context):
              action = event.get('action', 'seed')
              modules = event.get('modules', 'all')
              env = os.environ.get('ENVIRONMENT', 'unknown')
              logger.info(f"Data seed Lambda invoked. action={action}, modules={modules}, env={env}")

              conn = None
              try:
                  conn = get_connection()
                  conn.autocommit = False
                  cur = conn.cursor()
                  results = {}

                  if action == 'clear':
                      results = clear_data(cur)
                      conn.commit()
                      msg = 'All seed data cleared.'

                  elif action == 'seed':
                      if modules in ('all', 'tenants'):
                          results['tenants'] = seed_tenants(cur)
                      if modules in ('all', 'members'):
                          results['members'] = seed_members(cur)
                      if modules in ('all', 'claims'):
                          results['claims'] = seed_claims(cur)
                      if modules in ('all', 'entitlements'):
                          results['entitlements'] = seed_entitlements(cur)
                      conn.commit()
                      msg = f'Seed completed for modules={modules}.'

                  else:
                      return {
                          'statusCode': 400,
                          'body': json.dumps({'error': f'Unknown action: {action}. Use "seed" or "clear".'})
                      }

                  logger.info(f"{msg} Results: {results}")
                  return {'statusCode': 200, 'body': json.dumps({'message': msg, 'results': results})}

              except Exception as e:
                  logger.error(f"Data seed failed: {e}", exc_info=True)
                  if conn:
                      conn.rollback()
                  return {'statusCode': 500, 'body': json.dumps({'error': str(e)})}
              finally:
                  if conn:
                      conn.close()
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-data-seed'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

# ===========================================================================
# Outputs
# ===========================================================================
Outputs:
  LambdaFunctionArn:
    Description: Data seed Lambda function ARN
    Value: !GetAtt DataSeedFunction.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-DataSeedLambdaArn'

  LambdaFunctionName:
    Description: Data seed Lambda function name
    Value: !Ref DataSeedFunction
    Export:
      Name: !Sub '${ProjectName}-${Environment}-DataSeedLambdaName'

  LambdaSecurityGroupId:
    Description: Security group ID for the data seed Lambda
    Value: !Ref LambdaSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-${Environment}-DataSeedLambdaSGId'
