AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Claims-Processor-With-SRE ElastiCache Redis.
  Provisions ElastiCache Redis replication group with encryption.

# ── IMPORTANT: Redis AuthToken Requirements ──────────────────────────────
# The RedisAuthToken must meet these ElastiCache requirements:
#   - 16 to 128 printable ASCII characters
#   - Cannot contain: / (forward slash), " (double quote), @ (at sign)
#   - Must not contain spaces
# If the token is invalid, the stack will fail with:
#   "Invalid AuthToken provided" (CREATE_FAILED)
# ─────────────────────────────────────────────────────────────────────────

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment

  ProjectName:
    Type: String
    Default: claims-proc
    Description: Project name used for resource naming

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy ElastiCache Redis into

  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for Redis subnet group

  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for Redis subnet group

  AppSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group of the application allowed to access Redis

  RedisNodeType:
    Type: String
    Default: cache.t3.micro
    Description: ElastiCache node instance type

  RedisNumNodes:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 6
    Description: Number of cache nodes in the replication group

  RedisAuthToken:
    Type: String
    NoEcho: true
    MinLength: 16
    MaxLength: 128
    Description: AUTH token for Redis (16-128 printable ASCII chars, no / " @ or spaces)

Resources:
  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName}-${Environment} ElastiCache Redis security group'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref AppSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-sg-redis'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: elasticache-redis

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: !Sub '${ProjectName}-${Environment}-redis-subnet-group'
      Description: !Sub '${ProjectName}-${Environment} Redis subnet group'
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-redis-subnet-group'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: elasticache-redis

  RedisReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupId: !Sub '${ProjectName}-${Environment}-redis'
      ReplicationGroupDescription: !Sub '${ProjectName}-${Environment} ElastiCache Redis replication group'
      Engine: redis
      EngineVersion: '7.1'
      CacheNodeType: !Ref RedisNodeType
      NumCacheClusters: !Ref RedisNumNodes
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds:
        - !Ref RedisSecurityGroup
      AuthToken: !Ref RedisAuthToken
      TransitEncryptionEnabled: true
      AtRestEncryptionEnabled: true
      AutomaticFailoverEnabled: false
      Port: 6379
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-redis'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: elasticache-redis

Outputs:
  RedisEndpoint:
    Description: Primary endpoint address for the Redis replication group
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
    Export:
      Name: !Sub '${ProjectName}-${Environment}-redis-endpoint'

  RedisPort:
    Description: Primary endpoint port for the Redis replication group
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Port
    Export:
      Name: !Sub '${ProjectName}-${Environment}-redis-port'
