AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudWatch Observability and CloudTrail auditing for Claims-Processor-With-SRE.
  Provisions log groups for all microservices, a consolidated dashboard, alarm suite,
  SNS alert topic, and CloudTrail with S3 + CloudWatch Logs integration.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  ProjectName:
    Type: String
    Default: claims-proc
    Description: Short project name used as a prefix for resource names

  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: Number of days to retain CloudWatch log events

  EnableApplicationSignals:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Enable CloudWatch Application Signals SLO resources.
      Creates Availability and Latency SLOs for all 4 API services.
      Ref: https://aws.amazon.com/about-aws/whats-new/2026/03/cloudwatch-application-signals-adds-slo-capabilities/

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  # CloudTrail is expensive and unnecessary in dev — only enable in staging/prod
  EnableCloudTrail: !Not [!Equals [!Ref Environment, 'dev']]
  # Application Signals SLOs — toggle via parameter
  IsAppSignalsEnabled: !Equals [!Ref EnableApplicationSignals, 'true']

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # =========================================================================
  # CloudWatch Log Groups — one per microservice
  # =========================================================================
  LogGroupApiClaims:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/api-claims'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: api-claims
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  LogGroupApiMembers:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/api-members'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: api-members
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  LogGroupApiTenants:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/api-tenants'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: api-tenants
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  LogGroupApiEntitlements:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/api-entitlements'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: api-entitlements
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  LogGroupPortalClaimsAdvisor:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/portal-claims-advisor'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: portal-claims-advisor
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  LogGroupPortalClaimsMember:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/portal-claims-member'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: portal-claims-member
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  LogGroupPortalBatchAssignment:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/portal-batch-assignment'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: portal-batch-assignment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  LogGroupPortalTenants:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/portal-tenants'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: portal-tenants
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  LogGroupPortalEntitlements:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/portal-entitlements'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: portal-entitlements
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  LogGroupPortalSre:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/portal-sre'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: portal-sre
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  # =========================================================================
  # SNS Topic — alarm notifications
  # =========================================================================
  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-${Environment}-alerts'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  # =========================================================================
  # CloudWatch Dashboard
  # =========================================================================
  AppHealthDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'ClaimsProcessor-${Environment}-AppHealth'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 3,
              "properties": {
                "title": "Service Up/Down Status",
                "metrics": [
                  ["${ProjectName}/${Environment}", "ServiceUp", "Service", "api-claims",       {"stat": "Minimum", "period": 60}],
                  ["...",                                                      "api-members",    {"stat": "Minimum", "period": 60}],
                  ["...",                                                      "api-tenants",    {"stat": "Minimum", "period": 60}],
                  ["...",                                                      "api-entitlements",{"stat":"Minimum", "period": 60}],
                  ["...",                                                      "portal-claims-advisor",{"stat":"Minimum","period":60}],
                  ["...",                                                      "portal-claims-member", {"stat":"Minimum","period":60}]
                ],
                "view": "singleValue",
                "region": "${AWS::Region}",
                "period": 60
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 3,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Request Rate (requests/min)",
                "metrics": [
                  ["${ProjectName}/${Environment}", "RequestCount", "Service", "api-claims",       {"stat": "Sum", "period": 60}],
                  ["...",                                                      "api-members",    {"stat": "Sum", "period": 60}],
                  ["...",                                                      "api-tenants",    {"stat": "Sum", "period": 60}],
                  ["...",                                                      "api-entitlements",{"stat":"Sum","period":60}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "period": 60
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 3,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Error Rate (5xx/min)",
                "metrics": [
                  ["${ProjectName}/${Environment}", "Http5xxCount", "Service", "api-claims",       {"stat": "Sum", "period": 60}],
                  ["...",                                                      "api-members",    {"stat": "Sum", "period": 60}],
                  ["...",                                                      "api-tenants",    {"stat": "Sum", "period": 60}],
                  ["...",                                                      "api-entitlements",{"stat":"Sum","period":60}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "period": 60
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 9,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "P99 Latency (ms)",
                "metrics": [
                  ["${ProjectName}/${Environment}", "ResponseTime", "Service", "api-claims",       {"stat": "p99", "period": 60}],
                  ["...",                                                      "api-members",    {"stat": "p99", "period": 60}],
                  ["...",                                                      "api-tenants",    {"stat": "p99", "period": 60}],
                  ["...",                                                      "api-entitlements",{"stat":"p99","period":60}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "period": 60,
                "yAxis": { "left": { "min": 0, "label": "ms" } }
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 9,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "JVM Heap Usage (bytes)",
                "metrics": [
                  ["${ProjectName}/${Environment}", "JvmHeapUsed", "Service", "api-claims",       {"stat": "Average", "period": 60}],
                  ["...",                                                      "api-members",    {"stat": "Average", "period": 60}],
                  ["...",                                                      "api-tenants",    {"stat": "Average", "period": 60}],
                  ["...",                                                      "api-entitlements",{"stat":"Average","period":60}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "period": 60,
                "yAxis": { "left": { "min": 0, "label": "bytes" } }
              }
            }
          ]
        }

  # =========================================================================
  # CloudWatch Alarms
  # =========================================================================
  AlarmHigh5xxRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-High5xxRate'
      AlarmDescription: >-
        Triggers when the 5xx error rate exceeds 1% of total requests over 5 minutes.
      Namespace: !Sub '${ProjectName}/${Environment}'
      MetricName: Http5xxRate
      Dimensions:
        - Name: Service
          Value: api-claims
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1.0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
      OKActions:
        - !Ref AlarmNotificationTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  AlarmHighLatencyP99:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-HighLatencyP99'
      AlarmDescription: >-
        Triggers when P99 response latency exceeds 2000 ms over 5 minutes.
      Namespace: !Sub '${ProjectName}/${Environment}'
      MetricName: ResponseTime
      Dimensions:
        - Name: Service
          Value: api-claims
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 1
      Threshold: 2000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
      OKActions:
        - !Ref AlarmNotificationTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  AlarmLowAvailability:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-LowAvailability'
      AlarmDescription: >-
        Triggers when service availability drops below 99.5% over 5 minutes.
      Namespace: !Sub '${ProjectName}/${Environment}'
      MetricName: AvailabilityPercent
      Dimensions:
        - Name: Service
          Value: api-claims
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 99.5
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
      OKActions:
        - !Ref AlarmNotificationTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  AlarmRdsCpuHigh:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-RDS-CPUHigh'
      AlarmDescription: >-
        Triggers when RDS CPU utilization exceeds 80% over 5 minutes.
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Sub '${ProjectName}-${Environment}-db'
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
      OKActions:
        - !Ref AlarmNotificationTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  AlarmRdsFreeStorageLow:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-RDS-FreeStorageLow'
      AlarmDescription: >-
        Triggers when RDS free storage drops below 5 GB (5368709120 bytes).
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Sub '${ProjectName}-${Environment}-db'
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5368709120
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
      OKActions:
        - !Ref AlarmNotificationTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  # =========================================================================
  # CloudTrail — S3 bucket, trail, CloudWatch Logs integration
  # =========================================================================
  TrailLogsBucket:
    Type: AWS::S3::Bucket
    Condition: EnableCloudTrail
    Properties:
      BucketName: !Sub '${ProjectName}-${Environment}-cloudtrail-logs-${AWS::AccountId}'
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldTrailLogs
            Status: Enabled
            ExpirationInDays: 90
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 30
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  TrailLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: EnableCloudTrail
    Properties:
      Bucket: !Ref TrailLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt TrailLogsBucket.Arn
            Condition:
              StringEquals:
                aws:SourceArn: !Sub 'arn:aws:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/${ProjectName}-${Environment}-trail'
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${TrailLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
                aws:SourceArn: !Sub 'arn:aws:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/${ProjectName}-${Environment}-trail'

  TrailCloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: EnableCloudTrail
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/cloudtrail'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  TrailCloudWatchRole:
    Type: AWS::IAM::Role
    Condition: EnableCloudTrail
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-cloudtrail-cw-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudTrailToCloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt TrailCloudWatchLogGroup.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  CloudTrail:
    Type: AWS::CloudTrail::Trail
    Condition: EnableCloudTrail
    DependsOn:
      - TrailLogsBucketPolicy
    Properties:
      TrailName: !Sub '${ProjectName}-${Environment}-trail'
      IsLogging: true
      IsMultiRegionTrail: false
      IncludeGlobalServiceEvents: true
      S3BucketName: !Ref TrailLogsBucket
      CloudWatchLogsLogGroupArn: !GetAtt TrailCloudWatchLogGroup.Arn
      CloudWatchLogsRoleArn: !GetAtt TrailCloudWatchRole.Arn
      EnableLogFileValidation: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: observability

  # =========================================================================
  # CloudWatch Application Signals — SLO Definitions (feature-toggled)
  # Ref: https://aws.amazon.com/about-aws/whats-new/2026/03/cloudwatch-application-signals-adds-slo-capabilities/
  # Creates Availability (99.9%) and Latency P99 (<500ms) SLOs for each API service.
  # =========================================================================

  # --- API-Claims SLOs ---
  SloApiClaimsAvailability:
    Type: AWS::CloudWatch::ServiceLevelObjective
    Condition: IsAppSignalsEnabled
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-api-claims-availability'
      Description: 'API-Claims availability SLO — 99.9% success rate (error rate < 0.1%)'
      SliConfig:
        SliMetricConfig:
          KeyAttributes:
            Type: Service
            Name: api-claims
            Environment: !Ref Environment
          MetricType: AVAILABILITY
      Goal:
        AttainmentGoal: 99.9
        Interval:
          RollingInterval:
            DurationUnit: DAY
            Duration: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: SloType
          Value: availability
        - Key: Service
          Value: api-claims
        - Key: ManagedBy
          Value: github-actions

  SloApiClaimsLatencyP99:
    Type: AWS::CloudWatch::ServiceLevelObjective
    Condition: IsAppSignalsEnabled
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-api-claims-latency-p99'
      Description: 'API-Claims latency SLO — P99 response time < 500ms'
      SliConfig:
        SliMetricConfig:
          KeyAttributes:
            Type: Service
            Name: api-claims
            Environment: !Ref Environment
          MetricType: LATENCY
          Statistic: p99
      Goal:
        AttainmentGoal: 99.0
        WarningThreshold: 500
        Interval:
          RollingInterval:
            DurationUnit: DAY
            Duration: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: SloType
          Value: latency
        - Key: Service
          Value: api-claims
        - Key: ManagedBy
          Value: github-actions

  # --- API-Members SLOs ---
  SloApiMembersAvailability:
    Type: AWS::CloudWatch::ServiceLevelObjective
    Condition: IsAppSignalsEnabled
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-api-members-availability'
      Description: 'API-Members availability SLO — 99.9% success rate'
      SliConfig:
        SliMetricConfig:
          KeyAttributes:
            Type: Service
            Name: api-members
            Environment: !Ref Environment
          MetricType: AVAILABILITY
      Goal:
        AttainmentGoal: 99.9
        Interval:
          RollingInterval:
            DurationUnit: DAY
            Duration: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: SloType
          Value: availability
        - Key: Service
          Value: api-members
        - Key: ManagedBy
          Value: github-actions

  SloApiMembersLatencyP99:
    Type: AWS::CloudWatch::ServiceLevelObjective
    Condition: IsAppSignalsEnabled
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-api-members-latency-p99'
      Description: 'API-Members latency SLO — P99 response time < 500ms'
      SliConfig:
        SliMetricConfig:
          KeyAttributes:
            Type: Service
            Name: api-members
            Environment: !Ref Environment
          MetricType: LATENCY
          Statistic: p99
      Goal:
        AttainmentGoal: 99.0
        WarningThreshold: 500
        Interval:
          RollingInterval:
            DurationUnit: DAY
            Duration: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: SloType
          Value: latency
        - Key: Service
          Value: api-members
        - Key: ManagedBy
          Value: github-actions

  # --- API-Tenants SLOs ---
  SloApiTenantsAvailability:
    Type: AWS::CloudWatch::ServiceLevelObjective
    Condition: IsAppSignalsEnabled
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-api-tenants-availability'
      Description: 'API-Tenants availability SLO — 99.9% success rate'
      SliConfig:
        SliMetricConfig:
          KeyAttributes:
            Type: Service
            Name: api-tenants
            Environment: !Ref Environment
          MetricType: AVAILABILITY
      Goal:
        AttainmentGoal: 99.9
        Interval:
          RollingInterval:
            DurationUnit: DAY
            Duration: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: SloType
          Value: availability
        - Key: Service
          Value: api-tenants
        - Key: ManagedBy
          Value: github-actions

  SloApiTenantsLatencyP99:
    Type: AWS::CloudWatch::ServiceLevelObjective
    Condition: IsAppSignalsEnabled
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-api-tenants-latency-p99'
      Description: 'API-Tenants latency SLO — P99 response time < 500ms'
      SliConfig:
        SliMetricConfig:
          KeyAttributes:
            Type: Service
            Name: api-tenants
            Environment: !Ref Environment
          MetricType: LATENCY
          Statistic: p99
      Goal:
        AttainmentGoal: 99.0
        WarningThreshold: 500
        Interval:
          RollingInterval:
            DurationUnit: DAY
            Duration: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: SloType
          Value: latency
        - Key: Service
          Value: api-tenants
        - Key: ManagedBy
          Value: github-actions

  # --- API-Entitlements SLOs ---
  SloApiEntitlementsAvailability:
    Type: AWS::CloudWatch::ServiceLevelObjective
    Condition: IsAppSignalsEnabled
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-api-entitlements-availability'
      Description: 'API-Entitlements availability SLO — 99.9% success rate'
      SliConfig:
        SliMetricConfig:
          KeyAttributes:
            Type: Service
            Name: api-entitlements
            Environment: !Ref Environment
          MetricType: AVAILABILITY
      Goal:
        AttainmentGoal: 99.9
        Interval:
          RollingInterval:
            DurationUnit: DAY
            Duration: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: SloType
          Value: availability
        - Key: Service
          Value: api-entitlements
        - Key: ManagedBy
          Value: github-actions

  SloApiEntitlementsLatencyP99:
    Type: AWS::CloudWatch::ServiceLevelObjective
    Condition: IsAppSignalsEnabled
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-api-entitlements-latency-p99'
      Description: 'API-Entitlements latency SLO — P99 response time < 500ms'
      SliConfig:
        SliMetricConfig:
          KeyAttributes:
            Type: Service
            Name: api-entitlements
            Environment: !Ref Environment
          MetricType: LATENCY
          Statistic: p99
      Goal:
        AttainmentGoal: 99.0
        WarningThreshold: 500
        Interval:
          RollingInterval:
            DurationUnit: DAY
            Duration: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: SloType
          Value: latency
        - Key: Service
          Value: api-entitlements
        - Key: ManagedBy
          Value: github-actions

