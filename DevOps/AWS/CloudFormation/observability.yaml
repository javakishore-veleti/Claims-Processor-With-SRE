AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudWatch Observability and CloudTrail auditing for Claims-Processor-With-SRE.
  Provisions log groups for all microservices, a consolidated dashboard, alarm suite,
  SNS alert topic, and CloudTrail with S3 + CloudWatch Logs integration.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  ProjectName:
    Type: String
    Default: claims-proc
    Description: Short project name used as a prefix for resource names

  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: Number of days to retain CloudWatch log events

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # =========================================================================
  # CloudWatch Log Groups — one per microservice
  # =========================================================================
  LogGroupApiClaims:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/api-claims'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: api-claims

  LogGroupApiMembers:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/api-members'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: api-members

  LogGroupApiTenants:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/api-tenants'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: api-tenants

  LogGroupApiEntitlements:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/api-entitlements'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: api-entitlements

  LogGroupPortalClaimsAdvisor:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/portal-claims-advisor'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: portal-claims-advisor

  LogGroupPortalClaimsMember:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/portal-claims-member'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: portal-claims-member

  LogGroupPortalBatchAssignment:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/portal-batch-assignment'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: portal-batch-assignment

  LogGroupPortalTenants:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/portal-tenants'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: portal-tenants

  LogGroupPortalEntitlements:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/portal-entitlements'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: portal-entitlements

  LogGroupPortalSre:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/portal-sre'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: portal-sre

  # =========================================================================
  # SNS Topic — alarm notifications
  # =========================================================================
  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectName}-${Environment}-alerts'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # =========================================================================
  # CloudWatch Dashboard
  # =========================================================================
  AppHealthDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'ClaimsProcessor-${Environment}-AppHealth'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 3,
              "properties": {
                "title": "Service Up/Down Status",
                "metrics": [
                  ["${ProjectName}/${Environment}", "ServiceUp", "Service", "api-claims",       {"stat": "Minimum", "period": 60}],
                  ["...",                                                      "api-members",    {"stat": "Minimum", "period": 60}],
                  ["...",                                                      "api-tenants",    {"stat": "Minimum", "period": 60}],
                  ["...",                                                      "api-entitlements",{"stat":"Minimum", "period": 60}],
                  ["...",                                                      "portal-claims-advisor",{"stat":"Minimum","period":60}],
                  ["...",                                                      "portal-claims-member", {"stat":"Minimum","period":60}]
                ],
                "view": "singleValue",
                "region": "${AWS::Region}",
                "period": 60
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 3,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Request Rate (requests/min)",
                "metrics": [
                  ["${ProjectName}/${Environment}", "RequestCount", "Service", "api-claims",       {"stat": "Sum", "period": 60}],
                  ["...",                                                      "api-members",    {"stat": "Sum", "period": 60}],
                  ["...",                                                      "api-tenants",    {"stat": "Sum", "period": 60}],
                  ["...",                                                      "api-entitlements",{"stat":"Sum","period":60}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "period": 60
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 3,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Error Rate (5xx/min)",
                "metrics": [
                  ["${ProjectName}/${Environment}", "Http5xxCount", "Service", "api-claims",       {"stat": "Sum", "period": 60}],
                  ["...",                                                      "api-members",    {"stat": "Sum", "period": 60}],
                  ["...",                                                      "api-tenants",    {"stat": "Sum", "period": 60}],
                  ["...",                                                      "api-entitlements",{"stat":"Sum","period":60}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "period": 60
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 9,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "P99 Latency (ms)",
                "metrics": [
                  ["${ProjectName}/${Environment}", "ResponseTime", "Service", "api-claims",       {"stat": "p99", "period": 60}],
                  ["...",                                                      "api-members",    {"stat": "p99", "period": 60}],
                  ["...",                                                      "api-tenants",    {"stat": "p99", "period": 60}],
                  ["...",                                                      "api-entitlements",{"stat":"p99","period":60}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "period": 60,
                "yAxis": { "left": { "min": 0, "label": "ms" } }
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 9,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "JVM Heap Usage (bytes)",
                "metrics": [
                  ["${ProjectName}/${Environment}", "JvmHeapUsed", "Service", "api-claims",       {"stat": "Average", "period": 60}],
                  ["...",                                                      "api-members",    {"stat": "Average", "period": 60}],
                  ["...",                                                      "api-tenants",    {"stat": "Average", "period": 60}],
                  ["...",                                                      "api-entitlements",{"stat":"Average","period":60}]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "period": 60,
                "yAxis": { "left": { "min": 0, "label": "bytes" } }
              }
            }
          ]
        }

  # =========================================================================
  # CloudWatch Alarms
  # =========================================================================
  AlarmHigh5xxRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-High5xxRate'
      AlarmDescription: >-
        Triggers when the 5xx error rate exceeds 1% of total requests over 5 minutes.
      Namespace: !Sub '${ProjectName}/${Environment}'
      MetricName: Http5xxRate
      Dimensions:
        - Name: Service
          Value: api-claims
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1.0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
      OKActions:
        - !Ref AlarmNotificationTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  AlarmHighLatencyP99:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-HighLatencyP99'
      AlarmDescription: >-
        Triggers when P99 response latency exceeds 2000 ms over 5 minutes.
      Namespace: !Sub '${ProjectName}/${Environment}'
      MetricName: ResponseTime
      Dimensions:
        - Name: Service
          Value: api-claims
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 1
      Threshold: 2000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
      OKActions:
        - !Ref AlarmNotificationTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  AlarmLowAvailability:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-LowAvailability'
      AlarmDescription: >-
        Triggers when service availability drops below 99.5% over 5 minutes.
      Namespace: !Sub '${ProjectName}/${Environment}'
      MetricName: AvailabilityPercent
      Dimensions:
        - Name: Service
          Value: api-claims
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 99.5
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
      OKActions:
        - !Ref AlarmNotificationTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  AlarmRdsCpuHigh:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-RDS-CPUHigh'
      AlarmDescription: >-
        Triggers when RDS CPU utilization exceeds 80% over 5 minutes.
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Sub '${ProjectName}-${Environment}-db'
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
      OKActions:
        - !Ref AlarmNotificationTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  AlarmRdsFreeStorageLow:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-RDS-FreeStorageLow'
      AlarmDescription: >-
        Triggers when RDS free storage drops below 5 GB (5368709120 bytes).
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !Sub '${ProjectName}-${Environment}-db'
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5368709120
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic
      OKActions:
        - !Ref AlarmNotificationTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # =========================================================================
  # CloudTrail — S3 bucket, trail, CloudWatch Logs integration
  # =========================================================================
  TrailLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-${Environment}-cloudtrail-logs-${AWS::AccountId}'
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldTrailLogs
            Status: Enabled
            ExpirationInDays: !Ref LogRetentionDays
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 30
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  TrailLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TrailLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt TrailLogsBucket.Arn
            Condition:
              StringEquals:
                aws:SourceArn: !Sub 'arn:aws:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/${ProjectName}-${Environment}-trail'
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${TrailLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
                aws:SourceArn: !Sub 'arn:aws:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/${ProjectName}-${Environment}-trail'

  TrailCloudWatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/${ProjectName}/${Environment}/cloudtrail'
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  TrailCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-cloudtrail-cw-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudTrailToCloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt TrailCloudWatchLogGroup.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  CloudTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn:
      - TrailLogsBucketPolicy
    Properties:
      TrailName: !Sub '${ProjectName}-${Environment}-trail'
      IsLogging: true
      IsMultiRegionTrail: false
      IncludeGlobalServiceEvents: true
      S3BucketName: !Ref TrailLogsBucket
      CloudWatchLogsLogGroupArn: !GetAtt TrailCloudWatchLogGroup.Arn
      CloudWatchLogsRoleArn: !GetAtt TrailCloudWatchRole.Arn
      EnableLogFileValidation: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  LogGroupArnApiClaims:
    Description: ARN of the api-claims log group
    Value: !GetAtt LogGroupApiClaims.Arn

  LogGroupArnApiMembers:
    Description: ARN of the api-members log group
    Value: !GetAtt LogGroupApiMembers.Arn

  LogGroupArnApiTenants:
    Description: ARN of the api-tenants log group
    Value: !GetAtt LogGroupApiTenants.Arn

  LogGroupArnApiEntitlements:
    Description: ARN of the api-entitlements log group
    Value: !GetAtt LogGroupApiEntitlements.Arn

  LogGroupArnPortalClaimsAdvisor:
    Description: ARN of the portal-claims-advisor log group
    Value: !GetAtt LogGroupPortalClaimsAdvisor.Arn

  LogGroupArnPortalClaimsMember:
    Description: ARN of the portal-claims-member log group
    Value: !GetAtt LogGroupPortalClaimsMember.Arn

  LogGroupArnPortalBatchAssignment:
    Description: ARN of the portal-batch-assignment log group
    Value: !GetAtt LogGroupPortalBatchAssignment.Arn

  LogGroupArnPortalTenants:
    Description: ARN of the portal-tenants log group
    Value: !GetAtt LogGroupPortalTenants.Arn

  LogGroupArnPortalEntitlements:
    Description: ARN of the portal-entitlements log group
    Value: !GetAtt LogGroupPortalEntitlements.Arn

  LogGroupArnPortalSre:
    Description: ARN of the portal-sre log group
    Value: !GetAtt LogGroupPortalSre.Arn

  DashboardName:
    Description: Name of the CloudWatch dashboard
    Value: !Sub 'ClaimsProcessor-${Environment}-AppHealth'

  AlarmTopicArn:
    Description: ARN of the SNS topic for alarm notifications
    Value: !Ref AlarmNotificationTopic

  TrailArn:
    Description: ARN of the CloudTrail trail
    Value: !GetAtt CloudTrail.Arn
