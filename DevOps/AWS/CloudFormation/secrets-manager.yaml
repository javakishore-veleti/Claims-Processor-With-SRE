AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Claims Processor - Secrets Manager
  Provisions AWS Secrets Manager secrets for all service credentials
  including RDS, Redis, messaging, OpenSearch, Cognito, encryption keys,
  and JWT signing keys.

# ============================================================
# Parameters
# ============================================================
Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  ProjectName:
    Type: String
    Default: claims-proc
    Description: Project name prefix for resource naming

# ============================================================
# Resources
# ============================================================
Resources:

  # ----------------------------------------------------------
  # RDS Credentials
  # ----------------------------------------------------------
  RDSCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/rds-credentials'
      Description: !Sub 'RDS PostgreSQL credentials for ${ProjectName} ${Environment}'
      GenerateSecretString:
        SecretStringTemplate: !Sub |
          {
            "username": "claims_user",
            "host": "placeholder-rds-endpoint.${AWS::Region}.rds.amazonaws.com",
            "port": "5432",
            "dbname": "claims_db"
          }
        GenerateStringKey: password
        PasswordLength: 32
        ExcludePunctuation: false
        ExcludeCharacters: '"@/\\'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: secrets-manager
        - Key: Service
          Value: rds

  # ----------------------------------------------------------
  # Redis Credentials
  # ----------------------------------------------------------
  RedisCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/redis-credentials'
      Description: !Sub 'Redis / ElastiCache credentials for ${ProjectName} ${Environment}'
      GenerateSecretString:
        SecretStringTemplate: !Sub |
          {
            "host": "placeholder-redis-endpoint.${AWS::Region}.cache.amazonaws.com",
            "port": "6379"
          }
        GenerateStringKey: auth-token
        PasswordLength: 64
        ExcludePunctuation: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: secrets-manager
        - Key: Service
          Value: redis

  # ----------------------------------------------------------
  # Messaging Credentials (Kafka / Kinesis bootstrap)
  # ----------------------------------------------------------
  MessagingCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/messaging-credentials'
      Description: !Sub 'Messaging (Kafka/Kinesis) credentials for ${ProjectName} ${Environment}'
      GenerateSecretString:
        SecretStringTemplate: !Sub |
          {
            "bootstrap-servers": "placeholder-broker.${AWS::Region}.kafka.amazonaws.com:9092"
          }
        GenerateStringKey: sasl-password
        PasswordLength: 32
        ExcludePunctuation: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: secrets-manager
        - Key: Service
          Value: messaging

  # ----------------------------------------------------------
  # OpenSearch Credentials
  # ----------------------------------------------------------
  OpenSearchCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/opensearch-credentials'
      Description: !Sub 'OpenSearch credentials for ${ProjectName} ${Environment}'
      GenerateSecretString:
        SecretStringTemplate: !Sub |
          {
            "endpoint": "https://placeholder-opensearch.${AWS::Region}.es.amazonaws.com",
            "username": "claimsadmin"
          }
        GenerateStringKey: password
        PasswordLength: 32
        ExcludePunctuation: false
        ExcludeCharacters: '"@/\\'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: secrets-manager
        - Key: Service
          Value: opensearch

  # ----------------------------------------------------------
  # Cognito Configuration
  # ----------------------------------------------------------
  CognitoConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/cognito-config'
      Description: !Sub 'Cognito configuration for ${ProjectName} ${Environment}'
      GenerateSecretString:
        SecretStringTemplate: !Sub |
          {
            "user-pool-id": "placeholder-${AWS::Region}_XXXXXXXXX",
            "client-id": "placeholder-client-id"
          }
        GenerateStringKey: client-secret
        PasswordLength: 64
        ExcludePunctuation: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: secrets-manager
        - Key: Service
          Value: cognito

  # ----------------------------------------------------------
  # Encryption Keys (AES-256-GCM)
  # ----------------------------------------------------------
  EncryptionKeysSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/encryption-keys'
      Description: !Sub 'AES-256-GCM encryption keys for ${ProjectName} ${Environment}'
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: aes-key
        PasswordLength: 44
        ExcludePunctuation: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: secrets-manager
        - Key: Service
          Value: encryption

  # ----------------------------------------------------------
  # JWT Signing Key
  # ----------------------------------------------------------
  JWTSigningKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${ProjectName}/${Environment}/jwt-signing-key'
      Description: !Sub 'JWT signing key for ${ProjectName} ${Environment}'
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: signing-key
        PasswordLength: 64
        ExcludePunctuation: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: github-actions
        - Key: Component
          Value: secrets-manager
        - Key: Service
          Value: jwt

# ============================================================
# Outputs
# ============================================================
Outputs:
  RDSCredentialsSecretArn:
    Description: ARN of the RDS credentials secret
    Value: !Ref RDSCredentialsSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-secret-rds-credentials-arn'

  RedisCredentialsSecretArn:
    Description: ARN of the Redis credentials secret
    Value: !Ref RedisCredentialsSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-secret-redis-credentials-arn'

  MessagingCredentialsSecretArn:
    Description: ARN of the messaging credentials secret
    Value: !Ref MessagingCredentialsSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-secret-messaging-credentials-arn'

  OpenSearchCredentialsSecretArn:
    Description: ARN of the OpenSearch credentials secret
    Value: !Ref OpenSearchCredentialsSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-secret-opensearch-credentials-arn'

  CognitoConfigSecretArn:
    Description: ARN of the Cognito configuration secret
    Value: !Ref CognitoConfigSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-secret-cognito-config-arn'

  EncryptionKeysSecretArn:
    Description: ARN of the encryption keys secret
    Value: !Ref EncryptionKeysSecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-secret-encryption-keys-arn'

  JWTSigningKeySecretArn:
    Description: ARN of the JWT signing key secret
    Value: !Ref JWTSigningKeySecret
    Export:
      Name: !Sub '${ProjectName}-${Environment}-secret-jwt-signing-key-arn'
