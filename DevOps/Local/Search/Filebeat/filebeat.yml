filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/claims/*.json
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: message

output.elasticsearch:
  hosts: ["http://Claims-Processor-elasticsearch:9200"]
  index: "claims-app-logs-%{+yyyy.MM.dd}"

setup.template.name: "claims-app-logs"
setup.template.pattern: "claims-app-logs-*"
setup.ilm.enabled: false
