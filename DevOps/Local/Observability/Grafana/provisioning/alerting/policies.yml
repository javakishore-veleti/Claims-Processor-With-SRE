apiVersion: 1

policies:
  - orgId: 1
    receiver: claims-default
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: claims-default
        matchers:
          - severity = critical
        repeat_interval: 1h
        continue: false
      - receiver: claims-default
        matchers:
          - type = slo
        repeat_interval: 30m
        continue: false
