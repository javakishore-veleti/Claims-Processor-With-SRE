apiVersion: 1

providers:
  - name: 'Claims Processor Dashboards'
    orgId: 1
    folder: 'Claims Processor SRE'
    folderUid: 'claims-processor-sre'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
