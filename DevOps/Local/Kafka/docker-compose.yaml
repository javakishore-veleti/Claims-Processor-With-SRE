
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: Claims-Processor-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 5"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - claims-processor-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: Claims-Processor-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: Claims-Processor-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - claims-processor-net

  kafka-init-topics:
    image: confluentinc/cp-kafka:7.6.0
    container_name: Claims-Processor-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating default Kafka topics...'
      kafka-topics --bootstrap-server Claims-Processor-kafka:9092 --create --if-not-exists --topic claims-submitted   --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server Claims-Processor-kafka:9092 --create --if-not-exists --topic claims-validated   --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server Claims-Processor-kafka:9092 --create --if-not-exists --topic claims-adjudicated --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server Claims-Processor-kafka:9092 --create --if-not-exists --topic claims-paid        --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server Claims-Processor-kafka:9092 --create --if-not-exists --topic claims-denied      --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server Claims-Processor-kafka:9092 --create --if-not-exists --topic claims-dlq         --partitions 1 --replication-factor 1
      echo 'Topics created successfully.'
      kafka-topics --bootstrap-server Claims-Processor-kafka:9092 --list
      "
    restart: "no"
    networks:
      - claims-processor-net

networks:
  claims-processor-net:
    external: true
    name: claims-processor-network
