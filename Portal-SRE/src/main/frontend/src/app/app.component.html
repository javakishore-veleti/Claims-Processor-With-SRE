<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar" style="background: #0f172a;">
    <div class="sidebar-header">
      <h2>SRE Ops</h2>
      <div class="subtitle">Site Reliability</div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">
        <span class="icon">&#9633;</span> Dashboard
      </a>
      <a class="nav-item" [class.active]="activeNav === 'health'" (click)="setActiveNav('health')">
        <span class="icon">&#9829;</span> Service Health
      </a>
      <a class="nav-item" [class.active]="activeNav === 'incidents'" (click)="setActiveNav('incidents')">
        <span class="icon">&#9888;</span> Incidents
      </a>
      <a class="nav-item" [class.active]="activeNav === 'deployments'" (click)="setActiveNav('deployments')">
        <span class="icon">&#128640;</span> Deployments
      </a>
      <a class="nav-item" [class.active]="activeNav === 'cloud'" (click)="setActiveNav('cloud')">
        <span class="icon">&#9729;</span> Cloud Resources
      </a>
      <a class="nav-item" [class.active]="activeNav === 'analytics'" (click)="setActiveNav('analytics')">
        <span class="icon">&#128200;</span> Tenant Analytics
      </a>
      <a class="nav-item" [class.active]="activeNav === 'slo'" (click)="setActiveNav('slo')">
        <span class="icon">&#127919;</span> SLO Compliance
      </a>
      <a class="nav-item" [class.active]="activeNav === 'cost'" (click)="setActiveNav('cost')">
        <span class="icon">&#128176;</span> Cost Tracking
      </a>
    </nav>
    <div class="sidebar-footer">
      SRE Portal v4.2.0
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Top Header -->
    <header class="top-header" style="background: #f8fafc; border-bottom-color: #e2e8f0;">
      <h1>SRE Operations Dashboard</h1>
      <div class="header-actions">
        <input type="text" class="search-box" placeholder="Search services...">
        <div class="user-avatar" style="background: #0f172a;">SR</div>
      </div>
    </header>

    <!-- Content Area -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
