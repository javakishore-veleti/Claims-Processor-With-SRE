# Dev environment profile - PostgreSQL defaults, debug logging
# Activate with: --spring.profiles.active=dev
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/claims_db}
    username: ${DB_USERNAME:claims_user}
    password: ${DB_PASSWORD:claims_pass}
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  thymeleaf:
    cache: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:claims_redis}

management:
  health:
    redis:
      enabled: true
    kafka:
      enabled: true
    elasticsearch:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4317

logging:
  level:
    root: INFO
    com.healthcare.claims.portal.sre: DEBUG
