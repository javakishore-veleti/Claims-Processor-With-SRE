<div class="data-table-container">
  <div class="data-table-header">
    <h3>Claims</h3>
    <input class="search-input" type="text" placeholder="Search claims..." [(ngModel)]="searchQuery" />
  </div>
  <div *ngIf="loading" style="padding: 2rem; text-align: center; color: var(--gray-500);">Loading claims...</div>
  <table class="data-table" *ngIf="!loading">
    <thead>
      <tr>
        <th>Claim #</th>
        <th>Member</th>
        <th>Stage</th>
        <th>Amount</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let claim of filteredClaims">
        <td><strong>{{ claim.claimNumber }}</strong></td>
        <td>{{ claim.memberName || claim.customerId }}</td>
        <td><span class="badge" [ngClass]="getStageClass(claim.stage)">{{ claim.stage }}</span></td>
        <td>{{ claim.amount ? ('$' + claim.amount.toFixed(2)) : 'N/A' }}</td>
        <td>{{ claim.submittedDate }}</td>
        <td>
          <button class="btn btn-outline btn-sm">View</button>
        </td>
      </tr>
      <tr *ngIf="filteredClaims.length === 0">
        <td colspan="6" style="text-align: center; color: var(--gray-500); padding: 2rem;">No claims found</td>
      </tr>
    </tbody>
  </table>
</div>
