server:
  port: 8081

spring:
  application:
    name: portal-claims-advisor
  datasource:
    url: ${DB_URL:jdbc:h2:mem:claimsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: portal-claims-advisor
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

claims:
  service-client:
    auth:
      enabled: false
      provider: none
    services:
      api-claims:
        url: ${API_CLAIMS_URL:http://localhost:8083}
      api-members:
        url: ${API_MEMBERS_URL:http://localhost:8084}
      api-tenants:
        url: ${API_TENANTS_URL:http://localhost:8086}
      api-entitlements:
        url: ${API_ENTITLEMENTS_URL:http://localhost:8087}
