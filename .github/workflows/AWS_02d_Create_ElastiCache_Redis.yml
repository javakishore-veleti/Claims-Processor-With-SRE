name: "AWS_02d - Create ElastiCache Redis"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      redis_node_type:
        description: "Redis node instance type"
        required: false
        type: string
        default: "cache.t3.micro"

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: claims-proc

jobs:
  deploy-redis:
    name: Deploy ElastiCache Redis (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials ─────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 3. Resolve VPC networking ────────────────────────────────────────
      - name: Resolve VPC networking from VPC stack
        id: vpc
        run: |
          ENV="${{ inputs.environment }}"
          STACK="${{ env.PROJECT_NAME }}-${ENV}-vpc-sg"

          echo "Querying stack: ${STACK}"

          VPC_ID=$(aws cloudformation describe-stacks \
            --stack-name "${STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='VpcId'].OutputValue" \
            --output text)

          PRIVATE_SUBNET_1=$(aws cloudformation describe-stacks \
            --stack-name "${STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='PrivateSubnet1'].OutputValue" \
            --output text)

          PRIVATE_SUBNET_2=$(aws cloudformation describe-stacks \
            --stack-name "${STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='PrivateSubnet2'].OutputValue" \
            --output text)

          APP_SG_ID=$(aws cloudformation describe-stacks \
            --stack-name "${STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='AppSecurityGroupId'].OutputValue" \
            --output text)

          echo "VPC_ID=${VPC_ID}"
          echo "PRIVATE_SUBNET_1=${PRIVATE_SUBNET_1}"
          echo "PRIVATE_SUBNET_2=${PRIVATE_SUBNET_2}"
          echo "APP_SG_ID=${APP_SG_ID}"

          echo "vpc_id=${VPC_ID}" >> "$GITHUB_OUTPUT"
          echo "private_subnet_1=${PRIVATE_SUBNET_1}" >> "$GITHUB_OUTPUT"
          echo "private_subnet_2=${PRIVATE_SUBNET_2}" >> "$GITHUB_OUTPUT"
          echo "app_sg_id=${APP_SG_ID}" >> "$GITHUB_OUTPUT"

      # ── 4. Validate Redis AuthToken ──────────────────────────────────────
      - name: Validate Redis AuthToken
        run: |
          TOKEN="${{ secrets.CLAIMS_PROC_REDIS_AUTH_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            echo "::error::CLAIMS_PROC_REDIS_AUTH_TOKEN secret is not set."
            echo "Go to: Settings > Secrets > Actions > New repository secret"
            echo "Name: CLAIMS_PROC_REDIS_AUTH_TOKEN"
            echo "Value: a strong token (16-128 chars, printable ASCII, no / \" or @)"
            exit 1
          fi
          LEN=${#TOKEN}
          if [ "$LEN" -lt 16 ] || [ "$LEN" -gt 128 ]; then
            echo "::error::CLAIMS_PROC_REDIS_AUTH_TOKEN must be 16-128 characters (current: ${LEN})."
            exit 1
          fi
          if echo "$TOKEN" | grep -qP '[/"@\s]'; then
            echo "::error::CLAIMS_PROC_REDIS_AUTH_TOKEN contains invalid characters (/, \", @, or spaces)."
            echo "ElastiCache auth tokens must be printable ASCII without / \" @ or spaces."
            exit 1
          fi
          echo "Redis auth token validated (${LEN} chars)."

      # ── 5. Pre-flight stack state check ──────────────────────────────────
      - name: Pre-flight stack state check
        id: preflight
        run: |
          ENV="${{ inputs.environment }}"
          STACK="${{ env.PROJECT_NAME }}-${ENV}-redis"

          echo "Checking stack: ${STACK}"

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${STACK}" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Stack status: ${STACK_STATUS}"
          echo "stack_status=${STACK_STATUS}" >> "$GITHUB_OUTPUT"

          if [[ "${STACK_STATUS}" == *"FAILED"* ]] || [[ "${STACK_STATUS}" == *"ROLLBACK_COMPLETE"* ]]; then
            echo "Stack is in a failed state. Will attempt cleanup before deploy."
            echo "needs_cleanup=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_cleanup=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 6. Pre-flight orphan cleanup ─────────────────────────────────────
      - name: Pre-flight orphan cleanup
        if: steps.preflight.outputs.needs_cleanup == 'true'
        run: |
          ENV="${{ inputs.environment }}"
          PRJ="${{ env.PROJECT_NAME }}"
          STACK="${PRJ}-${ENV}-redis"
          VPC_ID="${{ steps.vpc.outputs.vpc_id }}"

          echo "=== Cleaning up failed stack: ${STACK} ==="
          aws cloudformation delete-stack --stack-name "${STACK}" 2>/dev/null || true
          echo "Waiting for stack deletion..."
          aws cloudformation wait stack-delete-complete --stack-name "${STACK}" 2>/dev/null || true
          echo "Stack deleted."

          # Check for orphaned Redis replication group
          echo "=== Checking for orphaned Redis replication group ==="
          RG_STATUS=$(aws elasticache describe-replication-groups \
            --replication-group-id "${PRJ}-${ENV}-redis" \
            --query "ReplicationGroups[0].Status" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "${RG_STATUS}" != "NOT_FOUND" ]; then
            echo "Found orphaned replication group (status: ${RG_STATUS}). Deleting..."
            aws elasticache delete-replication-group \
              --replication-group-id "${PRJ}-${ENV}-redis" \
              --no-retain-primary-cluster 2>/dev/null || true
            echo "Waiting for replication group deletion (this may take 5-10 minutes)..."
            aws elasticache wait replication-group-deleted \
              --replication-group-id "${PRJ}-${ENV}-redis" 2>/dev/null || true
            echo "Replication group deleted."
          else
            echo "No orphaned replication group found."
          fi

          # Check for orphaned Redis subnet group
          echo "=== Checking for orphaned Redis subnet group ==="
          aws elasticache describe-cache-subnet-groups \
            --cache-subnet-group-name "${PRJ}-${ENV}-redis-subnet-group" \
            > /dev/null 2>&1 && {
            echo "Found orphaned subnet group. Deleting..."
            aws elasticache delete-cache-subnet-group \
              --cache-subnet-group-name "${PRJ}-${ENV}-redis-subnet-group" 2>/dev/null || true
            echo "Subnet group deleted."
          } || echo "No orphaned subnet group found."

          # Check for orphaned security group
          echo "=== Checking for orphaned Redis security group ==="
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=${PRJ}-${ENV}-sg-redis" \
                      "Name=vpc-id,Values=${VPC_ID}" \
            --query "SecurityGroups[0].GroupId" \
            --output text 2>/dev/null || echo "None")

          if [ "${SG_ID}" != "None" ] && [ -n "${SG_ID}" ]; then
            echo "Found orphaned security group: ${SG_ID}. Deleting..."
            aws ec2 delete-security-group --group-id "${SG_ID}" 2>/dev/null || true
            echo "Security group deleted."
          else
            echo "No orphaned security group found."
          fi

          echo "=== Orphan cleanup complete ==="

      # ── 7. Deploy ElastiCache Redis stack ────────────────────────────────
      - name: Deploy ElastiCache Redis stack
        run: |
          ENV="${{ inputs.environment }}"

          aws cloudformation deploy \
            --stack-name "${{ env.PROJECT_NAME }}-${ENV}-redis" \
            --template-file DevOps/AWS/CloudFormation/elasticache-redis.yaml \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${{ env.PROJECT_NAME }}" \
              VpcId="${{ steps.vpc.outputs.vpc_id }}" \
              PrivateSubnet1="${{ steps.vpc.outputs.private_subnet_1 }}" \
              PrivateSubnet2="${{ steps.vpc.outputs.private_subnet_2 }}" \
              AppSecurityGroupId="${{ steps.vpc.outputs.app_sg_id }}" \
              RedisNodeType="${{ inputs.redis_node_type }}" \
              RedisAuthToken="${{ secrets.CLAIMS_PROC_REDIS_AUTH_TOKEN }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      # ── 8. Print stack outputs ───────────────────────────────────────────
      - name: Print stack outputs
        run: |
          ENV="${{ inputs.environment }}"
          STACK="${{ env.PROJECT_NAME }}-${ENV}-redis"

          echo "=== Stack Outputs ==="
          aws cloudformation describe-stacks \
            --stack-name "${STACK}" \
            --query "Stacks[0].Outputs" \
            --output table

          ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name "${STACK}" \
            --query "Stacks[0].Outputs[?OutputKey=='RedisEndpoint'].OutputValue" \
            --output text)

          echo ""
          echo "Redis Endpoint: ${ENDPOINT}"
          echo "Redis Port: 6379"
          echo "TLS: enabled"
          echo ""
          echo "Connection string: rediss://:****@${ENDPOINT}:6379"
