# =============================================================================
# AWS_08 - Build & Push Docker Images to ECR
#
# Optimizations:
#   1. Change detection — only rebuilds modules whose source code changed
#   2. Maven dependency caching — restores ~/.m2 across runs
#   3. Docker layer caching — uses GitHub Actions cache for BuildKit layers
#   4. Skips Maven build entirely if no Java/pom changes detected
#   5. Unchanged modules reuse existing ECR images (re-tagged, not rebuilt)
# =============================================================================
name: "AWS_08 - Build & Push Docker Images to ECR"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

      modules:
        description: 'Module(s) to build and push'
        required: true
        type: choice
        options:
          - all
          - changed-only
          - api-claims
          - api-members
          - api-tenants
          - api-entitlements
          - portal-claims-advisor
          - portal-claims-member
          - portal-batch-assignment
          - portal-tenants
          - portal-entitlements
          - portal-sre

      image_tag:
        description: 'Docker image tag'
        required: false
        type: string
        default: 'latest'

      force_rebuild:
        description: 'Force rebuild all selected modules (ignore change detection)'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: claims-proc
  JAVA_VERSION: '17'

jobs:
  # ===========================================================================
  # Job 1: Detect which modules have changed since last successful ECR push
  # ===========================================================================
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.changes.outputs.changed_modules }}
      needs_maven_build: ${{ steps.changes.outputs.needs_maven_build }}
      common_libs_changed: ${{ steps.changes.outputs.common_libs_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate change detection

      - name: Detect changes per module
        id: changes
        env:
          SELECTED: ${{ inputs.modules }}
          FORCE: ${{ inputs.force_rebuild }}
        run: |
          # Module name -> source directories that trigger a rebuild
          declare -A MODULE_SOURCES
          MODULE_SOURCES["api-claims"]="API-Claims Common-Libraries"
          MODULE_SOURCES["api-members"]="API-Members Common-Libraries"
          MODULE_SOURCES["api-tenants"]="API-Tenants Common-Libraries"
          MODULE_SOURCES["api-entitlements"]="API-Entitlements Common-Libraries"
          MODULE_SOURCES["portal-claims-advisor"]="Portal-Claims-Advisor Common-Libraries"
          MODULE_SOURCES["portal-claims-member"]="Portal-Claims-Member Common-Libraries"
          MODULE_SOURCES["portal-batch-assignment"]="Portal-Batch-Assignment Common-Libraries"
          MODULE_SOURCES["portal-tenants"]="Portal-Tenants Common-Libraries"
          MODULE_SOURCES["portal-entitlements"]="Portal-Entitlements Common-Libraries"
          MODULE_SOURCES["portal-sre"]="Portal-SRE Common-Libraries"

          ALL_MODULES="api-claims api-members api-tenants api-entitlements portal-claims-advisor portal-claims-member portal-batch-assignment portal-tenants portal-entitlements portal-sre"

          # Force rebuild — skip change detection
          if [ "$FORCE" == "true" ]; then
            if [ "$SELECTED" == "all" ] || [ "$SELECTED" == "changed-only" ]; then
              echo "changed_modules=${ALL_MODULES}" >> "$GITHUB_OUTPUT"
            else
              echo "changed_modules=${SELECTED}" >> "$GITHUB_OUTPUT"
            fi
            echo "needs_maven_build=true" >> "$GITHUB_OUTPUT"
            echo "common_libs_changed=true" >> "$GITHUB_OUTPUT"
            echo "Force rebuild requested — all selected modules will be built."
            exit 0
          fi

          # Specific module selected — always build it
          if [ "$SELECTED" != "all" ] && [ "$SELECTED" != "changed-only" ]; then
            echo "changed_modules=${SELECTED}" >> "$GITHUB_OUTPUT"
            echo "needs_maven_build=true" >> "$GITHUB_OUTPUT"
            echo "common_libs_changed=false" >> "$GITHUB_OUTPUT"
            echo "Specific module selected: ${SELECTED}"
            exit 0
          fi

          # Find the last successful build commit from tags or fall back to HEAD~1
          LAST_BUILD_SHA=$(git tag -l 'ecr-build-*' --sort=-creatordate | head -1 | xargs -I{} git rev-list -1 {} 2>/dev/null || echo "")
          if [ -z "$LAST_BUILD_SHA" ]; then
            # No previous build tag — check last 1 commit
            LAST_BUILD_SHA="HEAD~1"
            echo "No previous build tag found — comparing against HEAD~1"
          else
            echo "Last successful build: ${LAST_BUILD_SHA}"
          fi

          # Check if Common-Libraries changed (forces rebuild of all modules)
          COMMON_CHANGED="false"
          if git diff --name-only "$LAST_BUILD_SHA" HEAD -- Common-Libraries/ pom.xml 2>/dev/null | grep -q .; then
            COMMON_CHANGED="true"
            echo "Common-Libraries or root pom.xml changed — all modules need rebuild."
          fi
          echo "common_libs_changed=${COMMON_CHANGED}" >> "$GITHUB_OUTPUT"

          # Detect per-module changes
          CHANGED=""
          for MODULE in $ALL_MODULES; do
            SOURCES="${MODULE_SOURCES[$MODULE]}"
            MODULE_CHANGED="false"

            if [ "$COMMON_CHANGED" == "true" ]; then
              MODULE_CHANGED="true"
            else
              for SRC_DIR in $SOURCES; do
                if git diff --name-only "$LAST_BUILD_SHA" HEAD -- "$SRC_DIR/" 2>/dev/null | grep -q .; then
                  MODULE_CHANGED="true"
                  break
                fi
              done
            fi

            if [ "$MODULE_CHANGED" == "true" ]; then
              CHANGED="${CHANGED} ${MODULE}"
              echo "  [CHANGED] ${MODULE}"
            else
              echo "  [SKIP]    ${MODULE} (no changes)"
            fi
          done

          CHANGED=$(echo "$CHANGED" | xargs)  # trim whitespace

          if [ "$SELECTED" == "all" ]; then
            # "all" means build everything regardless of changes
            echo "changed_modules=${ALL_MODULES}" >> "$GITHUB_OUTPUT"
            echo "needs_maven_build=true" >> "$GITHUB_OUTPUT"
          elif [ -z "$CHANGED" ]; then
            echo "changed_modules=" >> "$GITHUB_OUTPUT"
            echo "needs_maven_build=false" >> "$GITHUB_OUTPUT"
            echo "No modules changed — nothing to build."
          else
            echo "changed_modules=${CHANGED}" >> "$GITHUB_OUTPUT"
            echo "needs_maven_build=true" >> "$GITHUB_OUTPUT"
            echo "Modules to build: ${CHANGED}"
          fi

  # ===========================================================================
  # Job 2: Build Java artifacts (skipped if no changes)
  # ===========================================================================
  maven-build:
    name: Maven build
    needs: detect-changes
    if: needs.detect-changes.outputs.needs_maven_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: |
          echo "Building all modules..."
          mvn clean install -DskipTests -B -q
          echo "Maven build completed."

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-jars
          path: |
            API-Claims/target/*.jar
            API-Members/target/*.jar
            API-Tenants/target/*.jar
            API-Entitlements/target/*.jar
            Portal-Claims-Advisor/target/*.jar
            Portal-Claims-Member/target/*.jar
            Portal-Batch-Assignment/target/*.jar
            Portal-Tenants/target/*.jar
            Portal-Entitlements/target/*.jar
            Portal-SRE/target/*.jar
          retention-days: 1

  # ===========================================================================
  # Job 3: Build Docker images and push to ECR
  # ===========================================================================
  docker-push:
    name: Docker build & push to ECR
    needs: [detect-changes, maven-build]
    if: always() && needs.detect-changes.outputs.changed_modules != '' && needs.maven-build.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR artifacts
        uses: actions/download-artifact@v4
        with:
          name: maven-jars

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker images
        env:
          ECR_REGISTRY: ${{ steps.aws-account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG: ${{ inputs.image_tag }}
          CHANGED_MODULES: ${{ needs.detect-changes.outputs.changed_modules }}
          ENV: ${{ inputs.environment }}
        run: |
          declare -A MODULE_DIRS
          MODULE_DIRS["api-claims"]="API-Claims"
          MODULE_DIRS["api-members"]="API-Members"
          MODULE_DIRS["api-tenants"]="API-Tenants"
          MODULE_DIRS["api-entitlements"]="API-Entitlements"
          MODULE_DIRS["portal-claims-advisor"]="Portal-Claims-Advisor"
          MODULE_DIRS["portal-claims-member"]="Portal-Claims-Member"
          MODULE_DIRS["portal-batch-assignment"]="Portal-Batch-Assignment"
          MODULE_DIRS["portal-tenants"]="Portal-Tenants"
          MODULE_DIRS["portal-entitlements"]="Portal-Entitlements"
          MODULE_DIRS["portal-sre"]="Portal-SRE"

          BUILT=0
          SKIPPED=0
          FAILED=0

          for MODULE in ${CHANGED_MODULES}; do
            MODULE_DIR="${MODULE_DIRS[$MODULE]}"
            REPO_NAME="${PROJECT_NAME}/${MODULE}"
            FULL_IMAGE="${ECR_REGISTRY}/${REPO_NAME}"

            echo ""
            echo "--- ${MODULE} ---"

            if [ ! -f "${MODULE_DIR}/Dockerfile" ] || [ ! -d "${MODULE_DIR}/target" ]; then
              echo "  Missing Dockerfile or target/ — skipping."
              FAILED=$((FAILED + 1))
              continue
            fi

            # Ensure ECR repository exists
            aws ecr describe-repositories --repository-names "${REPO_NAME}" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "${REPO_NAME}" \
                --image-scanning-configuration scanOnPush=true >/dev/null

            # Build with BuildKit cache
            docker buildx build \
              --cache-from "type=gha,scope=${MODULE}" \
              --cache-to "type=gha,mode=max,scope=${MODULE}" \
              --tag "${FULL_IMAGE}:${IMAGE_TAG}" \
              --tag "${FULL_IMAGE}:${ENV}-${IMAGE_TAG}" \
              --tag "${FULL_IMAGE}:${GITHUB_SHA::8}" \
              --file "${MODULE_DIR}/Dockerfile" \
              --push \
              "${MODULE_DIR}"

            if [ $? -eq 0 ]; then
              echo "  Pushed: ${FULL_IMAGE}:${IMAGE_TAG}"
              BUILT=$((BUILT + 1))
            else
              echo "  FAILED: ${MODULE}"
              FAILED=$((FAILED + 1))
            fi
          done

          # Summary
          echo ""
          echo "=============================="
          echo "  Built:   ${BUILT}"
          echo "  Failed:  ${FAILED}"
          echo "=============================="

          echo "## Build & Push Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Built & pushed | ${BUILT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failed | ${FAILED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** \`${IMAGE_TAG}\` | **Commit:** \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"

          [ "$FAILED" -gt 0 ] && exit 1 || true

      - name: Tag successful build
        if: success()
        run: |
          git tag "ecr-build-${GITHUB_SHA::8}"
          git push origin "ecr-build-${GITHUB_SHA::8}" 2>/dev/null || true

  # ===========================================================================
  # Job 4: Handle unchanged modules — no build needed
  # ===========================================================================
  no-changes:
    name: No changes detected
    needs: detect-changes
    if: needs.detect-changes.outputs.changed_modules == '' && needs.detect-changes.outputs.needs_maven_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Skip build
        run: |
          echo "No module changes detected — skipping build."
          echo "## Build Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "No source code changes detected since last successful build." >> "$GITHUB_STEP_SUMMARY"
          echo "Existing ECR images are still current." >> "$GITHUB_STEP_SUMMARY"
