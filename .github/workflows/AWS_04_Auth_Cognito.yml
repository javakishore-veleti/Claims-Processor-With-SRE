name: "AWS_04 - Auth (Cognito)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: "Stack action"
        required: true
        type: choice
        options:
          - create
          - delete
      callback_url:
        description: "OAuth2 callback URL"
        required: false
        type: string
        default: https://localhost:8081/callback

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: claims-proc-${{ github.event.inputs.environment }}-auth
  TEMPLATE_FILE: DevOps/AWS/CloudFormation/auth-cognito.yaml

jobs:
  deploy:
    name: "${{ github.event.inputs.action }} auth stack (${{ github.event.inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack
        if: ${{ github.event.inputs.action == 'create' }}
        run: |
          echo "Deploying stack: ${{ env.STACK_NAME }}"
          aws cloudformation deploy \
            --template-file "${{ env.TEMPLATE_FILE }}" \
            --stack-name "${{ env.STACK_NAME }}" \
            --parameter-overrides \
              Environment=${{ github.event.inputs.environment }} \
              ProjectName=claims-proc \
              CallbackURL=${{ github.event.inputs.callback_url }} \
              LogoutURL=https://localhost:8081/logout \
            --capabilities CAPABILITY_NAMED_IAM \
            --tags \
              Project=claims-proc \
              Environment=${{ github.event.inputs.environment }} \
              ManagedBy=github-actions \
            --no-fail-on-empty-changeset

          echo "Stack outputs:"
          aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query "Stacks[0].Outputs" \
            --output table

      - name: Delete CloudFormation stack
        if: ${{ github.event.inputs.action == 'delete' }}
        run: |
          echo "Deleting stack: ${{ env.STACK_NAME }}"

          # Delete the Cognito User Pool domain before stack deletion
          USER_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" \
            --output text 2>/dev/null || true)

          if [ -n "$USER_POOL_ID" ] && [ "$USER_POOL_ID" != "None" ]; then
            echo "Removing User Pool domain for pool: $USER_POOL_ID"
            aws cognito-idp delete-user-pool-domain \
              --domain "claims-proc-${{ github.event.inputs.environment }}" \
              --user-pool-id "$USER_POOL_ID" 2>/dev/null || true
          fi

          aws cloudformation delete-stack \
            --stack-name "${{ env.STACK_NAME }}"

          echo "Waiting for stack deletion to complete..."
          aws cloudformation wait stack-delete-complete \
            --stack-name "${{ env.STACK_NAME }}"

          echo "Stack deleted successfully."
