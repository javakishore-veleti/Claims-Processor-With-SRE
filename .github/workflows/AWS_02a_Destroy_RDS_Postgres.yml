name: "AWS_02a - Destroy RDS PostgreSQL"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirm_destroy:
        description: "Type the environment name to confirm destruction"
        required: true
        type: string
      retain_rds_snapshot:
        description: "Create a final RDS snapshot before deletion"
        required: false
        type: boolean
        default: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'claims-proc' }}

jobs:
  # ==================================================================
  # Validate confirmation
  # ==================================================================
  validate:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Confirm environment matches
        run: |
          if [[ "${{ github.event.inputs.environment }}" != "${{ github.event.inputs.confirm_destroy }}" ]]; then
            echo "::error::Confirmation mismatch. You entered '${{ github.event.inputs.confirm_destroy }}' but the target environment is '${{ github.event.inputs.environment }}'."
            echo "::error::Type the exact environment name to confirm destruction."
            exit 1
          fi
          echo "Confirmation validated. Proceeding with destruction of '${{ github.event.inputs.environment }}' environment."

  # ==================================================================
  # Destroy RDS stack
  # ==================================================================
  destroy:
    name: Destroy RDS PostgreSQL
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      # ----------------------------------------------------------------
      # 1. Configure AWS credentials
      # ----------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ----------------------------------------------------------------
      # 2. Check if stack exists
      # ----------------------------------------------------------------
      - name: Check stack existence
        id: check
        run: |
          ENV="${{ github.event.inputs.environment }}"
          PRJ="${{ env.PROJECT_NAME }}"
          STACK_NAME="${PRJ}-${ENV}-rds"

          echo "stack_name=${STACK_NAME}" >> "$GITHUB_OUTPUT"

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "stack_status=${STACK_STATUS}" >> "$GITHUB_OUTPUT"
          echo "Stack ${STACK_NAME} status: ${STACK_STATUS}"

          if [[ "${STACK_STATUS}" == "DOES_NOT_EXIST" ]]; then
            echo "::warning::Stack ${STACK_NAME} does not exist. Nothing to destroy."
          fi

      # ----------------------------------------------------------------
      # 3. Create final RDS snapshot (if requested and stack exists)
      # ----------------------------------------------------------------
      - name: Create final RDS snapshot
        if: >-
          github.event.inputs.retain_rds_snapshot == 'true' &&
          steps.check.outputs.stack_status != 'DOES_NOT_EXIST'
        run: |
          ENV="${{ github.event.inputs.environment }}"
          PRJ="${{ env.PROJECT_NAME }}"
          RDS_ID="${PRJ}-${ENV}-postgres"
          SNAPSHOT_ID="${RDS_ID}-final-$(date +%Y%m%d-%H%M%S)"

          echo "Creating final snapshot: ${SNAPSHOT_ID}"

          # Check if the RDS instance exists and is available
          RDS_STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier "${RDS_ID}" \
            --query "DBInstances[0].DBInstanceStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [[ "${RDS_STATUS}" == "NOT_FOUND" ]]; then
            echo "::warning::RDS instance ${RDS_ID} not found. Skipping snapshot."
            exit 0
          fi

          if [[ "${RDS_STATUS}" != "available" ]]; then
            echo "::warning::RDS instance ${RDS_ID} is in '${RDS_STATUS}' state. Skipping snapshot."
            exit 0
          fi

          aws rds create-db-snapshot \
            --db-instance-identifier "${RDS_ID}" \
            --db-snapshot-identifier "${SNAPSHOT_ID}"

          echo "Waiting for snapshot to complete..."
          aws rds wait db-snapshot-available \
            --db-snapshot-identifier "${SNAPSHOT_ID}"

          echo "Snapshot ${SNAPSHOT_ID} created successfully."

      # ----------------------------------------------------------------
      # 4. Delete CloudFormation stack
      # ----------------------------------------------------------------
      - name: Delete RDS stack
        if: steps.check.outputs.stack_status != 'DOES_NOT_EXIST'
        run: |
          STACK_NAME="${{ steps.check.outputs.stack_name }}"

          echo "Deleting stack: ${STACK_NAME}"
          aws cloudformation delete-stack --stack-name "${STACK_NAME}"

          echo "Waiting for stack deletion to complete..."
          aws cloudformation wait stack-delete-complete --stack-name "${STACK_NAME}"

          echo "Stack ${STACK_NAME} deleted successfully."

      # ----------------------------------------------------------------
      # 5. Summary
      # ----------------------------------------------------------------
      - name: Summary
        run: |
          STACK_NAME="${{ steps.check.outputs.stack_name }}"
          STACK_STATUS="${{ steps.check.outputs.stack_status }}"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## RDS PostgreSQL Stack Destruction Summary

          | Property | Value |
          |----------|-------|
          | **Stack Name** | \`${STACK_NAME}\` |
          | **Environment** | \`${{ github.event.inputs.environment }}\` |
          | **Previous Status** | \`${STACK_STATUS}\` |
          | **Snapshot Retained** | \`${{ github.event.inputs.retain_rds_snapshot }}\` |
          | **Result** | $(if [[ "${STACK_STATUS}" == "DOES_NOT_EXIST" ]]; then echo "Stack did not exist"; else echo "Deleted successfully"; fi) |
          | **Triggered By** | \`${{ github.actor }}\` |
          | **Timestamp** | \`$(date -u +"%Y-%m-%dT%H:%M:%SZ")\` |
          EOF
