# =============================================================================
# AWS_09 - Destroy API Gateway & Fargate
# Deletes the CloudFormation stack for ALB, API Gateway, and ECS Fargate
# services. Scales down all ECS services to 0 before stack deletion.
# =============================================================================
name: "AWS_09 - Destroy API Gateway & Fargate"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to destroy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

      confirm_destroy:
        description: 'Type the environment name to confirm destruction'
        required: true
        type: string

env:
  AWS_REGION: ${{ vars.CLAIMS_PROC_AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.CLAIMS_PROC_PROJECT_NAME || 'claims-proc' }}

jobs:
  # ===========================================================================
  # Job 1: Validate the destruction request
  # ===========================================================================
  validate:
    name: Validate destruction request
    runs-on: ubuntu-latest
    steps:
      - name: Confirm environment matches
        run: |
          REQUESTED="${{ inputs.confirm_destroy }}"
          EXPECTED="${{ inputs.environment }}"

          if [[ "$REQUESTED" != "$EXPECTED" ]]; then
            echo "::error::Confirmation failed. You typed '${REQUESTED}' but environment is '${EXPECTED}'. They must match exactly."
            echo ""
            echo "This is a safety check to prevent accidental destruction of resources."
            echo "Re-run the workflow and type '${EXPECTED}' in the confirm_destroy field."
            exit 1
          fi

          echo "============================================"
          echo "  DESTRUCTION CONFIRMED: ${EXPECTED}"
          echo "============================================"
          echo ""
          echo "::warning::API Gateway & Fargate stack for '${EXPECTED}' will be deleted."

  # ===========================================================================
  # Job 2: Destroy the API Gateway & Fargate stack
  # ===========================================================================
  destroy:
    name: Destroy API Gateway & Fargate (${{ inputs.environment }})
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if stack exists
        id: check
        run: |
          STACK="${{ env.PROJECT_NAME }}-${{ inputs.environment }}-fargate"
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          echo "stack_name=${STACK}" >> "$GITHUB_OUTPUT"
          echo "stack_status=${STATUS}" >> "$GITHUB_OUTPUT"

          if [[ "$STATUS" == "NOT_FOUND" ]]; then
            echo "Stack ${STACK} does not exist. Nothing to delete."
          else
            echo "Stack ${STACK} found with status: ${STATUS}"
          fi

      - name: Scale down ECS services to 0
        if: steps.check.outputs.stack_status != 'NOT_FOUND'
        continue-on-error: true
        run: |
          CLUSTER="${{ env.PROJECT_NAME }}-${{ inputs.environment }}"
          echo "Scaling down all ECS services in cluster: ${CLUSTER}"

          SERVICES=$(aws ecs list-services \
            --cluster "$CLUSTER" \
            --query 'serviceArns[*]' --output text 2>/dev/null || echo "")

          if [[ -z "$SERVICES" ]]; then
            echo "No ECS services found in cluster ${CLUSTER}. Skipping scale-down."
            exit 0
          fi

          for SVC_ARN in $SERVICES; do
            SVC_NAME=$(echo "$SVC_ARN" | awk -F'/' '{print $NF}')
            echo "  Scaling down: ${SVC_NAME}"
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$SVC_ARN" \
              --desired-count 0 \
              --no-cli-pager 2>/dev/null || true
          done

          echo "Waiting 30s for tasks to drain..."
          sleep 30
          echo "ECS services scaled down."

      - name: Delete stack
        if: steps.check.outputs.stack_status != 'NOT_FOUND'
        run: |
          STACK="${{ steps.check.outputs.stack_name }}"
          echo "--- Deleting: ${STACK} ---"

          aws cloudformation delete-stack --stack-name "$STACK"
          echo "Waiting for deletion to complete..."
          aws cloudformation wait stack-delete-complete --stack-name "$STACK"
          echo "Deleted: ${STACK}"

      - name: Destruction Summary
        if: always()
        run: |
          STACK="${{ steps.check.outputs.stack_name }}"
          STATUS="${{ steps.check.outputs.stack_status }}"

          echo "## Destroy API Gateway & Fargate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | \`${{ inputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **AWS Region** | \`${{ env.AWS_REGION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Stack Name** | \`${STACK}\` |" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$STATUS" == "NOT_FOUND" ]]; then
            echo "| **Result** | Stack did not exist — nothing deleted |" >> "$GITHUB_STEP_SUMMARY"
          else
            FINAL=$(aws cloudformation describe-stacks \
              --stack-name "$STACK" \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo "DELETE_COMPLETE")
            echo "| **Result** | \`${FINAL}\` |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Resources deleted:** ALB, API Gateway, ECS Fargate services, task definitions, IAM roles" >> "$GITHUB_STEP_SUMMARY"
