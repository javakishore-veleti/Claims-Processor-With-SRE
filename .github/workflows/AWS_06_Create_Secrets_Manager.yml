# ============================================================
# AWS_06 - Create Secrets Manager
# ============================================================
# Deploys or populates AWS Secrets Manager secrets
# for all service credentials used by the Claims Processor.
# ============================================================

name: "AWS_06 - Create Secrets Manager"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: 'Action to perform'
        required: true
        type: choice
        default: 'create'
        options:
          - create
          - populate

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: claims-proc
  STACK_NAME: claims-proc-${{ github.event.inputs.environment }}-secrets
  TEMPLATE_FILE: DevOps/AWS/CloudFormation/secrets-manager.yaml

permissions:
  id-token: write
  contents: read

jobs:
  cost-before:
    uses: ./.github/workflows/AWS_00_Cost_Report.yml
    with:
      environment: ${{ inputs.environment }}
      report_label: "Before Deployment"
    secrets: inherit

  manage-secrets:
    needs: cost-before
    name: "Create Secrets Manager (${{ github.event.inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      # -------------------------------------------------------
      # Checkout
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # AWS Credentials
      # -------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------------------------------------
      # Deploy Stack (create)
      # -------------------------------------------------------
      - name: Deploy Secrets Manager stack
        if: github.event.inputs.action == 'create'
        run: |
          ENV="${{ github.event.inputs.environment }}"

          echo "Deploying stack: ${STACK_NAME}"
          echo "Environment: ${ENV}"

          aws cloudformation deploy \
            --template-file "${TEMPLATE_FILE}" \
            --stack-name "${STACK_NAME}" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PROJECT_NAME}" \
            --tags \
              Key=Project,Value="${PROJECT_NAME}" \
              Key=Environment,Value="${ENV}" \
              Key=ManagedBy,Value=github-actions \
              Key=Component,Value=secrets-manager \
            --no-fail-on-empty-changeset

          echo "::notice::Stack ${STACK_NAME} deployed successfully"

      # -------------------------------------------------------
      # Populate Secrets (from GitHub Secrets + CFN exports)
      # -------------------------------------------------------
      - name: Resolve infrastructure endpoints from CloudFormation exports
        if: github.event.inputs.action == 'populate'
        id: infra
        run: |
          ENV="${{ github.event.inputs.environment }}"

          # RDS endpoint
          RDS_ENDPOINT=$(aws cloudformation list-exports \
            --query "Exports[?Name=='${PROJECT_NAME}-${ENV}-rds-endpoint'].Value" \
            --output text 2>/dev/null || echo "")
          echo "rds_endpoint=${RDS_ENDPOINT}" >> "$GITHUB_OUTPUT"

          RDS_PORT=$(aws cloudformation list-exports \
            --query "Exports[?Name=='${PROJECT_NAME}-${ENV}-rds-port'].Value" \
            --output text 2>/dev/null || echo "5432")
          echo "rds_port=${RDS_PORT}" >> "$GITHUB_OUTPUT"

          # Redis endpoint
          REDIS_ENDPOINT=$(aws cloudformation list-exports \
            --query "Exports[?Name=='${PROJECT_NAME}-${ENV}-redis-endpoint'].Value" \
            --output text 2>/dev/null || echo "")
          echo "redis_endpoint=${REDIS_ENDPOINT}" >> "$GITHUB_OUTPUT"

          REDIS_PORT=$(aws cloudformation list-exports \
            --query "Exports[?Name=='${PROJECT_NAME}-${ENV}-redis-port'].Value" \
            --output text 2>/dev/null || echo "6379")
          echo "redis_port=${REDIS_PORT}" >> "$GITHUB_OUTPUT"

          # Messaging (MSK bootstrap brokers or Kinesis)
          MSK_BROKERS=$(aws cloudformation list-exports \
            --query "Exports[?Name=='${PROJECT_NAME}-${ENV}-msk-bootstrap-brokers'].Value" \
            --output text 2>/dev/null || echo "")
          echo "msk_brokers=${MSK_BROKERS}" >> "$GITHUB_OUTPUT"

          # OpenSearch endpoint
          OPENSEARCH_ENDPOINT=$(aws cloudformation list-exports \
            --query "Exports[?Name=='${PROJECT_NAME}-${ENV}-opensearch-endpoint'].Value" \
            --output text 2>/dev/null || echo "")
          echo "opensearch_endpoint=${OPENSEARCH_ENDPOINT}" >> "$GITHUB_OUTPUT"

          echo "::notice::Resolved infrastructure endpoints for ${ENV}"

      - name: Populate RDS credentials secret
        if: github.event.inputs.action == 'populate'
        run: |
          ENV="${{ github.event.inputs.environment }}"
          SECRET_NAME="${PROJECT_NAME}/${ENV}/rds-credentials"

          RDS_ENDPOINT="${{ steps.infra.outputs.rds_endpoint }}"
          RDS_PORT="${{ steps.infra.outputs.rds_port }}"
          RDS_PASSWORD="${{ secrets.CLAIMS_PROC_RDS_MASTER_PASSWORD }}"

          if [ -z "${RDS_ENDPOINT}" ] || [ "${RDS_ENDPOINT}" = "None" ]; then
            echo "::warning::RDS endpoint not found in exports — skipping RDS secret population"
            exit 0
          fi

          SECRET_VALUE=$(jq -n \
            --arg username "claims_user" \
            --arg password "${RDS_PASSWORD}" \
            --arg host "${RDS_ENDPOINT}" \
            --arg port "${RDS_PORT}" \
            --arg dbname "claims_db" \
            '{username: $username, password: $password, host: $host, port: $port, dbname: $dbname}')

          aws secretsmanager put-secret-value \
            --secret-id "${SECRET_NAME}" \
            --secret-string "${SECRET_VALUE}"

          echo "::notice::Updated secret ${SECRET_NAME}"

      - name: Populate Redis credentials secret
        if: github.event.inputs.action == 'populate'
        run: |
          ENV="${{ github.event.inputs.environment }}"
          SECRET_NAME="${PROJECT_NAME}/${ENV}/redis-credentials"

          REDIS_ENDPOINT="${{ steps.infra.outputs.redis_endpoint }}"
          REDIS_PORT="${{ steps.infra.outputs.redis_port }}"
          REDIS_AUTH_TOKEN="${{ secrets.CLAIMS_PROC_REDIS_AUTH_TOKEN }}"

          if [ -z "${REDIS_ENDPOINT}" ] || [ "${REDIS_ENDPOINT}" = "None" ]; then
            echo "::warning::Redis endpoint not found in exports — skipping Redis secret population"
            exit 0
          fi

          SECRET_VALUE=$(jq -n \
            --arg host "${REDIS_ENDPOINT}" \
            --arg port "${REDIS_PORT}" \
            --arg auth_token "${REDIS_AUTH_TOKEN}" \
            '{host: $host, port: $port, "auth-token": $auth_token}')

          aws secretsmanager put-secret-value \
            --secret-id "${SECRET_NAME}" \
            --secret-string "${SECRET_VALUE}"

          echo "::notice::Updated secret ${SECRET_NAME}"

      - name: Populate messaging credentials secret
        if: github.event.inputs.action == 'populate'
        run: |
          ENV="${{ github.event.inputs.environment }}"
          SECRET_NAME="${PROJECT_NAME}/${ENV}/messaging-credentials"

          MSK_BROKERS="${{ steps.infra.outputs.msk_brokers }}"

          if [ -z "${MSK_BROKERS}" ] || [ "${MSK_BROKERS}" = "None" ]; then
            echo "::warning::MSK bootstrap brokers not found in exports — skipping messaging secret population"
            exit 0
          fi

          SECRET_VALUE=$(jq -n \
            --arg bootstrap_servers "${MSK_BROKERS}" \
            '{"bootstrap-servers": $bootstrap_servers}')

          aws secretsmanager put-secret-value \
            --secret-id "${SECRET_NAME}" \
            --secret-string "${SECRET_VALUE}"

          echo "::notice::Updated secret ${SECRET_NAME}"

      - name: Populate OpenSearch credentials secret
        if: github.event.inputs.action == 'populate'
        run: |
          ENV="${{ github.event.inputs.environment }}"
          SECRET_NAME="${PROJECT_NAME}/${ENV}/opensearch-credentials"

          OPENSEARCH_ENDPOINT="${{ steps.infra.outputs.opensearch_endpoint }}"

          if [ -z "${OPENSEARCH_ENDPOINT}" ] || [ "${OPENSEARCH_ENDPOINT}" = "None" ]; then
            echo "::warning::OpenSearch endpoint not found in exports — skipping OpenSearch secret population"
            exit 0
          fi

          # Retrieve the current secret to preserve the generated password
          CURRENT_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "${SECRET_NAME}" \
            --query 'SecretString' --output text 2>/dev/null || echo '{}')

          CURRENT_PASSWORD=$(echo "${CURRENT_SECRET}" | jq -r '.password // empty')

          SECRET_VALUE=$(jq -n \
            --arg endpoint "${OPENSEARCH_ENDPOINT}" \
            --arg username "claimsadmin" \
            --arg password "${CURRENT_PASSWORD}" \
            '{endpoint: $endpoint, username: $username, password: $password}')

          aws secretsmanager put-secret-value \
            --secret-id "${SECRET_NAME}" \
            --secret-string "${SECRET_VALUE}"

          echo "::notice::Updated secret ${SECRET_NAME}"

      - name: Populate encryption keys secret
        if: github.event.inputs.action == 'populate'
        run: |
          ENV="${{ github.event.inputs.environment }}"
          SECRET_NAME="${PROJECT_NAME}/${ENV}/encryption-keys"

          ENCRYPTION_KEY="${{ secrets.CLAIMS_PROC_ENCRYPTION_KEY }}"

          if [ -z "${ENCRYPTION_KEY}" ]; then
            echo "::warning::CLAIMS_PROC_ENCRYPTION_KEY not set in GitHub secrets — skipping"
            exit 0
          fi

          SECRET_VALUE=$(jq -n \
            --arg aes_key "${ENCRYPTION_KEY}" \
            '{"aes-key": $aes_key}')

          aws secretsmanager put-secret-value \
            --secret-id "${SECRET_NAME}" \
            --secret-string "${SECRET_VALUE}"

          echo "::notice::Updated secret ${SECRET_NAME}"

      # -------------------------------------------------------
      # Print Outputs
      # -------------------------------------------------------
      - name: Print stack outputs
        if: github.event.inputs.action == 'create'
        run: |
          echo "=== Stack Outputs ==="
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].Outputs" \
            --output table

      - name: Summary
        run: |
          echo "=== Action Complete ==="
          echo "Action: ${{ github.event.inputs.action }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Stack: ${STACK_NAME}"


  cost-after:
    needs: manage-secrets
    if: always()
    uses: ./.github/workflows/AWS_00_Cost_Report.yml
    with:
      environment: ${{ inputs.environment }}
      report_label: "After Deployment"
    secrets: inherit
