name: "AWS_99 — Full Environment Orchestrator"

# ─────────────────────────────────────────────────────────────────────────────
# Single workflow to deploy ALL AWS stacks in order.
# - Checks which stacks already exist → skips them
# - Reads all outputs from CloudFormation (no job-to-job passing needed)
# - Optional: skip EKS, MSK/OpenSearch, and/or Docker image build
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]

      use_existing_vpc:
        description: 'Use an existing VPC instead of creating a new one'
        required: false
        type: boolean
        default: false

      existing_vpc_id:
        description: 'Existing VPC ID (only when use_existing_vpc = true)'
        required: false
        type: string
        default: ''

      enable_nat_gateway:
        description: 'Use NAT Gateway instead of VPC Endpoints for private subnet internet access (~$32/month). Default: off (VPC Endpoints used — cheaper, AWS-only access)'
        required: false
        type: boolean
        default: false

      # ---- COGNITO COMMENTED OUT — uncomment to re-enable ----
      # callback_url:
      #   description: 'Cognito OAuth2 callback URL'
      #   required: false
      #   type: string
      #   default: 'http://localhost:8081/callback'
      # logout_url:
      #   description: 'Cognito OAuth2 logout URL'
      #   required: false
      #   type: string
      #   default: 'http://localhost:8081/logout'

      image_tag:
        description: 'Docker image tag for Fargate services'
        required: false
        type: string
        default: 'latest'

      skip_rds:
        description: 'Skip RDS PostgreSQL (Fargate services use H2 in-memory with local profile — enable only if you need a real database)'
        required: false
        type: boolean
        default: false

      skip_redis:
        description: 'Skip ElastiCache Redis (caching disabled by default via feature toggles — enable only if you need AWS-managed Redis)'
        required: false
        type: boolean
        default: true

      skip_messaging:
        description: 'Skip MSK + OpenSearch (using embedded Kafka — enable only if you need AWS-managed Kafka/OpenSearch)'
        required: false
        type: boolean
        default: true

      skip_eks:
        description: 'Skip EKS cluster (using Fargate for containers — EKS only needed for custom Kubernetes workloads)'
        required: false
        type: boolean
        default: true

      skip_build:
        description: 'Skip Docker build & push — use when images are already in ECR'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: claims-proc

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # 0  CHECK — Inspect every stack; emit skip/deploy flags
  # ───────────────────────────────────────────────────────────────────────────
  check:
    name: "0 — Check Stack Statuses"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      s01: ${{ steps.status.outputs.s01 }}
      s02a: ${{ steps.status.outputs.s02a }}
      s02b: ${{ steps.status.outputs.s02b }}
      s02c: ${{ steps.status.outputs.s02c }}
      s02d: ${{ steps.status.outputs.s02d }}
      s03: ${{ steps.status.outputs.s03 }}
      s04: ${{ steps.status.outputs.s04 }}
      s05: ${{ steps.status.outputs.s05 }}
      s06: ${{ steps.status.outputs.s06 }}
      s07: ${{ steps.status.outputs.s07 }}
      s09: ${{ steps.status.outputs.s09 }}
      s10: ${{ steps.status.outputs.s10 }}
    steps:
      - name: Validate all secrets
        run: |
          ERRORS=0

          # ── AWS Credentials ──
          if [ -z "${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}" ]; then
            echo "::error::CLAIMS_PROC_AWS_ACCESS_KEY_ID secret is not set."
            ERRORS=$((ERRORS + 1))
          fi
          if [ -z "${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "::error::CLAIMS_PROC_AWS_SECRET_ACCESS_KEY secret is not set."
            ERRORS=$((ERRORS + 1))
          fi

          # ── RDS Master Password (only if RDS is not skipped) ──
          if [ "${{ inputs.skip_rds }}" != "true" ]; then
            RDS_PASS="${{ secrets.CLAIMS_PROC_RDS_MASTER_PASSWORD }}"
            if [ -z "$RDS_PASS" ]; then
              echo "::error::CLAIMS_PROC_RDS_MASTER_PASSWORD secret is not set."
              ERRORS=$((ERRORS + 1))
            else
              LEN=${#RDS_PASS}
              if [ "$LEN" -lt 8 ] || [ "$LEN" -gt 128 ]; then
                echo "::error::CLAIMS_PROC_RDS_MASTER_PASSWORD must be 8-128 characters (current: ${LEN})."
                ERRORS=$((ERRORS + 1))
              fi
              if echo "$RDS_PASS" | grep -qP '[/"@\s]'; then
                echo "::error::CLAIMS_PROC_RDS_MASTER_PASSWORD contains invalid characters (/, \", @, or spaces)."
                ERRORS=$((ERRORS + 1))
              fi
            fi
          else
            echo "RDS skipped — skipping password validation."
          fi

          # ── Redis Auth Token (only if Redis is not skipped) ──
          if [ "${{ inputs.skip_redis }}" != "true" ]; then
            REDIS_TOKEN="${{ secrets.CLAIMS_PROC_REDIS_AUTH_TOKEN }}"
            if [ -z "$REDIS_TOKEN" ]; then
              echo "::error::CLAIMS_PROC_REDIS_AUTH_TOKEN secret is not set."
              ERRORS=$((ERRORS + 1))
            else
              LEN=${#REDIS_TOKEN}
              if [ "$LEN" -lt 16 ] || [ "$LEN" -gt 128 ]; then
                echo "::error::CLAIMS_PROC_REDIS_AUTH_TOKEN must be 16-128 characters (current: ${LEN})."
                ERRORS=$((ERRORS + 1))
              fi
              if echo "$REDIS_TOKEN" | grep -qP '[/"@\s]'; then
                echo "::error::CLAIMS_PROC_REDIS_AUTH_TOKEN contains invalid characters (/, \", @, or spaces)."
                ERRORS=$((ERRORS + 1))
              fi
            fi
          else
            echo "Redis skipped — skipping token validation."
          fi

          # ── OpenSearch Master Password (only if messaging is not skipped) ──
          if [ "${{ inputs.skip_messaging }}" != "true" ]; then
            OS_PASS="${{ secrets.CLAIMS_PROC_OPENSEARCH_MASTER_PASSWORD }}"
            if [ -z "$OS_PASS" ]; then
              echo "::error::CLAIMS_PROC_OPENSEARCH_MASTER_PASSWORD secret is not set (required when skip_messaging=false)."
              echo "  OpenSearch requires: 8+ chars, at least one uppercase, lowercase, digit, and special character."
              ERRORS=$((ERRORS + 1))
            else
              LEN=${#OS_PASS}
              if [ "$LEN" -lt 8 ]; then
                echo "::error::CLAIMS_PROC_OPENSEARCH_MASTER_PASSWORD must be at least 8 characters (current: ${LEN})."
                ERRORS=$((ERRORS + 1))
              fi
              # OpenSearch requires: uppercase, lowercase, digit, special char
              if ! echo "$OS_PASS" | grep -qP '[A-Z]'; then
                echo "::error::CLAIMS_PROC_OPENSEARCH_MASTER_PASSWORD must contain at least one uppercase letter."
                ERRORS=$((ERRORS + 1))
              fi
              if ! echo "$OS_PASS" | grep -qP '[a-z]'; then
                echo "::error::CLAIMS_PROC_OPENSEARCH_MASTER_PASSWORD must contain at least one lowercase letter."
                ERRORS=$((ERRORS + 1))
              fi
              if ! echo "$OS_PASS" | grep -qP '[0-9]'; then
                echo "::error::CLAIMS_PROC_OPENSEARCH_MASTER_PASSWORD must contain at least one digit."
                ERRORS=$((ERRORS + 1))
              fi
              if ! echo "$OS_PASS" | grep -qP '[^A-Za-z0-9]'; then
                echo "::error::CLAIMS_PROC_OPENSEARCH_MASTER_PASSWORD must contain at least one special character."
                ERRORS=$((ERRORS + 1))
              fi
            fi
          fi

          # ── JWT Signing Key ──
          if [ -z "${{ secrets.CLAIMS_PROC_JWT_SIGNING_KEY }}" ]; then
            echo "::warning::CLAIMS_PROC_JWT_SIGNING_KEY is not set (needed by Secrets Manager stack)."
          fi

          # ── AES Encryption Key ──
          if [ -z "${{ secrets.CLAIMS_PROC_AES_ENCRYPTION_KEY }}" ]; then
            echo "::warning::CLAIMS_PROC_AES_ENCRYPTION_KEY is not set (needed by Secrets Manager stack)."
          fi

          # ── Summary ──
          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "=========================================="
            echo "  ${ERRORS} secret validation error(s)"
            echo "=========================================="
            echo ""
            echo "Fix: Go to GitHub > Settings > Secrets and variables > Actions"
            echo ""
            echo "Password/token rules (RDS + Redis):"
            echo "  - Printable ASCII characters only"
            echo "  - No forward slash (/), double quote (\"), at sign (@), or spaces"
            echo "  - RDS password: 8-128 characters"
            echo "  - Redis token:  16-128 characters"
            exit 1
          fi

          echo "All secrets validated successfully."

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check all stack statuses
        id: status
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
        run: |
          check_stack() {
            local s
            s=$(aws cloudformation describe-stacks --stack-name "$1" \
              --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "NOT_FOUND")

            case "$s" in
              CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE)
                echo "skip"
                ;;
              ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)
                # Stack exists in a broken state — delete it first so deploy can recreate
                # WARNING: echo to stderr so it doesn't corrupt GITHUB_OUTPUT capture
                echo "::warning::Stack $1 is in ${s} state — deleting before redeploy" >&2
                aws cloudformation delete-stack --stack-name "$1" >&2
                aws cloudformation wait stack-delete-complete --stack-name "$1" 2>/dev/null >&2 || true
                echo "deploy"
                ;;
              *)
                echo "deploy"
                ;;
            esac
          }

          echo "s01=$(check_stack "${PRJ}-${ENV}-vpc-sg")"            >> "$GITHUB_OUTPUT"
          echo "s02a=$(check_stack "${PRJ}-${ENV}-rds")"             >> "$GITHUB_OUTPUT"
          echo "s02b=$(check_stack "${PRJ}-${ENV}-s3")"              >> "$GITHUB_OUTPUT"
          echo "s02c=$(check_stack "${PRJ}-${ENV}-ecr")"             >> "$GITHUB_OUTPUT"
          echo "s02d=$(check_stack "${PRJ}-${ENV}-redis")"           >> "$GITHUB_OUTPUT"
          echo "s03=$(check_stack "${PRJ}-${ENV}-observability")"     >> "$GITHUB_OUTPUT"
          # echo "s04=$(check_stack "${PRJ}-${ENV}-auth")"  # COGNITO COMMENTED OUT
          echo "s05=$(check_stack "${PRJ}-${ENV}-messaging-search")"  >> "$GITHUB_OUTPUT"
          echo "s06=$(check_stack "${PRJ}-${ENV}-secrets")"           >> "$GITHUB_OUTPUT"
          echo "s07=$(check_stack "${PRJ}-${ENV}-eks")"               >> "$GITHUB_OUTPUT"
          echo "s09=$(check_stack "${PRJ}-${ENV}-fargate")"           >> "$GITHUB_OUTPUT"
          echo "s10=$(check_stack "${PRJ}-${ENV}-data-seed")"         >> "$GITHUB_OUTPUT"

          # ── Step Summary ──
          echo "## Pre-Flight Stack Status" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stack | Current Status | Action |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|---------------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for stack in vpc-sg rds s3 ecr redis observability secrets fargate data-seed; do  # auth(cognito), messaging(embedded kafka), eks excluded by default
            raw=$(aws cloudformation describe-stacks \
              --stack-name "${PRJ}-${ENV}-${stack}" \
              --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "NOT_FOUND")
            case "$raw" in
              CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE)
                action="Skip (already deployed)" ;;
              ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)
                action="Cleanup + Redeploy (was ${raw})" ;;
              NOT_FOUND)
                action="Deploy (new)" ;;
              *)
                action="Deploy (status: ${raw})" ;;
            esac
            echo "| \`${PRJ}-${ENV}-${stack}\` | \`${raw}\` | ${action} |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Environment:** \`$ENV\` | **Region:** \`${{ env.AWS_REGION }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Skip flags:** RDS=\`${{ inputs.skip_rds }}\` | Redis=\`${{ inputs.skip_redis }}\` | Messaging=\`${{ inputs.skip_messaging }}\` | EKS=\`${{ inputs.skip_eks }}\` | Build=\`${{ inputs.skip_build }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Networking:** NAT Gateway=\`${{ inputs.enable_nat_gateway }}\` (false = VPC Endpoints, true = NAT Gateway)" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # 1  VPC & SECURITY GROUPS
  # ───────────────────────────────────────────────────────────────────────────
  deploy-01-vpc:
    name: "1 — VPC & Security Groups"
    needs: check
    # Always run — VPC stack is fast, idempotent, and may need updates
    # (e.g., adding VPC Endpoints, changing NAT Gateway).
    # --no-fail-on-empty-changeset ensures no error when nothing changed.
    if: always() && !failure()
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy VPC & Security Groups
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
          USE_EXISTING: ${{ inputs.use_existing_vpc }}
          EXISTING_VPC: ${{ inputs.existing_vpc_id }}
          NAT_GW: ${{ inputs.enable_nat_gateway }}
        run: |
          CREATE_NEW="true"
          [[ "${USE_EXISTING}" == "true" && -n "${EXISTING_VPC}" ]] && CREATE_NEW="false"

          # Map boolean to CloudFormation string parameter
          CREATE_NAT="false"
          [[ "${NAT_GW}" == "true" ]] && CREATE_NAT="true"

          STACK="${PRJ}-${ENV}-vpc-sg"

          # Cleanup broken stack if exists
          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          if [[ "$STATUS" =~ ^(ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)$ ]]; then
            echo "::warning::Stack ${STACK} in ${STATUS} — deleting before redeploy"
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK"
          fi

          if [[ "${CREATE_NAT}" == "true" ]]; then
            echo "::notice::Using NAT Gateway for private subnet internet access"
          else
            echo "::notice::Using VPC Endpoints for private subnet AWS service access (Secrets Manager, ECR, CloudWatch Logs, S3)"
          fi

          aws cloudformation deploy \
            --template-file DevOps/AWS/CloudFormation/vpc-security-groups.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PRJ}" \
              CreateNewVpc="${CREATE_NEW}" \
              CreateNatGateway="${CREATE_NAT}" \
              ExistingVpcId="${EXISTING_VPC}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

          echo "### ✅ Stack: \`${STACK}\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${CREATE_NAT}" == "true" ]]; then
            echo "🔗 **Networking:** NAT Gateway (full internet access from private subnets)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "🔗 **Networking:** VPC Endpoints (Secrets Manager, ECR, CloudWatch Logs, S3)" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # 2a  RDS POSTGRESQL (needs VPC)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-02a-rds:
    name: "2a — RDS PostgreSQL"
    needs: [check, deploy-01-vpc]
    if: always() && !failure() && needs.check.outputs.s02a == 'deploy' && inputs.skip_rds == false
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy RDS PostgreSQL
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
        run: |
          get_out() {
            aws cloudformation describe-stacks --stack-name "$1" \
              --query "Stacks[0].Outputs[?OutputKey=='$2'].OutputValue" --output text
          }

          STACK="${PRJ}-${ENV}-rds"

          # Auto-heal broken stacks
          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          if [[ "$STATUS" =~ ^(ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)$ ]]; then
            echo "::warning::Stack ${STACK} in ${STATUS} — deleting before redeploy"
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK" 2>/dev/null || true
          fi

          # Clean up orphaned RDS resources
          if [[ ! "$STATUS" =~ ^(CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE)$ ]]; then
            RDS_ID="${PRJ}-${ENV}-postgres"
            RDS_S=$(aws rds describe-db-instances --db-instance-identifier "${RDS_ID}" \
              --query "DBInstances[0].DBInstanceStatus" --output text 2>/dev/null || echo "NOT_FOUND")
            if [ "${RDS_S}" != "NOT_FOUND" ]; then
              echo "::warning::Deleting orphaned RDS: ${RDS_ID}"
              aws rds delete-db-instance --db-instance-identifier "${RDS_ID}" \
                --skip-final-snapshot --delete-automated-backups 2>/dev/null || true
              aws rds wait db-instance-deleted --db-instance-identifier "${RDS_ID}" 2>/dev/null || true
            fi
            aws rds delete-db-subnet-group --db-subnet-group-name "${PRJ}-${ENV}-db-subnet-group" 2>/dev/null || true
          fi

          VPC="${PRJ}-${ENV}-vpc-sg"
          VPC_ID=$(get_out "$VPC" "VpcId")
          PRV1=$(get_out "$VPC" "PrivateSubnet1Id")
          PRV2=$(get_out "$VPC" "PrivateSubnet2Id")
          APP_SG=$(get_out "$VPC" "AppSecurityGroupId")

          aws cloudformation deploy \
            --template-file DevOps/AWS/CloudFormation/rds-postgres.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PRJ}" \
              VpcId="${VPC_ID}" \
              PrivateSubnet1="${PRV1}" \
              PrivateSubnet2="${PRV2}" \
              AppSecurityGroupId="${APP_SG}" \
              RDSMasterPassword="${{ secrets.CLAIMS_PROC_RDS_MASTER_PASSWORD }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

          echo "### Stack: \`${STACK}\`" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # 2b  S3 BUCKETS (no VPC dependency — runs in parallel with VPC)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-02b-s3:
    name: "2b — S3 Buckets"
    needs: [check]
    if: always() && !failure() && needs.check.outputs.s02b == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy S3 Buckets
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
        run: |
          STACK="${PRJ}-${ENV}-s3"

          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          if [[ "$STATUS" =~ ^(ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)$ ]]; then
            echo "::warning::Stack ${STACK} in ${STATUS} — deleting before redeploy"
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK" 2>/dev/null || true
          fi

          # Clean up orphaned S3 buckets
          if [[ ! "$STATUS" =~ ^(CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE)$ ]]; then
            ACCT_ID=$(aws sts get-caller-identity --query Account --output text)
            for SUFFIX in documents static; do
              BUCKET="${PRJ}-${ENV}-${ACCT_ID}-${SUFFIX}"
              if aws s3api head-bucket --bucket "${BUCKET}" 2>/dev/null; then
                echo "::warning::Deleting orphaned S3 bucket: ${BUCKET}"
                aws s3 rm "s3://${BUCKET}" --recursive 2>/dev/null || true
                aws s3api delete-bucket --bucket "${BUCKET}" 2>/dev/null || true
              fi
            done
          fi

          aws cloudformation deploy \
            --template-file DevOps/AWS/CloudFormation/s3-buckets.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PRJ}" \
            --no-fail-on-empty-changeset

          echo "### Stack: \`${STACK}\`" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # 2c  ECR REPOSITORIES (no VPC dependency — runs in parallel with VPC)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-02c-ecr:
    name: "2c — ECR Repositories"
    needs: [check]
    if: always() && !failure() && needs.check.outputs.s02c == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy ECR Repositories
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
        run: |
          STACK="${PRJ}-${ENV}-ecr"

          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          if [[ "$STATUS" =~ ^(ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)$ ]]; then
            echo "::warning::Stack ${STACK} in ${STATUS} — deleting before redeploy"
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK" 2>/dev/null || true
          fi

          # Clean up orphaned ECR repos
          if [[ ! "$STATUS" =~ ^(CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE)$ ]]; then
            for REPO in "${PRJ}/api-claims" "${PRJ}/api-members" "${PRJ}/api-tenants" \
              "${PRJ}/api-entitlements" "${PRJ}/portal-claims-advisor" "${PRJ}/portal-claims-member" \
              "${PRJ}/portal-batch-assignment" "${PRJ}/portal-tenants" "${PRJ}/portal-entitlements" \
              "${PRJ}/portal-sre"; do
              if aws ecr describe-repositories --repository-names "${REPO}" >/dev/null 2>&1; then
                echo "::warning::Deleting orphaned ECR repo: ${REPO}"
                aws ecr delete-repository --repository-name "${REPO}" --force >/dev/null 2>&1 || true
              fi
            done
          fi

          aws cloudformation deploy \
            --template-file DevOps/AWS/CloudFormation/ecr-repositories.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PRJ}" \
            --no-fail-on-empty-changeset

          echo "### Stack: \`${STACK}\`" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # 2d  ELASTICACHE REDIS (needs VPC)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-02d-redis:
    name: "2d — ElastiCache Redis"
    needs: [check, deploy-01-vpc]
    if: always() && !failure() && needs.check.outputs.s02d == 'deploy' && inputs.skip_redis == false
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy ElastiCache Redis
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
        run: |
          get_out() {
            aws cloudformation describe-stacks --stack-name "$1" \
              --query "Stacks[0].Outputs[?OutputKey=='$2'].OutputValue" --output text
          }

          STACK="${PRJ}-${ENV}-redis"

          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          if [[ "$STATUS" =~ ^(ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)$ ]]; then
            echo "::warning::Stack ${STACK} in ${STATUS} — deleting before redeploy"
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK" 2>/dev/null || true
          fi

          # Clean up orphaned Redis resources
          if [[ ! "$STATUS" =~ ^(CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE)$ ]]; then
            REDIS_ID="${PRJ}-${ENV}-redis"
            REDIS_S=$(aws elasticache describe-replication-groups --replication-group-id "${REDIS_ID}" \
              --query "ReplicationGroups[0].Status" --output text 2>/dev/null || echo "NOT_FOUND")
            if [ "${REDIS_S}" != "NOT_FOUND" ]; then
              echo "::warning::Deleting orphaned Redis: ${REDIS_ID}"
              aws elasticache delete-replication-group --replication-group-id "${REDIS_ID}" \
                --no-retain-primary-cluster 2>/dev/null || true
              aws elasticache wait replication-group-deleted --replication-group-id "${REDIS_ID}" 2>/dev/null || true
            fi
            aws elasticache delete-cache-subnet-group \
              --cache-subnet-group-name "${PRJ}-${ENV}-redis-subnet-group" 2>/dev/null || true
          fi

          VPC="${PRJ}-${ENV}-vpc-sg"
          VPC_ID=$(get_out "$VPC" "VpcId")
          PRV1=$(get_out "$VPC" "PrivateSubnet1Id")
          PRV2=$(get_out "$VPC" "PrivateSubnet2Id")
          APP_SG=$(get_out "$VPC" "AppSecurityGroupId")

          aws cloudformation deploy \
            --template-file DevOps/AWS/CloudFormation/elasticache-redis.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PRJ}" \
              VpcId="${VPC_ID}" \
              PrivateSubnet1="${PRV1}" \
              PrivateSubnet2="${PRV2}" \
              AppSecurityGroupId="${APP_SG}" \
              RedisAuthToken="${{ secrets.CLAIMS_PROC_REDIS_AUTH_TOKEN }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

          echo "### Stack: \`${STACK}\`" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # 3  OBSERVABILITY (CloudWatch, CloudTrail, SNS)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-03-obs:
    name: "3 — Observability"
    needs: [check, deploy-02a-rds, deploy-02b-s3, deploy-02c-ecr, deploy-02d-redis]
    if: always() && !failure() && needs.check.outputs.s03 == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Clean up orphaned observability resources
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
        run: |
          STACK="${PRJ}-${ENV}-observability"
          ACCT_ID=$(aws sts get-caller-identity --query Account --output text)

          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")

          # Auto-heal broken stacks
          if [[ "$STATUS" =~ ^(ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)$ ]]; then
            echo "::warning::Stack ${STACK} in ${STATUS} — deleting before redeploy"
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK" 2>/dev/null || true
          elif [[ "$STATUS" =~ ^(CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE)$ ]]; then
            echo "Stack is active — skipping orphan cleanup."
            exit 0
          fi

          echo "Cleaning up orphaned observability resources..."

          # ── CloudWatch Log Groups ──
          for SVC in api-claims api-members api-tenants api-entitlements \
            portal-claims-advisor portal-claims-member portal-batch-assignment \
            portal-tenants portal-entitlements portal-sre cloudtrail; do
            LG="/${PRJ}/${ENV}/${SVC}"
            if aws logs describe-log-groups --log-group-name-prefix "$LG" \
              --query "logGroups[?logGroupName=='${LG}'].logGroupName" --output text 2>/dev/null | grep -q .; then
              echo "::warning::Deleting orphaned log group: ${LG}"
              aws logs delete-log-group --log-group-name "$LG" 2>/dev/null || true
            fi
          done

          # ── SNS Topic ──
          TOPIC_ARN="arn:aws:sns:${AWS_REGION}:${ACCT_ID}:${PRJ}-${ENV}-alerts"
          if aws sns get-topic-attributes --topic-arn "$TOPIC_ARN" >/dev/null 2>&1; then
            echo "::warning::Deleting orphaned SNS topic"
            aws sns delete-topic --topic-arn "$TOPIC_ARN" 2>/dev/null || true
          fi

          # ── CloudTrail ──
          TRAIL="${PRJ}-${ENV}-trail"
          if aws cloudtrail describe-trails --trail-name-list "$TRAIL" \
            --query "trailList[0].TrailARN" --output text 2>/dev/null | grep -q "arn:"; then
            echo "::warning::Deleting orphaned CloudTrail: ${TRAIL}"
            aws cloudtrail stop-logging --name "$TRAIL" 2>/dev/null || true
            aws cloudtrail delete-trail --name "$TRAIL" 2>/dev/null || true
          fi

          # ── CloudTrail S3 Bucket ──
          BUCKET="${PRJ}-${ENV}-cloudtrail-logs-${ACCT_ID}"
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "::warning::Emptying and deleting orphaned bucket: ${BUCKET}"
            aws s3 rm "s3://${BUCKET}" --recursive 2>/dev/null || true
            aws s3api delete-bucket --bucket "$BUCKET" 2>/dev/null || true
          fi

          # ── IAM Role ──
          ROLE="${PRJ}-${ENV}-cloudtrail-cw-role"
          if aws iam get-role --role-name "$ROLE" >/dev/null 2>&1; then
            echo "::warning::Deleting orphaned IAM role: ${ROLE}"
            for POL in $(aws iam list-role-policies --role-name "$ROLE" --query 'PolicyNames' --output text 2>/dev/null); do
              aws iam delete-role-policy --role-name "$ROLE" --policy-name "$POL" 2>/dev/null || true
            done
            aws iam delete-role --role-name "$ROLE" 2>/dev/null || true
          fi

          # ── CloudWatch Dashboard ──
          DASH="ClaimsProcessor-${ENV}-AppHealth"
          if aws cloudwatch get-dashboard --dashboard-name "$DASH" >/dev/null 2>&1; then
            echo "::warning::Deleting orphaned dashboard: ${DASH}"
            aws cloudwatch delete-dashboards --dashboard-names "$DASH" 2>/dev/null || true
          fi

          # ── CloudWatch Alarms ──
          ALARMS="${PRJ}-${ENV}-High5xxRate ${PRJ}-${ENV}-HighLatencyP99 ${PRJ}-${ENV}-LowAvailability ${PRJ}-${ENV}-RDS-CPUHigh ${PRJ}-${ENV}-RDS-FreeStorageLow"
          EXISTING=$(aws cloudwatch describe-alarms --alarm-names $ALARMS \
            --query 'MetricAlarms[].AlarmName' --output text 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "::warning::Deleting orphaned alarms: ${EXISTING}"
            aws cloudwatch delete-alarms --alarm-names $EXISTING 2>/dev/null || true
          fi

          echo "Orphan cleanup complete."

      - name: Deploy Observability Stack
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
        run: |
          STACK="${PRJ}-${ENV}-observability"

          # Preserve EnableApplicationSignals if previously set by AWS_100
          SIGNALS_STATE=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --query "Stacks[0].Parameters[?ParameterKey=='EnableApplicationSignals'].ParameterValue | [0]" \
            --output text 2>/dev/null || echo "false")
          [[ "$SIGNALS_STATE" == "None" || -z "$SIGNALS_STATE" ]] && SIGNALS_STATE="false"

          aws cloudformation deploy \
            --template-file DevOps/AWS/CloudFormation/observability.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PRJ}" \
              EnableApplicationSignals="${SIGNALS_STATE}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

          echo "### Stack: \`${STACK}\`" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # 4  AUTH (Cognito)
