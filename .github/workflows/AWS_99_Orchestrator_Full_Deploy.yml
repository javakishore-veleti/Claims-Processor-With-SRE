  # ───────────────────────────────────────────────────────────────────────────
  # 5  MESSAGING & SEARCH (MSK + OpenSearch)  ── OPTIONAL (skip_messaging)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-05-messaging:
    name: "5 — Messaging & Search (MSK/OpenSearch)"
    needs: [check, deploy-03-obs]  # deploy-04-auth(cognito) removed
    if: always() && !failure() && needs.check.outputs.s05 == 'deploy' && inputs.skip_messaging == false
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy Messaging & Search
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
        run: |
          get_out() {
            aws cloudformation describe-stacks --stack-name "$1" \
              --query "Stacks[0].Outputs[?OutputKey=='$2'].OutputValue" --output text
          }

          STACK="${PRJ}-${ENV}-messaging-search"

          # Auto-heal: delete broken stacks before redeploy
          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          if [[ "$STATUS" =~ ^(ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)$ ]]; then
            echo "::warning::Stack ${STACK} in ${STATUS} — deleting before redeploy"
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK"
          fi

          VPC="${PRJ}-${ENV}-vpc-sg"
          VPC_ID=$(get_out "$VPC" "VpcId")
          PRV1=$(get_out "$VPC" "PrivateSubnet1Id")
          PRV2=$(get_out "$VPC" "PrivateSubnet2Id")
          APP_SG=$(get_out "$VPC" "AppSecurityGroupId")

          aws cloudformation deploy \
            --template-file DevOps/AWS/CloudFormation/messaging-search.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PRJ}" \
              VpcId="${VPC_ID}" \
              PrivateSubnet1="${PRV1}" \
              PrivateSubnet2="${PRV2}" \
              AppSecurityGroupId="${APP_SG}" \
              EnableOpenSearch="true" \
              OpenSearchMasterPassword="${{ secrets.CLAIMS_PROC_OPENSEARCH_MASTER_PASSWORD }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

          echo "### Stack: \`${STACK}\`" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # 6  SECRETS MANAGER
  # ───────────────────────────────────────────────────────────────────────────
  deploy-06-secrets:
    name: "6 — Secrets Manager"
    needs: [check, deploy-03-obs, deploy-05-messaging]  # deploy-04-auth(cognito) removed
    if: always() && !failure() && needs.check.outputs.s06 == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Secrets Manager Stack
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
        run: |
          STACK="${PRJ}-${ENV}-secrets"

          # Auto-heal: delete broken stacks before redeploy
          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          if [[ "$STATUS" =~ ^(ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)$ ]]; then
            echo "::warning::Stack ${STACK} in ${STATUS} — deleting before redeploy"
            # Force-delete secrets first (they block stack deletion)
            SECRETS=$(aws secretsmanager list-secrets \
              --query "SecretList[?contains(Name, '${PRJ}/${ENV}') || contains(Name, '${PRJ}-${ENV}')].ARN" \
              --output text 2>/dev/null || echo "")
            for ARN in $SECRETS; do
              aws secretsmanager delete-secret --secret-id "$ARN" \
                --force-delete-without-recovery 2>/dev/null || true
            done
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK"
          fi

          aws cloudformation deploy \
            --template-file DevOps/AWS/CloudFormation/secrets-manager.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PRJ}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

          echo "### ✅ Stack: \`${STACK}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Populate secrets with infrastructure values
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
          DB_PASS: ${{ secrets.CLAIMS_PROC_RDS_MASTER_PASSWORD }}
          REDIS_TOKEN: ${{ secrets.CLAIMS_PROC_REDIS_AUTH_TOKEN }}
          JWT_KEY: ${{ secrets.CLAIMS_PROC_JWT_SIGNING_KEY }}
          AES_KEY: ${{ secrets.CLAIMS_PROC_AES_ENCRYPTION_KEY }}
        run: |
          get_out() {
            aws cloudformation describe-stacks --stack-name "$1" \
              --query "Stacks[0].Outputs[?OutputKey=='$2'].OutputValue" --output text
          }
          RDS_STACK="${PRJ}-${ENV}-rds"
          # AUTH="${PRJ}-${ENV}-auth"  # COGNITO COMMENTED OUT
          SEC="${PRJ}-${ENV}-secrets"

          RDS_HOST=$(get_out "$RDS_STACK" "RDSEndpoint")
          RDS_PORT=$(get_out "$RDS_STACK" "RDSPort")
          # POOL_ID=$(get_out "$AUTH" "UserPoolId")      # COGNITO COMMENTED OUT
          # CLIENT_ID=$(get_out "$AUTH" "UserPoolClientId")  # COGNITO COMMENTED OUT
          # DOMAIN=$(get_out "$AUTH" "UserPoolDomain")    # COGNITO COMMENTED OUT
          RDS_ARN=$(get_out "$SEC" "RDSCredentialsSecretArn")
          JWT_ARN=$(get_out "$SEC" "JWTSigningKeySecretArn")
          ENC_ARN=$(get_out "$SEC" "EncryptionKeysSecretArn")
          # COG_ARN=$(get_out "$SEC" "CognitoConfigSecretArn")  # COGNITO COMMENTED OUT
          REDIS_ARN=$(get_out "$SEC" "RedisCredentialsSecretArn")

          # Construct JDBC URL for Fargate task (expects 'jdbc_url' key)
          JDBC_URL="jdbc:postgresql://${RDS_HOST}:${RDS_PORT}/claims_db"

          [[ -n "$RDS_ARN" && -n "$DB_PASS" ]] && \
            aws secretsmanager put-secret-value --secret-id "$RDS_ARN" \
              --secret-string "{\"username\":\"claims_user\",\"password\":\"${DB_PASS}\",\"host\":\"${RDS_HOST}\",\"port\":\"${RDS_PORT}\",\"dbname\":\"claims_db\",\"jdbc_url\":\"${JDBC_URL}\"}"

          # Construct Redis URL for Fargate task (expects 'url' key)
          REDIS_STACK="${PRJ}-${ENV}-redis"
          REDIS_HOST=$(get_out "$REDIS_STACK" "RedisEndpoint" 2>/dev/null || echo "placeholder-redis")
          REDIS_PORT=$(get_out "$REDIS_STACK" "RedisPort" 2>/dev/null || echo "6379")
          REDIS_URL="redis://:${REDIS_TOKEN}@${REDIS_HOST}:${REDIS_PORT}"

          [[ -n "$REDIS_ARN" && -n "$REDIS_TOKEN" ]] && \
            aws secretsmanager put-secret-value --secret-id "$REDIS_ARN" \
              --secret-string "{\"auth-token\":\"${REDIS_TOKEN}\",\"host\":\"${REDIS_HOST}\",\"port\":\"${REDIS_PORT}\",\"url\":\"${REDIS_URL}\"}"

          [[ -n "$JWT_ARN" && -n "$JWT_KEY" ]] && \
            aws secretsmanager put-secret-value --secret-id "$JWT_ARN" \
              --secret-string "{\"signing-key\":\"${JWT_KEY}\"}"

          [[ -n "$ENC_ARN" && -n "$AES_KEY" ]] && \
            aws secretsmanager put-secret-value --secret-id "$ENC_ARN" \
              --secret-string "{\"aes-key\":\"${AES_KEY}\"}"

                    # COGNITO COMMENTED OUT — COG_ARN block removed


          echo "::notice::Secrets populated for ${ENV}"

  # ───────────────────────────────────────────────────────────────────────────
  # 7  EKS CLUSTER  ── OPTIONAL (skip_eks)
  # ───────────────────────────────────────────────────────────────────────────
  deploy-07-eks:
    name: "7 — EKS Cluster"
    needs: [check, deploy-06-secrets]
    if: always() && !failure() && needs.check.outputs.s07 == 'deploy' && inputs.skip_eks == false
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy EKS Cluster
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
        run: |
          get_out() {
            aws cloudformation describe-stacks --stack-name "$1" \
              --query "Stacks[0].Outputs[?OutputKey=='$2'].OutputValue" --output text
          }

          STACK="${PRJ}-${ENV}-eks"

          # Auto-heal: delete broken stacks before redeploy
          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          if [[ "$STATUS" =~ ^(ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)$ ]]; then
            echo "::warning::Stack ${STACK} in ${STATUS} — deleting before redeploy"
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK"
          fi

          VPC="${PRJ}-${ENV}-vpc-sg"
          VPC_ID=$(get_out "$VPC" "VpcId")
          PRV1=$(get_out "$VPC" "PrivateSubnet1Id")
          PRV2=$(get_out "$VPC" "PrivateSubnet2Id")
          PUB1=$(get_out "$VPC" "PublicSubnet1Id")
          PUB2=$(get_out "$VPC" "PublicSubnet2Id")

          aws cloudformation deploy \
            --template-file DevOps/AWS/CloudFormation/eks-cluster.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PRJ}" \
              VpcId="${VPC_ID}" \
              PrivateSubnet1="${PRV1}" \
              PrivateSubnet2="${PRV2}" \
              PublicSubnet1="${PUB1}" \
              PublicSubnet2="${PUB2}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

          echo "### ✅ Stack: \`${STACK}\`" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # 8  BUILD & PUSH DOCKER IMAGES TO ECR  ── OPTIONAL (skip_build)
  # ───────────────────────────────────────────────────────────────────────────
  build-images:
    name: "8 — Build & Push Docker Images"
    needs: [check, deploy-02c-ecr, deploy-06-secrets]
    if: always() && !failure() && inputs.skip_build == false
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Get AWS Account ID
        id: aws-info
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "registry=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_OUTPUT"

      - name: Check if images already exist in ECR
        id: ecr-check
        env:
          PRJ: ${{ env.PROJECT_NAME }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          EXISTING=$(aws ecr describe-images --repository-name "${PRJ}/api-claims" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --query 'imageDetails[0].imagePushedAt' --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$EXISTING" != "NOT_FOUND" ] && [ -n "$EXISTING" ]; then
            echo "Images already in ECR (pushed: ${EXISTING}) — skipping entire build."
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "needs_maven=false" >> "$GITHUB_OUTPUT"
          else
            echo "No images in ECR — build needed."
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Try to restore cached JARs from a previous Maven build ──
      - name: Restore JAR cache
        if: steps.ecr-check.outputs.needs_build == 'true'
        id: jar-cache
        uses: actions/cache@v4
        with:
          path: |
            API-Claims/target
            API-Members/target
            API-Tenants/target
            API-Entitlements/target
            Portal-Claims-Advisor/target
            Portal-Claims-Member/target
            Portal-Batch-Assignment/target
            Portal-Tenants/target
            Portal-Entitlements/target
            Portal-SRE/target
          key: jars-${{ hashFiles('**/pom.xml', '**/src/**/*.java', '**/src/**/*.xml', '**/src/**/*.yml', '**/src/**/*.yaml', '**/src/**/*.properties') }}

      - name: Check if cached JARs are usable
        if: steps.ecr-check.outputs.needs_build == 'true'
        id: jar-check
        run: |
          # Verify all 10 JARs exist from cache
          MISSING=0
          for DIR in API-Claims API-Members API-Tenants API-Entitlements \
            Portal-Claims-Advisor Portal-Claims-Member Portal-Batch-Assignment \
            Portal-Tenants Portal-Entitlements Portal-SRE; do
            if ! ls "${DIR}/target/"*.jar >/dev/null 2>&1; then
              MISSING=$((MISSING + 1))
            fi
          done

          if [ "$MISSING" -eq 0 ]; then
            echo "All 10 JARs found in cache — skipping Maven build."
            echo "needs_maven=false" >> "$GITHUB_OUTPUT"
          else
            echo "${MISSING} JARs missing — Maven build required."
            echo "needs_maven=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Maven build (only if JARs not cached) ──
      - uses: actions/setup-java@v4
        if: steps.ecr-check.outputs.needs_build == 'true' && steps.jar-check.outputs.needs_maven == 'true'
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Cache Maven dependencies
        if: steps.ecr-check.outputs.needs_build == 'true' && steps.jar-check.outputs.needs_maven == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-
      - name: Build Java artifacts
        if: steps.ecr-check.outputs.needs_build == 'true' && steps.jar-check.outputs.needs_maven == 'true'
        run: |
          echo "Building all modules with Maven..."
          mvn clean install -DskipTests -B -q
          echo "Maven build completed."

      # ── Docker build + push (only if ECR doesn't have images) ──
      - uses: docker/setup-buildx-action@v3
        if: steps.ecr-check.outputs.needs_build == 'true'
      - name: Build & push Docker images
        if: steps.ecr-check.outputs.needs_build == 'true'
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          REGISTRY: ${{ steps.aws-info.outputs.registry }}
        run: |
          MODULES=(
            "api-claims:API-Claims"
            "api-members:API-Members"
            "api-tenants:API-Tenants"
            "api-entitlements:API-Entitlements"
            "portal-claims-advisor:Portal-Claims-Advisor"
            "portal-claims-member:Portal-Claims-Member"
            "portal-batch-assignment:Portal-Batch-Assignment"
            "portal-tenants:Portal-Tenants"
            "portal-entitlements:Portal-Entitlements"
            "portal-sre:Portal-SRE"
          )

          BUILT=0
          for entry in "${MODULES[@]}"; do
            NAME="${entry%%:*}"
            DIR="${entry##*:}"
            REPO="${REGISTRY}/${PRJ}/${NAME}"

            aws ecr describe-repositories --repository-names "${PRJ}/${NAME}" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "${PRJ}/${NAME}" \
                --image-scanning-configuration scanOnPush=true >/dev/null

            docker buildx build \
              --cache-from "type=gha,scope=${NAME}" \
              --cache-to "type=gha,mode=max,scope=${NAME}" \
              --tag "${REPO}:${IMAGE_TAG}" \
              --tag "${REPO}:${ENV}-${IMAGE_TAG}" \
              --tag "${REPO}:${GITHUB_SHA::8}" \
              --file "${DIR}/Dockerfile" \
              --push \
              "${DIR}"

            BUILT=$((BUILT + 1))
          done

          echo "### Build & Push: ${BUILT} images" >> "$GITHUB_STEP_SUMMARY"

      - name: Build skipped — images already in ECR
        if: steps.ecr-check.outputs.needs_build == 'false'
        run: |
          echo "### Build Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "Images with tag \`${{ inputs.image_tag }}\` already exist in ECR." >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # 9  API GATEWAY + FARGATE SERVICES
  # ───────────────────────────────────────────────────────────────────────────
  deploy-09-fargate:
    name: "9 — API Gateway & Fargate Services"
    needs: [check, build-images, deploy-07-eks]
    if: always() && !failure() && needs.check.outputs.s09 == 'deploy'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy API Gateway & Fargate
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          get_out() {
            aws cloudformation describe-stacks --stack-name "$1" \
              --query "Stacks[0].Outputs[?OutputKey=='$2'].OutputValue" --output text
          }

          STACK="${PRJ}-${ENV}-fargate"

          # Auto-heal: delete broken stacks before redeploy
          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          if [[ "$STATUS" =~ ^(ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)$ ]]; then
            echo "::warning::Stack ${STACK} in ${STATUS} — deleting before redeploy"
            # Scale down ECS services first
            CLUSTER="${PRJ}-${ENV}"
            SERVICES=$(aws ecs list-services --cluster "$CLUSTER" \
              --query 'serviceArns[*]' --output text 2>/dev/null || echo "")
            for SVC_ARN in $SERVICES; do
              aws ecs update-service --cluster "$CLUSTER" --service "$SVC_ARN" \
                --desired-count 0 --no-cli-pager 2>/dev/null || true
            done
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK"
          fi

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          VPC="${PRJ}-${ENV}-vpc-sg"
          SEC="${PRJ}-${ENV}-secrets"

          VPC_ID=$(get_out "$VPC" "VpcId")
          PUB1=$(get_out "$VPC" "PublicSubnet1Id")
          PUB2=$(get_out "$VPC" "PublicSubnet2Id")
          PRV1=$(get_out "$VPC" "PrivateSubnet1Id")
          PRV2=$(get_out "$VPC" "PrivateSubnet2Id")
          APP_SG=$(get_out "$VPC" "AppSecurityGroupId")
          ALB_SG=$(get_out "$VPC" "ALBSecurityGroupId")
          RDS_ARN=$(get_out "$SEC" "RDSCredentialsSecretArn")
          REDIS_ARN=$(get_out "$SEC" "RedisCredentialsSecretArn")

          # Template >51KB — must upload to S3 first
          CFN_BUCKET="${PRJ}-${ENV}-cfn-templates-${ACCOUNT_ID}"
          aws s3api head-bucket --bucket "$CFN_BUCKET" 2>/dev/null || \
            aws s3api create-bucket --bucket "$CFN_BUCKET" --region "${AWS_REGION}"

          aws cloudformation deploy \
            --template-file DevOps/AWS/CloudFormation/api-gateway-fargate.yaml \
            --stack-name "$STACK" \
            --s3-bucket "$CFN_BUCKET" \
            --s3-prefix "cloudformation" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PRJ}" \
              VpcId="${VPC_ID}" \
              PublicSubnet1="${PUB1}" \
              PublicSubnet2="${PUB2}" \
              PrivateSubnet1="${PRV1}" \
              PrivateSubnet2="${PRV2}" \
              AppSecurityGroupId="${APP_SG}" \
              ALBSecurityGroupId="${ALB_SG}" \
              ImageTag="${IMAGE_TAG}" \
              AWSAccountId="${ACCOUNT_ID}" \
              AWSRegion="${AWS_REGION}" \
              ECRRepoPrefix="${PRJ}" \
              RDSSecretArn="${RDS_ARN}" \
              RedisSecretArn="${REDIS_ARN}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --disable-rollback

          echo "### Stack: \`${STACK}\`" >> "$GITHUB_STEP_SUMMARY"

      # Diagnostic step: capture ECS task failure reasons and container logs
      - name: Diagnose Fargate failures
        if: failure()
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
        run: |
          CLUSTER="${PRJ}-${ENV}"
          LOG_GROUP="/${PRJ}/${ENV}/ecs"

          echo "## Fargate Deployment Diagnostics" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # 1. CloudFormation stack events (failures only)
          echo "### CloudFormation Failed Events" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          aws cloudformation describe-stack-events \
            --stack-name "${PRJ}-${ENV}-fargate" \
            --query "StackEvents[?ResourceStatus=='CREATE_FAILED'].[LogicalResourceId,ResourceStatusReason]" \
            --output table 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "No events found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # 2. Stopped task reasons
          echo "### ECS Stopped Task Reasons" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          TASK_ARNS=$(aws ecs list-tasks --cluster "$CLUSTER" --desired-status STOPPED \
            --query 'taskArns[0:5]' --output text 2>/dev/null || echo "")
          if [[ -n "$TASK_ARNS" && "$TASK_ARNS" != "None" ]]; then
            aws ecs describe-tasks --cluster "$CLUSTER" --tasks $TASK_ARNS \
              --query "tasks[].{service:group,reason:stoppedReason,status:lastStatus,container_exit:containers[0].exitCode,container_reason:containers[0].reason}" \
              --output table 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "Could not describe tasks" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No stopped tasks found in cluster" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # 3. Recent CloudWatch logs (last 50 events)
          echo "### Recent Container Logs" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          STREAMS=$(aws logs describe-log-streams --log-group-name "$LOG_GROUP" \
            --order-by LastEventTime --descending --limit 3 \
            --query 'logStreams[*].logStreamName' --output text 2>/dev/null || echo "")
          if [[ -n "$STREAMS" && "$STREAMS" != "None" ]]; then
            for STREAM in $STREAMS; do
              echo "--- Stream: $STREAM ---"
              aws logs get-log-events --log-group-name "$LOG_GROUP" \
                --log-stream-name "$STREAM" --limit 30 \
                --query 'events[*].message' --output text 2>/dev/null || echo "No events"
              echo ""
            done >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No log streams found in $LOG_GROUP" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Note:** Stack left in CREATE_FAILED state with --disable-rollback for inspection." >> "$GITHUB_STEP_SUMMARY"
          echo "> Delete manually before next deploy: \`aws cloudformation delete-stack --stack-name ${PRJ}-${ENV}-fargate\`" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # 10  DATA SEED LAMBDA
  # ───────────────────────────────────────────────────────────────────────────
  deploy-10-seed:
    name: "10 — Data Seed Lambda"
    needs: [check, deploy-09-fargate]
    if: always() && !failure() && needs.check.outputs.s10 == 'deploy' && inputs.skip_rds == false
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy Data Seed Lambda
        env:
          ENV: ${{ inputs.environment }}
          PRJ: ${{ env.PROJECT_NAME }}
        run: |
          get_out() {
            aws cloudformation describe-stacks --stack-name "$1" \
              --query "Stacks[0].Outputs[?OutputKey=='$2'].OutputValue" --output text
          }

          STACK="${PRJ}-${ENV}-data-seed"

          # Auto-heal: delete broken stacks before redeploy
          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NOT_FOUND")
          if [[ "$STATUS" =~ ^(ROLLBACK_COMPLETE|CREATE_FAILED|DELETE_FAILED)$ ]]; then
            echo "::warning::Stack ${STACK} in ${STATUS} — deleting before redeploy"
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK"
          fi

          VPC="${PRJ}-${ENV}-vpc-sg"
          RDS_STACK="${PRJ}-${ENV}-rds"

          VPC_ID=$(get_out "$VPC" "VpcId")
          PRV1=$(get_out "$VPC" "PrivateSubnet1Id")
          PRV2=$(get_out "$VPC" "PrivateSubnet2Id")
          RDS_SG=$(get_out "$VPC" "RDSSecurityGroupId")
          RDS_ENDPOINT=$(get_out "$RDS_STACK" "RDSEndpoint")
          RDS_PORT=$(get_out "$RDS_STACK" "RDSPort")

          aws cloudformation deploy \
            --template-file DevOps/AWS/CloudFormation/data-seed-lambda.yaml \
            --stack-name "$STACK" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PRJ}" \
              VpcId="${VPC_ID}" \
              PrivateSubnet1="${PRV1}" \
              PrivateSubnet2="${PRV2}" \
              RDSSecurityGroupId="${RDS_SG}" \
              RDSEndpoint="${RDS_ENDPOINT}" \
              RDSPort="${RDS_PORT}" \
              RDSUsername="claims_user" \
              RDSPassword="${{ secrets.CLAIMS_PROC_RDS_MASTER_PASSWORD }}" \
              RDSDBName="claims_db" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

          echo "### ✅ Stack: \`${STACK}\`" >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # SUMMARY — Full environment dashboard
  # ───────────────────────────────────────────────────────────────────────────
  summary:
    name: "✅ Environment Dashboard"
    needs:
      - deploy-01-vpc
      - deploy-02a-rds
      - deploy-02b-s3
      - deploy-02c-ecr
      - deploy-02d-redis
      - deploy-03-obs
      # - deploy-04-auth  # COGNITO COMMENTED OUT
      - deploy-05-messaging
      - deploy-06-secrets
      - deploy-07-eks
      - build-images
      - deploy-09-fargate
      - deploy-10-seed
    if: always()
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Generate environment dashboard
        env:
          ENV: ${{ inputs.environment }}
          REGION: ${{ env.AWS_REGION }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
          REPO: ${{ github.repository }}
        run: |
          chmod +x DevOps/AWS/scripts/environment-dashboard.sh
          bash DevOps/AWS/scripts/environment-dashboard.sh
