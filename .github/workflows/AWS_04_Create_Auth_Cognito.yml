name: "AWS_04 - Create Auth (Cognito)"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      callback_url:
        description: "OAuth2 callback URL (local: http://localhost:8081/callback  |  AWS: https://<ALB-DNS>/callback)"
        required: false
        type: string
        default: http://localhost:8081/callback
      logout_url:
        description: "Sign-out redirect URL (local: http://localhost:8081/logout  |  AWS: https://<ALB-DNS>/logout)"
        required: false
        type: string
        default: http://localhost:8081/logout

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: claims-proc-${{ github.event.inputs.environment }}-auth
  TEMPLATE_FILE: DevOps/AWS/CloudFormation/auth-cognito.yaml

jobs:
  deploy:
    name: "Create auth stack (${{ github.event.inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

