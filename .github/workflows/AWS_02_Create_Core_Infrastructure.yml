name: "AWS_02 - Create Core Infrastructure"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

      vpc_id_override:
        description: 'VPC ID override (leave empty to resolve from vpc-sg stack)'
        required: false
        type: string
        default: ''

      private_subnet_1:
        description: 'Private Subnet 1 ID override (required if not using AWS_01 vpc-sg stack)'
        required: false
        type: string
        default: ''

      private_subnet_2:
        description: 'Private Subnet 2 ID override (required if not using AWS_01 vpc-sg stack)'
        required: false
        type: string
        default: ''

      app_sg_id:
        description: 'App Security Group ID override (required if not using AWS_01 vpc-sg stack)'
        required: false
        type: string
        default: ''

      rds_instance_class:
        description: 'RDS instance class'
        required: false
        type: string
        default: 'db.t3.medium'

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: claims-proc
  STACK_NAME_PREFIX: claims-proc
  CFN_TEMPLATE: DevOps/AWS/CloudFormation/core-infrastructure.yaml
  PARAMS_DIR: DevOps/AWS/CloudFormation/Parameters

jobs:
  deploy-core-infrastructure:
    name: "Create core-infra (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Configure AWS credentials
      # ------------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ------------------------------------------------------------------
      # 3. Resolve VPC and subnet details
      # Priority: workflow input overrides → vpc-sg CloudFormation stack
      # Use overrides when you have an existing VPC not managed by AWS_01.
      # ------------------------------------------------------------------
      - name: Resolve VPC and networking
        id: vpc
        run: |
          VPC_SG_STACK="${STACK_NAME_PREFIX}-${{ inputs.environment }}-vpc-sg"
          ENV="${{ inputs.environment }}"

          # ── VPC ID ──────────────────────────────────────────────────────
          if [ -n "${{ inputs.vpc_id_override }}" ]; then
            echo "VPC ID: using input override"
            VPC_ID="${{ inputs.vpc_id_override }}"
          else
            echo "VPC ID: looking up from stack ${VPC_SG_STACK}"
            VPC_ID=$(aws cloudformation describe-stacks \
              --stack-name "${VPC_SG_STACK}" \
              --query "Stacks[0].Outputs[?OutputKey=='VpcId'].OutputValue" \
              --output text 2>/dev/null || true)
          fi

          # ── Private Subnet 1 ────────────────────────────────────────────
          if [ -n "${{ inputs.private_subnet_1 }}" ]; then
            echo "Private Subnet 1: using input override"
            PRIVATE_SUBNET_1="${{ inputs.private_subnet_1 }}"
          else
            echo "Private Subnet 1: looking up from stack ${VPC_SG_STACK}"
            PRIVATE_SUBNET_1=$(aws cloudformation describe-stacks \
              --stack-name "${VPC_SG_STACK}" \
              --query "Stacks[0].Outputs[?OutputKey=='PrivateSubnet1Id'].OutputValue" \
              --output text 2>/dev/null || true)
          fi

          # ── Private Subnet 2 ────────────────────────────────────────────
          if [ -n "${{ inputs.private_subnet_2 }}" ]; then
            echo "Private Subnet 2: using input override"
            PRIVATE_SUBNET_2="${{ inputs.private_subnet_2 }}"
          else
            echo "Private Subnet 2: looking up from stack ${VPC_SG_STACK}"
            PRIVATE_SUBNET_2=$(aws cloudformation describe-stacks \
              --stack-name "${VPC_SG_STACK}" \
              --query "Stacks[0].Outputs[?OutputKey=='PrivateSubnet2Id'].OutputValue" \
              --output text 2>/dev/null || true)
          fi

          # ── App Security Group ───────────────────────────────────────────
          if [ -n "${{ inputs.app_sg_id }}" ]; then
            echo "App Security Group: using input override"
            APP_SG_ID="${{ inputs.app_sg_id }}"
          else
            echo "App Security Group: looking up from stack ${VPC_SG_STACK}"
            APP_SG_ID=$(aws cloudformation describe-stacks \
              --stack-name "${VPC_SG_STACK}" \
              --query "Stacks[0].Outputs[?OutputKey=='AppSecurityGroupId'].OutputValue" \
              --output text 2>/dev/null || true)
          fi

          # ── Validation ───────────────────────────────────────────────────
          FAILED=0
          for VAR_NAME in VPC_ID PRIVATE_SUBNET_1 PRIVATE_SUBNET_2 APP_SG_ID; do
            VAL="${!VAR_NAME}"
            if [ -z "${VAL}" ] || [ "${VAL}" == "None" ]; then
              echo "ERROR: ${VAR_NAME} could not be resolved."
              FAILED=1
            fi
          done

          if [ "${FAILED}" == "1" ]; then
            echo ""
            echo "One or more required networking values are missing."
            echo "You have two options:"
            echo "  Option A — Run AWS_01 first to create the vpc-sg stack for '${ENV}'"
            echo "  Option B — Provide the values directly as workflow inputs:"
            echo "             vpc_id_override, private_subnet_1, private_subnet_2, app_sg_id"
            exit 1
          fi

          echo "vpc_id=${VPC_ID}" >> "$GITHUB_OUTPUT"
          echo "private_subnet_1=${PRIVATE_SUBNET_1}" >> "$GITHUB_OUTPUT"
          echo "private_subnet_2=${PRIVATE_SUBNET_2}" >> "$GITHUB_OUTPUT"
          echo "app_sg_id=${APP_SG_ID}" >> "$GITHUB_OUTPUT"

          echo "Resolved VPC ID:           ${VPC_ID}"
          echo "Resolved Private Subnet 1: ${PRIVATE_SUBNET_1}"
          echo "Resolved Private Subnet 2: ${PRIVATE_SUBNET_2}"
          echo "Resolved App SG ID:        ${APP_SG_ID}"

      # ------------------------------------------------------------------
      # 4. Resolve RDS instance class
      # ------------------------------------------------------------------
      - name: Resolve RDS instance class
        id: rds
        run: |
          if [ -n "${{ inputs.rds_instance_class }}" ]; then
            RDS_CLASS="${{ inputs.rds_instance_class }}"
          elif [ -n "${{ vars.CLAIMS_PROC_RDS_INSTANCE_CLASS }}" ]; then
            RDS_CLASS="${{ vars.CLAIMS_PROC_RDS_INSTANCE_CLASS }}"
          else
            RDS_CLASS="db.t3.medium"
          fi
          echo "rds_instance_class=${RDS_CLASS}" >> "$GITHUB_OUTPUT"
          echo "Using RDS instance class: ${RDS_CLASS}"

      # ------------------------------------------------------------------
      # 5. Pre-flight: detect and abort on stuck stack states
      #    CloudFormation cannot deploy onto a ROLLBACK_COMPLETE stack.
      #    Developers must delete the stuck stack manually before re-running.
      # ------------------------------------------------------------------
      - name: Pre-flight stack state check
        run: |
          STACK_NAME="${STACK_NAME_PREFIX}-${{ inputs.environment }}-core-infra"

          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Stack: ${STACK_NAME}"
          echo "Status: ${STATUS}"

          case "${STATUS}" in
            CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE)
              echo "Stack is in a deployable state — proceeding."
              ;;
            DOES_NOT_EXIST)
              echo "Stack does not exist — will be created."
              ;;
            ROLLBACK_COMPLETE|CREATE_FAILED)
              echo ""
              echo "ERROR: Stack '${STACK_NAME}' is in state '${STATUS}'."
              echo "CloudFormation cannot update a stack in this state."
              echo ""
              echo "Fix: delete the stuck stack from the AWS Console, then re-run this workflow."
              echo "  AWS Console → CloudFormation → ${STACK_NAME} → Delete"
              echo ""
              echo "This happened because a previous deployment attempt failed and rolled back."
              echo "Deleting and re-running is safe — all resources were already cleaned up by the rollback."
              exit 1
              ;;
            *ROLLBACK*|*FAILED*|*IN_PROGRESS*)
              echo ""
              echo "ERROR: Stack '${STACK_NAME}' is in state '${STATUS}'."
              echo "Wait for the stack to finish its current operation, or delete it from the AWS Console."
              exit 1
              ;;
          esac

      # ------------------------------------------------------------------
      # 6. Pre-flight: clean up orphaned security groups
      #    Previous failed stack runs may leave security groups behind that
      #    were not cleaned up during rollback. CloudFormation will fail with
      #    "already exists" when trying to re-create them.
      #    This step deletes them if they are orphaned (no active stack owns them).
      # ------------------------------------------------------------------
      - name: Pre-flight cleanup of orphaned security groups
        run: |
          ENV="${{ inputs.environment }}"
          VPC_ID="${{ steps.vpc.outputs.vpc_id }}"
          STACK_NAME="${STACK_NAME_PREFIX}-${ENV}-core-infra"

          SG_NAMES="${PROJECT_NAME}-${ENV}-sg-rds ${PROJECT_NAME}-${ENV}-sg-redis"

          for SG_NAME in ${SG_NAMES}; do
            echo "──────────────────────────────────────────"
            echo "Checking: ${SG_NAME}"

            SG_ID=$(aws ec2 describe-security-groups \
              --filters "Name=group-name,Values=${SG_NAME}" "Name=vpc-id,Values=${VPC_ID}" \
              --query "SecurityGroups[0].GroupId" \
              --output text 2>/dev/null)

            if [ -z "${SG_ID}" ] || [ "${SG_ID}" = "None" ]; then
              echo "  Not found — no cleanup needed."
              continue
            fi

            echo "  Found: ${SG_ID}"

            # Check if this SG is tagged to any CloudFormation stack
            OWNER_STACK=$(aws ec2 describe-tags \
              --filters \
                "Name=resource-id,Values=${SG_ID}" \
                "Name=key,Values=aws:cloudformation:stack-name" \
              --query "Tags[0].Value" \
              --output text 2>/dev/null)

            if [ -n "${OWNER_STACK}" ] && [ "${OWNER_STACK}" != "None" ]; then
              # The tag persists even after stack deletion — verify the stack is actually alive
              OWNER_STATUS=$(aws cloudformation describe-stacks \
                --stack-name "${OWNER_STACK}" \
                --query "Stacks[0].StackStatus" \
                --output text 2>/dev/null || echo "DOES_NOT_EXIST")

              echo "  Stack tag: ${OWNER_STACK} (status: ${OWNER_STATUS})"

              case "${OWNER_STATUS}" in
                CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE)
                  if [ "${OWNER_STACK}" != "${STACK_NAME}" ]; then
                    echo "  Owned by a different active stack — skipping deletion."
                    continue
                  fi
                  echo "  Owned by current active stack — CloudFormation will handle it in-place."
                  continue
                  ;;
                *)
                  # Stack is deleted, failed, or does not exist — SG is orphaned despite the tag
                  echo "  Tagged stack is not active (${OWNER_STATUS}) — treating as orphaned."
                  ;;
              esac
            fi

            # Orphaned — safe to delete
            echo "  Orphaned — deleting ${SG_ID}..."
            if aws ec2 delete-security-group --group-id "${SG_ID}"; then
              echo "  Deleted ${SG_ID} successfully."
            else
              echo "  WARNING: Could not delete ${SG_ID}."
              echo "  It may still be attached to a network interface."
              echo "  Fix: go to EC2 → Security Groups → ${SG_ID} and delete it manually."
              exit 1
            fi
          done
          echo "──────────────────────────────────────────"
          echo "Orphan cleanup complete."

      - name: Deploy CloudFormation stack
        run: |
          STACK_NAME="${STACK_NAME_PREFIX}-${{ inputs.environment }}-core-infra"
          ENV="${{ inputs.environment }}"
          PARAMS_FILE="${PARAMS_DIR}/${ENV}.json"

          echo "Deploying stack: ${STACK_NAME}"
          echo "Template: ${CFN_TEMPLATE}"
          echo "Parameters file: ${PARAMS_FILE}"

          aws cloudformation deploy \
            --stack-name "${STACK_NAME}" \
            --template-file "${CFN_TEMPLATE}" \
            --parameter-overrides \
              Environment="${ENV}" \
              ProjectName="${PROJECT_NAME}" \
              VpcId="${{ steps.vpc.outputs.vpc_id }}" \
              PrivateSubnet1="${{ steps.vpc.outputs.private_subnet_1 }}" \
              PrivateSubnet2="${{ steps.vpc.outputs.private_subnet_2 }}" \
              AppSecurityGroupId="${{ steps.vpc.outputs.app_sg_id }}" \
              RDSInstanceClass="${{ steps.rds.outputs.rds_instance_class }}" \
              RDSMasterPassword="${{ secrets.CLAIMS_PROC_RDS_MASTER_PASSWORD }}" \
              RedisAuthToken="${{ secrets.CLAIMS_PROC_REDIS_AUTH_TOKEN }}" \
              $(cat "${PARAMS_FILE}" | python3 -c "
          import json, sys
          params = json.load(sys.stdin)
          skip = {'Environment', 'RDSInstanceClass'}
          for p in params:
              if p['ParameterKey'] not in skip:
                  print(f\"{p['ParameterKey']}={p['ParameterValue']}\")
          ") \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

          echo "Stack deployed successfully."

      # ------------------------------------------------------------------
      # 6. Print stack outputs
      # ------------------------------------------------------------------
      - name: Print stack outputs
        run: |
          STACK_NAME="${STACK_NAME_PREFIX}-${{ inputs.environment }}-core-infra"

          echo "===== Stack Outputs ====="
          aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].Outputs[*].[OutputKey, OutputValue]" \
            --output table


