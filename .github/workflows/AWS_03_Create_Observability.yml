name: "AWS_03 - Create Observability"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: claims-proc-${{ github.event.inputs.environment }}-observability
  TEMPLATE_FILE: DevOps/AWS/CloudFormation/observability.yaml
  PARAMS_FILE: DevOps/AWS/CloudFormation/Parameters/${{ github.event.inputs.environment }}.json

jobs:
  deploy:
    name: "Create observability stack (${{ github.event.inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack
        run: |
          echo "Deploying stack: ${{ env.STACK_NAME }}"
          aws cloudformation deploy \
            --template-file "${{ env.TEMPLATE_FILE }}" \
            --stack-name "${{ env.STACK_NAME }}" \
            --parameter-overrides file://${{ env.PARAMS_FILE }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --tags \
              Project=claims-proc \
              Environment=${{ github.event.inputs.environment }} \
              ManagedBy=github-actions \
              Component=observability \
            --no-fail-on-empty-changeset

          echo "Stack outputs:"
          aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query "Stacks[0].Outputs" \
            --output table


