name: "AWS_00 - Environment Status Dashboard"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to inspect"
        required: true
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: claims-proc

jobs:
  dashboard:
    name: "📊 Dashboard — ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate Environment Dashboard
        env:
          ENV: ${{ github.event.inputs.environment }}
          REGION: ${{ env.AWS_REGION }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
          REPO: ${{ github.repository }}
        run: |
          chmod +x DevOps/AWS/scripts/environment-dashboard.sh
          DevOps/AWS/scripts/environment-dashboard.sh
