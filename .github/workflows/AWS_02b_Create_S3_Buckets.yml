name: "AWS_02b - Create S3 Buckets"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: claims-proc

jobs:
  deploy-s3:
    name: Deploy S3 Buckets (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.CLAIMS_PROC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Pre-flight stack state check
        id: preflight
        run: |
          STACK_NAME="${{ env.PROJECT_NAME }}-${{ inputs.environment }}-s3"
          echo "stack_name=${STACK_NAME}" >> "$GITHUB_OUTPUT"

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "stack_status=${STACK_STATUS}" >> "$GITHUB_OUTPUT"
          echo "Stack '${STACK_NAME}' status: ${STACK_STATUS}"

          if [[ "${STACK_STATUS}" == "ROLLBACK_COMPLETE" || "${STACK_STATUS}" == "CREATE_FAILED" ]]; then
            echo "::error::Stack is in ${STACK_STATUS} state. Please delete the stack manually before re-deploying:"
            echo "::error::  aws cloudformation delete-stack --stack-name ${STACK_NAME}"
            echo "::error::  aws cloudformation wait stack-delete-complete --stack-name ${STACK_NAME}"
            exit 1
          fi

          if [[ "${STACK_STATUS}" == *"IN_PROGRESS"* ]]; then
            echo "::error::Stack is currently in ${STACK_STATUS} state. Please wait for the operation to complete."
            exit 1
          fi

      - name: Pre-flight orphan cleanup
        if: steps.preflight.outputs.stack_status == 'DOES_NOT_EXIST'
        run: |
          PRJ="${{ env.PROJECT_NAME }}"
          ENV="${{ inputs.environment }}"
          ACCT_ID=$(aws sts get-caller-identity --query Account --output text)

          for SUFFIX in documents static; do
            BUCKET="${PRJ}-${ENV}-${ACCT_ID}-${SUFFIX}"
            echo "Checking for orphaned bucket: ${BUCKET}"

            if aws s3api head-bucket --bucket "${BUCKET}" 2>/dev/null; then
              echo "Found orphaned bucket: ${BUCKET} - cleaning up..."

              echo "Removing all current objects..."
              aws s3 rm "s3://${BUCKET}" --recursive

              echo "Removing all object versions and delete markers..."
              python3 -c "
          import subprocess, json

          bucket = '${BUCKET}'
          paginator_token = ''
          while True:
              cmd = ['aws', 's3api', 'list-object-versions', '--bucket', bucket, '--output', 'json']
              if paginator_token:
                  cmd += ['--key-marker', paginator_token]
              result = json.loads(subprocess.check_output(cmd))

              objects = []
              for v in result.get('Versions', []):
                  objects.append({'Key': v['Key'], 'VersionId': v['VersionId']})
              for dm in result.get('DeleteMarkers', []):
                  objects.append({'Key': dm['Key'], 'VersionId': dm['VersionId']})

              if objects:
                  # Delete in batches of 1000
                  for i in range(0, len(objects), 1000):
                      batch = objects[i:i+1000]
                      delete_payload = json.dumps({'Objects': batch, 'Quiet': True})
                      subprocess.check_call([
                          'aws', 's3api', 'delete-objects',
                          '--bucket', bucket,
                          '--delete', delete_payload
                      ])
                      print(f'Deleted {len(batch)} versioned objects')

              if not result.get('IsTruncated', False):
                  break
              paginator_token = result.get('NextKeyMarker', '')
          "

              echo "Deleting orphaned bucket: ${BUCKET}"
              aws s3api delete-bucket --bucket "${BUCKET}"
              echo "Orphaned bucket ${BUCKET} deleted."
            else
              echo "No orphaned bucket found: ${BUCKET}"
            fi
          done

      - name: Deploy S3 Buckets stack
        run: |
          aws cloudformation deploy \
            --stack-name "${{ steps.preflight.outputs.stack_name }}" \
            --template-file DevOps/AWS/CloudFormation/s3-buckets.yaml \
            --parameter-overrides \
              Environment=${{ inputs.environment }} \
              ProjectName=${{ env.PROJECT_NAME }} \
            --no-fail-on-empty-changeset

      - name: Print stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${{ steps.preflight.outputs.stack_name }}" \
            --query 'Stacks[0].Outputs' \
            --output table
