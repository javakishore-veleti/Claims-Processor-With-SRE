<div>
  <h2>Audit Log</h2>
  <p style="color: #64748b; margin-bottom: 1.5rem;">Comprehensive audit trail of all platform actions</p>

  <div style="margin-bottom: 1.5rem;">
    <input type="text" class="search-input" placeholder="Search by user, action, or resource..." style="width: 100%; max-width: 400px;">
  </div>

  <div class="data-table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>User</th>
          <th>Action</th>
          <th>Resource</th>
          <th>Detail</th>
          <th>Severity</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let log of auditLogs">
          <td style="white-space: nowrap;">{{ log.timestamp }}</td>
          <td style="font-weight: 500;">{{ log.user }}</td>
          <td><code style="background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.8125rem;">{{ log.action }}</code></td>
          <td>{{ log.resource }}</td>
          <td>{{ log.detail }}</td>
          <td><span [class]="getBadgeClass(log.severity)">{{ log.severity }}</span></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
