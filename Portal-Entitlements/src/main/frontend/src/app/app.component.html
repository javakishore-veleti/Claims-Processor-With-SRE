<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>AccessCtrl</h2>
      <div class="subtitle">Entitlements Mgmt</div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">
        <span class="icon">&#9633;</span> Dashboard
      </a>
      <a class="nav-item" [class.active]="activeNav === 'users'" (click)="setActiveNav('users')">
        <span class="icon">&#128101;</span> Users
      </a>
      <a class="nav-item" [class.active]="activeNav === 'groups'" (click)="setActiveNav('groups')">
        <span class="icon">&#128106;</span> Groups
      </a>
      <a class="nav-item" [class.active]="activeNav === 'roles'" (click)="setActiveNav('roles')">
        <span class="icon">&#128272;</span> Roles
      </a>
      <a class="nav-item" [class.active]="activeNav === 'privileges'" (click)="setActiveNav('privileges')">
        <span class="icon">&#128274;</span> Privileges
      </a>
      <a class="nav-item" [class.active]="activeNav === 'audit'" (click)="setActiveNav('audit')">
        <span class="icon">&#128209;</span> Audit Log
      </a>
    </nav>
    <div class="sidebar-footer">
      Entitlements Portal v2.0.0
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Top Header -->
    <header class="top-header">
      <h1>Entitlements Dashboard</h1>
      <div class="header-actions">
        <input type="text" class="search-box" placeholder="Search users...">
        <div class="user-avatar">EA</div>
      </div>
    </header>

    <!-- Content Area -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
