server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: api-claims
  # Default: H2 in-memory (no Docker needed)
  datasource:
    url: ${DB_URL:jdbc:h2:mem:claimsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    hikari:
      pool-name: ${spring.application.name}-pool
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      maximum-pool-size: ${HIKARI_MAX_POOL:20}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1200000}
      connection-timeout: ${HIKARI_CONN_TIMEOUT:30000}
      leak-detection-threshold: ${HIKARI_LEAK_THRESHOLD:60000}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
  cache:
    type: ${CACHE_TYPE:caffeine}
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: api-claims-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  health:
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}
    kafka:
      enabled: ${KAFKA_HEALTH_ENABLED:false}
    elasticsearch:
      enabled: ${ES_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# OpenTelemetry
otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}

logging:
  level:
    com.healthcare.claims: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: ${LOG_LEVEL_SPRING:INFO}

# Feature Toggles
claims:
  storage:
    local-path: ${CLAIMS_STORAGE_PATH:./claim-documents}
  features:
    search:
      enabled: false
      provider: elasticsearch  # elasticsearch | opensearch | azure-cognitive | gcp-search
      elasticsearch-url: ${ELASTICSEARCH_URL:http://localhost:9200}
      index-on-create: true
      index-on-update: true
      index-on-delete: true
      index-on-ai-extraction: true
    event-stream:
      enabled: false
      provider: kafka  # kafka | kinesis | eventhub | pubsub
      publish-on-create: true
      publish-on-update: true
      publish-on-delete: true
      publish-on-stage-change: true
      publish-on-ai-extraction: true
    log-shipping:
      enabled: false
      destination: elasticsearch  # elasticsearch | cloudwatch | azure-monitor | gcp-logging
    cache:
      enabled: false
      provider: redis  # redis | elasticache | azure-redis | memorystore
    metrics:
      enabled: true
      exporter: prometheus  # prometheus | cloudwatch | azure-monitor | gcp-monitoring

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - java.io.IOException
          - java.net.ConnectException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
      strict:
        sliding-window-size: 5
        failure-rate-threshold: 30
        wait-duration-in-open-state: 60s
    instances:
      api-members-service:
        base-config: default
      api-tenants-service:
        base-config: default
      api-entitlements-service:
        base-config: default
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 25
        max-wait-duration: 500ms
    instances:
      api-members-service:
        base-config: default
      api-tenants-service:
        base-config: default
      api-entitlements-service:
        base-config: default
  ratelimiter:
    configs:
      default:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 500ms
    instances:
      api-members-service:
        base-config: default
      api-entitlements-service:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
        cancel-running-future: true
    instances:
      api-members-service:
        base-config: default
      api-entitlements-service:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.io.IOException
          - java.net.ConnectException
    instances:
      api-members-service:
        base-config: default
      api-entitlements-service:
        base-config: default
