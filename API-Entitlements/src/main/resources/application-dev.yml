# Dev environment profile - values from env vars or K8s ConfigMap
# Activate with: --spring.profiles.active=dev
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/claims_db}
    username: ${DB_USERNAME:claims_user}
    password: ${DB_PASSWORD:claims_pass}
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  security:
    user:
      name: dev
      password: dev

# Feature toggles enabled in dev
entitlements:
  features:
    auth-provider:
      provider: local
    search:
      enabled: true
    event-stream:
      enabled: true
    log-shipping:
      enabled: true
    cache:
      enabled: true

logging:
  level:
    com.healthcare.claims.api.entitlements: DEBUG

management:
  health:
    redis:
      enabled: true
    kafka:
      enabled: true
    elasticsearch:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    enabled: true
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
