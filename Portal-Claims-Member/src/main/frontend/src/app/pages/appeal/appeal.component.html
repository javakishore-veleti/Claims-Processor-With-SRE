<div>
  <h2>File an Appeal</h2>
  <p style="color: #64748b; margin-bottom: 1.5rem;">Submit an appeal for a denied or partially approved claim</p>

  <div style="max-width: 600px;">
    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Claim Number</label>
      <select class="search-input" style="width: 100%; padding: 0.625rem;">
        <option value="">-- Select a denied claim --</option>
        <option value="CLM-2026-00098">CLM-2026-00098 — Regional Orthopedics ($3,200.00) — Denied</option>
      </select>
    </div>

    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Reason for Appeal</label>
      <select class="search-input" style="width: 100%; padding: 0.625rem;">
        <option value="">-- Select reason --</option>
        <option>Medical necessity — service was required</option>
        <option>Incorrect denial — coverage should apply</option>
        <option>Additional documentation available</option>
        <option>Coding error on original claim</option>
        <option>Other</option>
      </select>
    </div>

    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Additional Information</label>
      <textarea class="search-input" style="width: 100%; min-height: 120px; padding: 0.625rem;" placeholder="Provide details supporting your appeal..."></textarea>
    </div>

    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Supporting Documents</label>
      <input type="file" multiple style="padding: 0.5rem;">
    </div>

    <button class="btn" style="padding: 0.75rem 2rem;">Submit Appeal</button>
  </div>
</div>
