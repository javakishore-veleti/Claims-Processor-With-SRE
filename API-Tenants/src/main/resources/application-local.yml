# Local development profile - H2 in-memory (default), debug logging
# Activate with: --spring.profiles.active=local
spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop

logging:
  level:
    com.healthcare.claims.api.tenants: DEBUG
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
