# AWS-specific configuration
# Values injected from AWS Secrets Manager / SSM Parameter Store / K8s ConfigMap
# Compose with environment profile: --spring.profiles.active=dev,aws
spring:
  datasource:
    url: ${AWS_RDS_URL}
    username: ${AWS_RDS_USERNAME}
    password: ${AWS_RDS_PASSWORD}
    driver-class-name: org.postgresql.Driver

# AWS-specific properties
aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket: ${AWS_S3_BUCKET}
  secrets-manager:
    enabled: true
  cloudwatch:
    enabled: true
