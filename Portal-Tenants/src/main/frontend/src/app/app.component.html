<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>TenantAdmin</h2>
      <div class="subtitle">Tenant Management</div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">
        <span class="icon">&#9633;</span> Dashboard
      </a>
      <a class="nav-item" [class.active]="activeNav === 'tenants'" (click)="setActiveNav('tenants')">
        <span class="icon">&#127970;</span> All Tenants
      </a>
      <a class="nav-item" [class.active]="activeNav === 'create'" (click)="setActiveNav('create')">
        <span class="icon">&#10010;</span> Create Tenant
      </a>
      <a class="nav-item" [class.active]="activeNav === 'plans'" (click)="setActiveNav('plans')">
        <span class="icon">&#128179;</span> Tenant Plans
      </a>
      <a class="nav-item" [class.active]="activeNav === 'settings'" (click)="setActiveNav('settings')">
        <span class="icon">&#9881;</span> Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      Tenant Portal v3.1.0
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Top Header -->
    <header class="top-header">
      <h1>Tenant Management Dashboard</h1>
      <div class="header-actions">
        <input type="text" class="search-box" placeholder="Search tenants...">
        <div class="user-avatar">TA</div>
      </div>
    </header>

    <!-- Content Area -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
