<div>
  <h2>Settings</h2>
  <p style="color: #64748b; margin-bottom: 1.5rem;">Platform-wide tenant management configuration</p>

  <div style="max-width: 600px;">
    <h3 style="margin-bottom: 1rem;">Default Tenant Configuration</h3>

    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Default Plan for New Tenants</label>
      <select class="search-input" style="width: 100%; padding: 0.625rem;">
        <option>Starter</option>
        <option selected>Professional</option>
        <option>Enterprise</option>
      </select>
    </div>

    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Trial Period (days)</label>
      <input type="number" class="search-input" style="width: 100%; padding: 0.625rem;" value="30">
    </div>

    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Max Tenants per Region</label>
      <input type="number" class="search-input" style="width: 100%; padding: 0.625rem;" value="100">
    </div>

    <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Feature Toggles</h3>

    <div style="margin-bottom: 0.75rem;">
      <label style="display: inline-flex; align-items: center; gap: 0.5rem; color: #334155;">
        <input type="checkbox" checked> Enable AI-assisted adjudication for new tenants
      </label>
    </div>
    <div style="margin-bottom: 0.75rem;">
      <label style="display: inline-flex; align-items: center; gap: 0.5rem; color: #334155;">
        <input type="checkbox" checked> Enable Kafka event streaming
      </label>
    </div>
    <div style="margin-bottom: 0.75rem;">
      <label style="display: inline-flex; align-items: center; gap: 0.5rem; color: #334155;">
        <input type="checkbox"> Enable Redis caching
      </label>
    </div>
    <div style="margin-bottom: 0.75rem;">
      <label style="display: inline-flex; align-items: center; gap: 0.5rem; color: #334155;">
        <input type="checkbox" checked> Enable Prometheus metrics export
      </label>
    </div>

    <button class="btn" style="padding: 0.75rem 2rem; margin-top: 1.5rem;">Save Settings</button>
  </div>
</div>
