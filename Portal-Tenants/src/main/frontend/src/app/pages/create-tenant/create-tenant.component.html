<div>
  <h2>Create Tenant</h2>
  <p style="color: #64748b; margin-bottom: 1.5rem;">Register a new healthcare organization tenant</p>

  <div style="max-width: 600px;">
    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Organization Name</label>
      <input type="text" class="search-input" style="width: 100%; padding: 0.625rem;" placeholder="e.g., Midwest Health Partners">
    </div>

    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Organization Type</label>
      <select class="search-input" style="width: 100%; padding: 0.625rem;">
        <option value="">-- Select type --</option>
        <option>Health Insurance Provider</option>
        <option>Hospital System</option>
        <option>Medical Group</option>
        <option>Pharmacy Benefits Manager</option>
        <option>Third-Party Administrator</option>
      </select>
    </div>

    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Plan</label>
      <select class="search-input" style="width: 100%; padding: 0.625rem;">
        <option value="">-- Select plan --</option>
        <option>Starter (up to 2,000 members)</option>
        <option>Professional (up to 10,000 members)</option>
        <option>Enterprise (unlimited members)</option>
      </select>
    </div>

    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Region</label>
      <select class="search-input" style="width: 100%; padding: 0.625rem;">
        <option value="">-- Select region --</option>
        <option>US-East</option>
        <option>US-Central</option>
        <option>US-West</option>
        <option>US-South</option>
        <option>EU-North</option>
        <option>EU-Central</option>
        <option>APAC</option>
      </select>
    </div>

    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Admin Email</label>
      <input type="email" class="search-input" style="width: 100%; padding: 0.625rem;" placeholder="admin@organization.com">
    </div>

    <div style="margin-bottom: 1.25rem;">
      <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #334155;">Admin Contact Name</label>
      <input type="text" class="search-input" style="width: 100%; padding: 0.625rem;" placeholder="Full name">
    </div>

    <button class="btn" style="padding: 0.75rem 2rem;">Create Tenant</button>
  </div>
</div>
