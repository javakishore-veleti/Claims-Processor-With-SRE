server:
  port: 8085

spring:
  cloud:
    compatibility-verifier:
      enabled: false
  application:
    name: portal-batch-assignment
  datasource:
    url: ${DB_URL:jdbc:h2:mem:claimsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: true

management:
  health:
    redis:
      enabled: ${REDIS_HEALTH_ENABLED:false}
    kafka:
      enabled: ${KAFKA_HEALTH_ENABLED:false}
    elasticsearch:
      enabled: ${ES_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,batch
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# OpenTelemetry
otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

claims:
  service-client:
    auth:
      enabled: false
      provider: none
    services:
      api-members:
        url: ${API_MEMBERS_URL:http://localhost:8084}
      api-tenants:
        url: ${API_TENANTS_URL:http://localhost:8086}
